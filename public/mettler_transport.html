<script>
const TYPE_OPTIONS = ['','왕복','이동','입고','재고이동','지역간','출고'];
const VEHICLE_OPTIONS = ['','오토바이','다마스','라보','1톤','2.5톤','3.5톤','5톤','11톤'];

let rates = [];        // 운임표 (mettler_rates.json)
let rows = [];         // 현재 청구서 행 데이터

const adminToken = sessionStorage.getItem('adminToken');
const staffToken = sessionStorage.getItem('staffToken');
const authToken  = adminToken || staffToken;
const authH = () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+authToken });

const fmt = n => (n||0).toLocaleString('ko-KR');
const num = v => { const n = parseFloat(String(v).replace(/[^\d.-]/g,'')); return isNaN(n)?0:n; };

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2600);
}

/* ════════ 기간 설정 ════════
 * 청구 주기: 전월 16일 ~ 당월 15일 (당월 청구분)
 * - 오늘 5/2 (날짜 ≤15): 이번달 청구 = 4/16 ~ 5/15
 * - 오늘 5/20 (날짜 ≥16): 이번달 청구 = 5/16 ~ 6/15
 */
function setQuickRange(mode) {
  const today = new Date();
  // 오늘이 속한 청구 주기의 시작/종료 계산
  let cycleStart, cycleEnd;
  if (today.getDate() >= 16) {
    // 이번달 16일 ~ 다음달 15일
    cycleStart = new Date(today.getFullYear(), today.getMonth(), 16);
    cycleEnd   = new Date(today.getFullYear(), today.getMonth() + 1, 15);
  } else {
    // 전월 16일 ~ 이번달 15일
    cycleStart = new Date(today.getFullYear(), today.getMonth() - 1, 16);
    cycleEnd   = new Date(today.getFullYear(), today.getMonth(), 15);
  }
  let from, to;
  if (mode === 'this') {
    from = cycleStart; to = cycleEnd;
  } else if (mode === 'prev') {
    from = new Date(cycleStart.getFullYear(), cycleStart.getMonth() - 1, 16);
    to   = new Date(cycleStart.getFullYear(), cycleStart.getMonth(), 15);
  } else if (mode === 'next') {
    from = new Date(cycleStart.getFullYear(), cycleStart.getMonth() + 1, 16);
    to   = new Date(cycleStart.getFullYear(), cycleStart.getMonth() + 2, 15);
  }
  document.getElementById('dateFrom').value = todayKST(from);
  document.getElementById('dateTo').value   = todayKST(to);
  updatePeriodInfo();
}

function updatePeriodInfo() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  document.getElementById('docPeriod').textContent = (f && t) ? `${f} ~ ${t}` : '-';
  // 제목 업데이트 — 청구월 = 종료일이 속한 달
  if (f && t) {
    const td = new Date(t);
    document.getElementById('docTitle').textContent =
      `메틀러토레도 ${td.getMonth()+1}월 운송비 청구서`;
  }
  document.getElementById('periodInfo').textContent =
    (f && t) ? `※ 메틀러 운송 청구는 전월 16일~당월 15일 주기` : '';
}

function periodKey() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!f || !t) return null;
  return `${f}~${t}`;
}

/* ════════ 운임표 로드 ════════ */
async function loadRates() {
  try {
    const res = await fetch('mettler_rates.json', { cache: 'force-cache' });
    rates = await res.json();
  } catch(e) {
    console.error('운임표 로드 실패:', e);
    rates = [];
  }
}

  '마포':'마포구','서대문':'서대문구','서초':'서초구','성동':'성동구',
  '성북':'성북구','송파':'송파구','양천':'양천구','영등포':'영등포구',
  '용산':'용산구','은평':'은평구','종로':'종로구','중랑':'중랑구',

// 입력값을 운임표 시군구 형태로 정규화 (예: "경기도 용인시" → "용인")
// 광역시 단독명 → 운임표 매칭값 (대전, 광주, 울산, 세종)
const SIDO_TO_SIGUN = {
  '대전광역시':'대전','대전':'대전',
  '광주광역시':'광주','광주':'광주',
  '울산광역시':'울산','울산':'울산',
  '세종특별자치시':'세종','세종':'세종',
};

// RATE_TABLE에 sigun이 존재하는지 확인 (billing.html과 호환)
function rtHas(name) {
  if (typeof RATE_TABLE === 'undefined') return false;
  for (const k in RATE_TABLE) if (RATE_TABLE[k].sigun === name) return true;
  return false;
}

function normalizeRegion(input) {
  if (!input) return '';
  let s = String(input).trim();
  // 광역시/시도 단독명
  if (SIDO_TO_SIGUN[s]) return SIDO_TO_SIGUN[s];
  // 시도 prefix 제거
  for (const sido of SIDO_PREFIXES) {
    if (s.startsWith(sido + ' ')) { s = s.substring(sido.length).trim(); break; }
  }
  // 첫 번째 토큰
  const firstToken = s.split(/\s+/)[0];
  // RATE_TABLE에 직접 매칭되는지
  if (rtHas(s)) return s;
  if (rtHas(firstToken)) return firstToken;
  // "OO시" → "OO"
  if (firstToken.endsWith('시') && firstToken.length >= 3) {
    const cand = firstToken.slice(0, -1);
    if (rtHas(cand)) return cand;
  }
  // "OO군" → "OO"
  if (firstToken.endsWith('군') && firstToken.length >= 3) {
    const cand = firstToken.slice(0, -1);
    if (rtHas(cand)) return cand;
  }
  // 별칭 매핑 (구/읍/면) - 입력 전체에서 alias 키 찾기
  for (const key of Object.keys(REGION_ALIAS)) {
    if (s.includes(key)) return REGION_ALIAS[key];
  }
  // 첫 토큰으로 alias
  if (REGION_ALIAS[firstToken]) return REGION_ALIAS[firstToken];
  // 모두 실패 시 원본 (또는 첫 토큰) 반환
  return firstToken || s;
}

// 도착지(시/군)와 차종으로 운임 조회
// billing.html(운송내역서)과 동일 — RATE_TABLE + rate_override(운임표 수정값) 적용
function lookupRate(sigungu, vehicle, side) {
  if (!sigungu || !vehicle) return 0;
  if (typeof RATE_TABLE === 'undefined') return 0;
  const RATE_VEHICLES = ['다마스','1톤','2.5톤','5톤','11톤'];
  if (!RATE_VEHICLES.includes(vehicle)) return 0;
  // billing.html과 동일한 매칭 순서: normalizeDistrict → 정확매칭 → aliasMatch → 부분매칭
  const d = normalizeDistrict(sigungu);
  if (!d) return 0;

  // 운임표 메뉴에서 수정한 단가(rate_override) 로드
  let overrides = {};
  try { overrides = JSON.parse(localStorage.getItem('rate_override') || '{}'); } catch(e) {}

  // RATE_TABLE 키 + 차종 + side(carrier/shipper) → 최종 단가 (override 우선)
  function rateOf(key, e) {
    const base = side === 'shipper' ? (e.client[vehicle] || 0) : (e.carrier[vehicle] || 0);
    const ov = overrides[key] || {};
    const ovKey = side === 'shipper' ? `k_${vehicle}` : `c_${vehicle}`;
    return (ov[ovKey] != null) ? ov[ovKey] : base;
  }
  function tryExact(target) {
    if (!target) return null;
    for (const key in RATE_TABLE) {
      if (RATE_TABLE[key].sigun === target) return rateOf(key, RATE_TABLE[key]) || 0;
    }
    return null;
  }

  // 1차: 정확 매칭
  let v = tryExact(d);
  if (v != null) return v;
  // 2차: 별칭 매핑 후 정확 매칭 (예: "분당구" → "성남")
  v = tryExact(aliasMatch(d));
  if (v != null) return v;
  // 3차: 시/도/구/군 제거 후 부분 포함 매칭
  const clean = d.replace(/[시도구군읍면동로길]/g,'');
  for (const key in RATE_TABLE) {
    const e = RATE_TABLE[key];
    const sc = e.sigun.replace(/[시도구군읍면동]/g,'');
    if (clean && sc && (clean.includes(sc) || sc.includes(clean))) return rateOf(key, e) || 0;
  }
  return 0;
}

// 주소에서 시/군/구 토큰 추출 — billing.html extractSigun과 동일 알고리즘
// (접미사 보존: "경기도 안산시 ..." → "안산시")
function extractSigungu(addr) {
  if (!addr) return '';
  const parts = addr.trim().split(/[\s,]+/).filter(Boolean);
  if (!parts.length) return '';
  let start = 0;
  if (/도$|특별시$|광역시$|특별자치시$|특별자치도$/.test(parts[0])) start = 1;
  for (let i = start; i < parts.length; i++) {
    if (/[시군구]$/.test(parts[i]) && parts[i].length >= 2) return parts[i];
  }
  return parts[start] || parts[0] || '';
}

// billing.html normalizeDistrict와 동일 — 시도 prefix/시·군 접미사 정리
function normalizeDistrict(input) {
  if (!input) return '';
  let s = String(input).trim();
  if (SIDO_TO_SIGUN[s]) return SIDO_TO_SIGUN[s];
  for (const sido of SIDO_PREFIXES) {
    if (s.startsWith(sido + ' ')) { s = s.substring(sido.length).trim(); break; }
  }
  const firstToken = s.split(/\s+/)[0];
  if (firstToken.endsWith('시') && firstToken.length >= 3) {
    const stripped = firstToken.slice(0, -1);
    if (typeof RATE_TABLE !== 'undefined') {
      for (const k in RATE_TABLE) if (RATE_TABLE[k].sigun === stripped) return stripped;
    }
  }
  if (firstToken.endsWith('군') && firstToken.length >= 3) {
    const stripped = firstToken.slice(0, -1);
    if (typeof RATE_TABLE !== 'undefined') {
      for (const k in RATE_TABLE) if (RATE_TABLE[k].sigun === stripped) return stripped;
    }
  }
  return s;
}

// billing.html aliasMatch와 동일 — 별칭 키로 표준 시군 반환 (없으면 null)
function aliasMatch(input) {
  if (!input) return null;
  const s = normalizeDistrict(input);
  if (REGION_ALIAS[s]) return REGION_ALIAS[s];
  for (const key of Object.keys(REGION_ALIAS)) {
    if (s.includes(key)) return REGION_ALIAS[key];
  }
  const first = s.split(/\s+/)[0];
  if (first.endsWith('시') || first.endsWith('군')) {
    const cand = first.slice(0, -1);
    if (REGION_ALIAS[cand]) return REGION_ALIAS[cand];
    return cand;
  }
  return null;
}

  '메틀러토레도㈜': '송파구',
  '한국메틀러토레도': '송파구',
  '메틀러토레도코리아': '송파구',
};
function regionFromDestName(destName) {
  if (!destName) return '';
  const s = String(destName).replace(/\s+/g,'');
  for (const key of Object.keys(DEST_NAME_TO_REGION)) {
    if (s.includes(key.replace(/\s+/g,''))) return DEST_NAME_TO_REGION[key];
  }
  return '';
}

/* 502/503/504 등 일시적 서버 오류 시 자동 재시도 (Render 콜드스타트 대응) */
async function fetchWithRetry(url, opts = {}, maxRetry = 3) {
  let lastErr;
  for (let attempt = 0; attempt <= maxRetry; attempt++) {
    try {
      const r = await fetch(url, opts);
      // 일시적 게이트웨이 오류는 재시도
      if ([502, 503, 504].includes(r.status) && attempt < maxRetry) {
        lastErr = new Error(`HTTP ${r.status}`);
        const wait = 800 * (attempt + 1);  // 0.8s, 1.6s, 2.4s
        console.warn(`[재시도 ${attempt+1}/${maxRetry}] ${url} → ${r.status}, ${wait}ms 후 재시도`);
        if (attempt === 0) toast('서버 응답 대기 중... 잠시만 기다려주세요', 'error');
        await new Promise(res => setTimeout(res, wait));
        continue;
      }
      return r;
    } catch (e) {
      lastErr = e;
      if (attempt < maxRetry) {
        const wait = 800 * (attempt + 1);
        console.warn(`[재시도 ${attempt+1}/${maxRetry}] ${url} → ${e.message}, ${wait}ms 후 재시도`);
        await new Promise(res => setTimeout(res, wait));
        continue;
      }
    }
  }
  throw lastErr || new Error('요청 실패');
}

/* ════════ 데이터 조회 ════════ */
async function loadBilling() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!f || !t) { toast('청구 기간을 선택해주세요.', 'error'); return; }
  if (f > t) { toast('시작일이 종료일보다 클 수 없습니다.', 'error'); return; }
  updatePeriodInfo();

  // 1) 서버 저장본 미리 가져오기 (메모/수동 수정값 병합용)
  const key = periodKey();
  let serverRows = [];
  try {
    const r = await fetchWithRetry('/api/mettler-transport/' + encodeURIComponent(key), { headers: authH() });
    const j = await r.json();
    serverRows = j.data || [];
  } catch(e) {}

  // 2) 항상 admin 오더에서 fresh 로드 (billing.html과 동일 결과 보장)
  try {
    const url = `/api/records?dateFrom=${encodeURIComponent(f)}&dateTo=${encodeURIComponent(t)}&client_code=mettler&limit=2000`;
    const r = await fetchWithRetry(url, { headers: authH() });
    if (!r.ok) {
      const errText = await r.text();
      throw new Error(`HTTP ${r.status}: ${errText.slice(0,100)}`);
    }
    const j = await r.json();
    const orders = (j.data || j || []);
    console.log('[admin records]', orders.length, '건');

    // 등록이 빠른 순(오래된 순) 정렬 — delivery_date asc, 같은 날짜는 id asc
    orders.sort((a, b) => {
      const da = (a.delivery_date || '').slice(0,10);
      const db = (b.delivery_date || '').slice(0,10);
      if (da !== db) return da.localeCompare(db);
      return (a.id || 0) - (b.id || 0);
    });

    rows = orders.map((o, idx) => {
      // billing.html과 동일한 변환 로직
      const vt = o.vehicle_type || '';
      const tt = o.transport_type || '';

      // 운임 기준 시군구 결정
      let billingDistrict = '';
      if (tt === '회수') {
        billingDistrict = o.origin_sigun || extractSigungu(o.origin_address || '');
      } else {
        billingDistrict = o.dest_sigun || extractSigungu(o.customer_address || '');
      }
      // 인라인 정정 — billing.html과 동일: 매칭 실패 시 주소 별칭으로 1차 시도
      if (vt && billingDistrict && lookupRate(billingDistrict, vt, 'carrier') === 0) {
        const altDistrict = aliasMatch(o.customer_address || o.dest_sigun || '');
        if (altDistrict && lookupRate(altDistrict, vt, 'carrier') > 0) {
          billingDistrict = altDistrict;
        }
      }

      // 출발지/도착지 표시
      let originDisplay = '', originNameDisplay = '', destNameDisplay = '';
      if (tt === '회수' || tt === '입고') {
        originDisplay = billingDistrict || o.origin_sigun || extractSigungu(o.origin_address || '') || o.origin || '';
        originNameDisplay = o.customer_company || '';
        destNameDisplay = 'ACT';
      } else {
        const isActOrigin = (o.origin === 'ACT' || (o.origin || '').toUpperCase() === 'ACT');
        originNameDisplay = isActOrigin ? 'ACT' : (o.origin_address || o.origin || 'ACT');
        originDisplay = isActOrigin ? '김포' : (o.origin_sigun || extractSigungu(o.origin_address || '') || o.origin || '김포');
        destNameDisplay = o.customer_company || '';
      }

      // 아라육로 95번길 배차 건만 → 출발지 "김포" / 출발지 상호 "신한인비스타"로 통일
      // (ACT 창고 주소 "아라육로58번길"은 제외 — 정확히 "95"만 매칭)
      const _originRaw = `${o.origin||''} ${o.origin_address||''} ${originNameDisplay||''}`.replace(/\s+/g,'');
      if (/아라육로95/.test(_originRaw) || _originRaw.includes('신한인비스타')) {
        originDisplay = '김포';
        originNameDisplay = '신한인비스타';
      }

      // 내용(형태) 자동결정
      let content = '';
      if (originNameDisplay === 'ACT') content = '출고';
      else if (destNameDisplay === 'ACT') content = '입고';
      else content = '이동';
      if (tt && !['출고','회수','이동','입고'].includes(tt)) content = tt;

      // 추가운임(work_fee) — billing.html과 동일하게 운송사/화주 양쪽에 적용
      const addFee = parseInt(o.work_fee) || 0;

      const row = {
        no: idx + 1,
        date: (o.delivery_date || '').slice(0,10),
        dn: o.order_no || '',
        src: originDisplay,
        srcCode: originNameDisplay || 'ACT',
        dest: billingDistrict,
        destCode: destNameDisplay,
        type: content,
        vehicle: vt,
        cBase: 0, cExtra: addFee, cActual: 0, cMemo: '',
        sBase: 0, sExtra: addFee,
        qty: o.quantity || '',
        memo: o.notes || '',
        _src: 'auto'
      };
      autoCalcRow(row);
      return row;
    });

    // 2-1) 운임 매칭 실패 행 자동정정 — billing.html과 동일한 3-tier
    rows.forEach(row => {
      if (row._src !== 'auto' || !row.vehicle) return;
      if (lookupRate(row.dest, row.vehicle, 'carrier') > 0) return;  // 이미 매칭됨
      const o = orders.find(x => (x.order_no || '') === row.dn);
      const fullAddr = o ? (o.customer_address || '') : '';
      const destName = row.destCode || '';
      // 1차: 도착지 상호로 추론 (메틀러토레도 → 송파구)
      let alt = regionFromDestName(destName);
      // 2차: customer_address 별칭 매칭
      if (!alt || lookupRate(alt, row.vehicle, 'carrier') === 0) {
        alt = aliasMatch(fullAddr);
      }
      // 3차: row.dest 정규화 → 별칭 매칭
      if (!alt || lookupRate(alt, row.vehicle, 'carrier') === 0) {
        alt = normalizeDistrict(row.dest || '');
        if (alt && lookupRate(alt, row.vehicle, 'carrier') === 0) {
          alt = aliasMatch(row.dest || '');
        }
      }
      if (alt && alt !== row.dest && lookupRate(alt, row.vehicle, 'carrier') > 0) {
        console.log(`[자동정정] ${row.dn}: ${row.dest || '(없음)'} → ${alt}`);
        row.dest = alt;
        autoCalcRow(row);
      }
    });

    // 3) 서버 저장본 병합 — billing.html과 동일 원칙:
    //    운임 기본값(cBase/sBase)은 항상 최신 운임표 자동계산값을 우선,
    //    사용자 수동 입력 필드(추가비용/실제청구/메모/수량 등)만 저장본에서 복원
    if (serverRows.length) {
      let merged = 0;
      const usedDN = new Set();
      rows.forEach(row => {
        const sv = serverRows.find(s => s.dn && s.dn === row.dn && !usedDN.has(s));
        if (!sv) return;
        usedDN.add(sv);

        // (a) 사용자 수동 입력 필드 복원
        if (sv.cExtra  != null && sv.cExtra  !== '') row.cExtra  = num(sv.cExtra);
        if (sv.sExtra  != null && sv.sExtra  !== '') row.sExtra  = num(sv.sExtra);
        if (sv.cActual != null && sv.cActual !== '') row.cActual = num(sv.cActual);
        if (sv.cMemo)  row.cMemo = sv.cMemo;
        if (sv.memo)   row.memo  = sv.memo;
        if (sv.qty)    row.qty   = sv.qty;
        if (sv.type)   row.type  = sv.type;
        // 차종은 저장값 우선 (사용자가 수정했을 수 있음)
        if (sv.vehicle) row.vehicle = sv.vehicle;
        // 도착지는 저장값이 운임표에 매칭될 때만 복원 (billing.html과 동일)
        if (sv.dest && lookupRate(sv.dest, row.vehicle, 'carrier') > 0) row.dest = sv.dest;
        if (sv.destCode) row.destCode = sv.destCode;
        if (sv.src)     row.src     = sv.src;
        if (sv.srcCode) row.srcCode = sv.srcCode;

        // (b) 운임 기본값은 최신 운임표로 재계산 (저장본의 옛 운임 무시)
        autoCalcRow(row);
        // 단, 자동매칭이 0(미매칭)인데 저장값이 있으면 저장값 사용
        if ((!row.cBase || row.cBase === 0) && num(sv.cBase) > 0) row.cBase = num(sv.cBase);
        if ((!row.sBase || row.sBase === 0) && num(sv.sBase) > 0) row.sBase = num(sv.sBase);
        merged++;
      });
      // 저장본에만 있고 fresh 오더에는 없는 행 추가 (수동 입력행 보존)
      serverRows.forEach(sv => {
        if (!usedDN.has(sv)) {
          rows.push({ ...sv, no: rows.length + 1, _src: sv._src || 'manual' });
        }
      });
      renumber();
      console.log(`[병합] 저장본 ${serverRows.length}건 중 ${merged}건 병합, 추가 ${serverRows.length - merged}건`);
    }

    renderRows();
    if (rows.length) {
      const matched = rows.filter(r => r.cBase > 0 || r.sBase > 0).length;
      const mergedMsg = serverRows.length ? `, 저장본 병합` : '';
      toast(`운송청구서와 동일 ${rows.length}건 (자동매칭 ${matched}건${mergedMsg})`);
    } else {
      toast('해당 기간 메틀러 오더가 없습니다. + 행 추가로 직접 입력하세요.', 'error');
    }
  } catch(e) {
    console.error('데이터 조회 실패:', e);
    rows = [];
    renderRows();
    toast('데이터 조회 실패: ' + e.message, 'error');
  }
}

/* ════════ 행 추가/삭제 ════════ */
function addRow() {
  rows.push({
    no: rows.length + 1,
    date: '', dn: '', src: '김포', srcCode: 'ACT',
    dest: '', destCode: '', type: '', vehicle: '',
    cBase: 0, cExtra: 0, cActual: 0, cBill: 0, cMemo: '',
    sBase: 0, sExtra: 0,
    qty: '', memo: '', _src: 'manual'
  });
  renderRows();
}

function deleteRow(idx) {
  if (!confirm('이 행을 삭제하시겠습니까?')) return;
  rows.splice(idx, 1);
  renumber();
  renderRows();
}

function renumber() { rows.forEach((r, i) => r.no = i + 1); }

// ACT 출발지번호 체크 (대소문자 무관, 부분포함)
function isActSource(srcCode) {
  return /act/i.test(String(srcCode || ''));
}

// 도착지/차종/출발지번호 변경 시 자동계산
function autoCalcRow(row) {
  if (!row) return;
  // billing.html과 동일 — ACT 여부와 무관하게 도착지(구/군)+차종으로 운임 자동조회
  const cb = lookupRate(row.dest, row.vehicle, 'carrier');
  const sb = lookupRate(row.dest, row.vehicle, 'shipper');
  if (cb > 0) row.cBase = cb;
  if (sb > 0) row.sBase = sb;
}

/* ════════ 셀 변경 핸들러 ════════ */
function onCellChange(idx, field, value) {
  const row = rows[idx];
  if (!row) return;
  row[field] = value;
  // 도착지 입력 시 자동 정규화 (예: "경기도 용인시" → "용인")
  if (field === 'dest') {
    const normalized = normalizeRegion(value);
    if (normalized && normalized !== value) {
      row.dest = normalized;
    }
  }
  // 도착지번호 입력 시 거래처별 자동 시군구 (예: 메틀러토레도 → 송파)
  if (field === 'destCode') {
    const auto = regionFromDestName(value);
    if (auto && !row.dest) {
      row.dest = auto;
    } else if (auto) {
      // 이미 dest 있어도 메틀러는 송파로 강제 (사용자 요구)
      row.dest = auto;
    }
  }
  // 도착지/차종/출발지번호/도착지번호 변경 시 자동계산 갱신
  if (['dest','vehicle','srcCode','destCode'].includes(field)) {
    autoCalcRow(row);
    renderRows();
    return;
  }
  // 숫자 필드는 합계 다시 계산하기 위해 리렌더
  if (['cBase','cExtra','cActual','cBill','sBase','sExtra'].includes(field)) {
    row[field] = num(value);
    renderRows();
    return;
  }
}

/* ════════ 렌더링 ════════ */
function renderRows() {
  const body = document.getElementById('billBody');
  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="20" class="empty-state">
      <i class="fas fa-inbox"></i>
      <strong>등록된 청구 내역이 없습니다.</strong><br>
      청구 기간 선택 후 <strong>"데이터 조회"</strong>를 클릭하거나 <strong>"+ 행 추가"</strong> 버튼을 누르세요.
    </td></tr>`;
    document.getElementById('billFoot').innerHTML = '';
    return;
  }

  body.innerHTML = rows.map((r, idx) => {
    // 운송사 합계 = 기본운임(J) + 추가운임(K)
    const cBaseN  = num(r.cBase) || 0;
    const cExtraN = num(r.cExtra) || 0;
    const cTotal = cBaseN + cExtraN;
    const sTotal = (num(r.sBase) || 0) + (num(r.sExtra) || 0);
    const diff   = sTotal - cTotal;
    const diffCls = diff > 0 ? 'diff-pos' : (diff < 0 ? 'diff-neg' : 'diff-zero');
    const isACT = isActSource(r.srcCode);
    return `<tr>
      <td class="no"><button class="row-del-btn" onclick="deleteRow(${idx})" title="삭제"><i class="fas fa-times"></i></button></td>
      <td class="no">${r.no}<div class="row-badge ${r._src==='auto'?'auto':'manual'}" style="margin-top:2px;">${r._src==='auto'?'자동':'수동'}</div></td>
      <td><input type="date" value="${r.date||''}" onchange="onCellChange(${idx},'date',this.value)"></td>
      <td><input type="text" value="${r.dn||''}" onchange="onCellChange(${idx},'dn',this.value)"></td>
      <td><input type="text" class="left" value="${r.src||''}" onchange="onCellChange(${idx},'src',this.value)"></td>
      <td class="${isACT?'src-code-act':''}"><input type="text" value="${r.srcCode||''}" onchange="onCellChange(${idx},'srcCode',this.value)" placeholder="ACT"></td>
      <td><input type="text" value="${r.dest||''}" onchange="onCellChange(${idx},'dest',this.value)" placeholder="구/군"></td>
      <td><input type="text" value="${r.destCode||''}" onchange="onCellChange(${idx},'destCode',this.value)"></td>
      <td><select onchange="onCellChange(${idx},'type',this.value)">${TYPE_OPTIONS.map(t=>`<option value="${t}" ${r.type===t?'selected':''}>${t}</option>`).join('')}</select></td>
      <td><select onchange="onCellChange(${idx},'vehicle',this.value)">${VEHICLE_OPTIONS.map(v=>`<option value="${v}" ${r.vehicle===v?'selected':''}>${v}</option>`).join('')}</select></td>
      <td><input type="number" class="right" value="${r.cBase||''}" onchange="onCellChange(${idx},'cBase',this.value)" placeholder="${isACT?'자동':'0'}"></td>
      <td><input type="number" class="right" value="${r.cExtra||''}" onchange="onCellChange(${idx},'cExtra',this.value)"></td>
      <td><input type="number" class="right" value="${r.cActual||''}" onchange="onCellChange(${idx},'cActual',this.value)" placeholder="0"></td>
      <td><input type="number" class="right" value="${r.sBase||''}" onchange="onCellChange(${idx},'sBase',this.value)" placeholder="${isACT?'자동':'0'}"></td>
      <td><input type="number" class="right" value="${r.sExtra||''}" onchange="onCellChange(${idx},'sExtra',this.value)"></td>
      <td class="calc">${cTotal?fmt(cTotal):'-'}</td>
      <td class="calc">${sTotal?fmt(sTotal):'-'}</td>
      <td class="calc ${diffCls}">${diff?fmt(diff):'-'}</td>
      <td><input type="text" value="${r.qty||''}" onchange="onCellChange(${idx},'qty',this.value)"></td>
      <td><input type="text" class="left" value="${r.memo||''}" onchange="onCellChange(${idx},'memo',this.value)"></td>
    </tr>`;
  }).join('');

  // 합계 (운송사 합계 = J+K)
  const totalC = rows.reduce((s,r) => s + num(r.cBase) + num(r.cExtra), 0);
  const totalActual = rows.reduce((s,r) => s + num(r.cActual), 0);
  const totalS = rows.reduce((s,r) => s + num(r.sBase) + num(r.sExtra), 0);
  const totalDiff = totalS - totalC;
  document.getElementById('billFoot').innerHTML = `
    <tr>
      <td class="lbl" colspan="12">합계 (${rows.length}건)</td>
      <td>${fmt(totalActual)}</td>
      <td class="lbl" colspan="2"></td>
      <td>${fmt(totalC)}</td>
      <td>${fmt(totalS)}</td>
      <td class="diff">${fmt(totalDiff)}</td>
      <td class="lbl" colspan="2"></td>
    </tr>
  `;
}

/* ════════ DOM → rows 강제 동기화 (저장 직전 호출) ════════
   사용자가 입력 칸에서 포커스를 빼기 전(=onchange 미발화) 저장 버튼을 눌러도
   현재 DOM의 모든 값을 rows에 반영해 데이터 손실을 방지 */
function syncRowsFromDOM() {
  // 현재 포커스된 입력의 onchange가 늦게 발화되는 것 방지
  if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
    try { document.activeElement.blur(); } catch(_) {}
  }
  const tbody = document.getElementById('billBody');
  if (!tbody) return;
  // 행 렌더링 순서와 동일 (renderRows 참조)
  const FIELDS = ['date','dn','src','srcCode','dest','destCode','type','vehicle','cBase','cExtra','cActual','sBase','sExtra','qty','memo'];
  const NUM_FIELDS = new Set(['cBase','cExtra','cActual','sBase','sExtra']);
  tbody.querySelectorAll('tr').forEach((tr, idx) => {
    if (!rows[idx]) return;
    const inputs = tr.querySelectorAll('input, select');
    inputs.forEach((el, i) => {
      const f = FIELDS[i];
      if (!f) return;
      const v = el.value;
      rows[idx][f] = NUM_FIELDS.has(f) ? num(v) : v;
    });
  });
}

/* ════════ 저장 ════════ */
async function saveBilling() {
  syncRowsFromDOM();   // 저장 직전 DOM의 현재 입력값을 모두 rows에 반영
  const key = periodKey();
  if (!key) { toast('청구 기간을 선택해주세요.', 'error'); return; }
  if (!rows.length) { toast('저장할 데이터가 없습니다.', 'error'); return; }
  if (!authToken) { toast('로그인이 필요합니다.', 'error'); return; }

  console.log('[saveBilling] periodKey:', key, '| rows:', rows.length, '| token:', authToken ? 'OK' : '없음');

  try {
    const url = '/api/mettler-transport/' + encodeURIComponent(key);
    const body = JSON.stringify({ data: rows, meta: { carrier: '패스로직스' } });
    console.log('[saveBilling] PUT', url, '| body size:', body.length);

    const res = await fetchWithRetry(url, {
      method: 'PUT',
      headers: authH(),
      body: body
    });

    let respText = '';
    try { respText = await res.text(); } catch(_) {}
    console.log('[saveBilling] response:', res.status, respText.slice(0, 200));

    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try {
        const j = JSON.parse(respText);
        if (j.error) errMsg += ': ' + j.error;
      } catch(_) { errMsg += ': ' + respText.slice(0, 80); }
      throw new Error(errMsg);
    }
    toast(`저장 완료 (${rows.length}건)`);
  } catch(e) {
    console.error('[saveBilling] 실패:', e);
    toast('저장 실패: ' + (e.message || '알 수 없는 오류'), 'error');
  }
}

/* ════════ 엑셀 다운로드 ════════ */
function exportExcel() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!rows.length) { toast('출력할 데이터가 없습니다.', 'error'); return; }
  const td = new Date(t);
  const month = td.getMonth() + 1; // 청구월 = 종료일이 속한 달

  const mkS = (bgRgb, fontRgb, bold=false, sz=10, halign='center') => ({
    font: { bold, sz, color:{rgb:fontRgb}, name:'맑은 고딕' },
    fill: bgRgb ? { patternType:'solid', fgColor:{rgb:bgRgb} } : undefined,
    alignment: { horizontal:halign, vertical:'center', wrapText:true },
    border: { top:{style:'thin',color:{rgb:'BFBFBF'}}, bottom:{style:'thin',color:{rgb:'BFBFBF'}},
              left:{style:'thin',color:{rgb:'BFBFBF'}}, right:{style:'thin',color:{rgb:'BFBFBF'}} }
  });

  const CREAM = 'FFFEF0';   // 데이터 행 크림색 배경
  const S_TITLE = mkS('1F4E78','FFFFFF',true,15);
  const S_LABEL = mkS('DBEAFE','1E3A8A',true,10,'center');   // 청구연월/입력안내 라벨
  const S_MONTH = mkS('FEF9C3','854D0E',true,12,'center');   // 연월 값 (노랑)
  const S_NOTE  = mkS('FFFBEB','C2410C',false,9,'left');     // 안내문(주황 텍스트)
  const S_GUIDE = mkS('F8FAFC','475569',false,9,'left');     // 입력안내 문구(회색)
  const S_GRP_INFO = mkS('1E293B','FFFFFF',true,11);
  const S_GRP_C    = mkS('1E40AF','FFFFFF',true,11);
  const S_GRP_S    = mkS('B91C1C','FFFFFF',true,11);
  const S_GRP_SUM  = mkS('7C3AED','FFFFFF',true,11);
  const S_HDR  = mkS('DBEAFE','1E3A8A',true,10);
  const S_TXT  = mkS(CREAM,'000000',false,10);
  const S_TXTL = mkS(CREAM,'000000',false,10,'left');
  const S_NUM  = { ...mkS(CREAM,'000000',false,10,'right'), numFmt:'#,##0' };
  const S_CALC = { ...mkS('F0FDF4','065F46',true,10,'right'), numFmt:'#,##0' };

  // 컬럼 헤더 (첨부 양식: 19컬럼)
  const HDRS = [
    'No.','차량사용일','DN No.','출발지','출발지\n상호','도착지\n(구/군)','도착지 상호','내용','차종',
    '기본운임','추가비용',          // 운송사 운임
    '',                            // 운송사 실제 청구금액 (그룹행과 세로병합)
    '기본운임','추가비용',          // 화주 청구 운임
    '','','','',''                 // 운송사합계/화주합계/차액/Q'ty/비고 (그룹행과 세로병합)
  ];
  const year = td.getFullYear();
  const aoa = [];
  // Row 1: 제목 (19 cols)
  aoa.push([`메틀러토레도 월별 운송비 청구서`, ...Array(18).fill('')]);
  // Row 2: 청구 연월 + 안내문
  const r2 = Array(19).fill('');
  r2[0] = '청구 연월';
  r2[2] = `${year}년 ${String(month).padStart(2,'0')}월`;
  r2[3] = '※ 출발지 상호가 ACT인 경우 도착지(구/군)와 차종을 입력하면 운송사·화주 운임이 자동 조회됩니다. 그 외는 직접 입력하세요.';
  aoa.push(r2);
  // Row 3: 입력 안내
  const r3 = Array(19).fill('');
  r3[0] = '입력 안내';
  r3[2] = '노란 셀: 직접 입력  |  초록 셀: 자동 조회(출발지 상호=ACT)  |  출발지 상호가 ACT가 아니면 운임 직접 입력';
  aoa.push(r3);
  // Row 4: 그룹 헤더
  aoa.push([
    '기본 정보','','','','','','','','',
    '운송사 운임','',
    '운송사 실제\n청구금액',
    '화주 청구 운임','',
    '운송사\n합계','화주\n합계','차액\n(화주-운송사)',"Q'ty",'비고'
  ]);
  // Row 5: 컬럼 헤더
  aoa.push(HDRS);
  // Row 6+: 데이터
  rows.forEach(r => {
    const cBaseN  = num(r.cBase) || 0;
    const cExtraN = num(r.cExtra) || 0;
    const cTotal  = cBaseN + cExtraN;
    const sTotal  = num(r.sBase) + num(r.sExtra);
    const diff    = sTotal - cTotal;
    aoa.push([
      r.no, r.date, r.dn, r.src, r.srcCode, r.dest, r.destCode, r.type, r.vehicle,
      cBaseN, cExtraN, num(r.cActual),
      num(r.sBase), num(r.sExtra),
      cTotal, sTotal, diff, r.qty, r.memo
    ]);
  });
  // 합계
  const totalC = rows.reduce((s,r) => s + num(r.cBase) + num(r.cExtra), 0);
  const totalActual = rows.reduce((s,r) => s + num(r.cActual), 0);
  const totalS = rows.reduce((s,r) => s + num(r.sBase) + num(r.sExtra), 0);
  const totalDiff = totalS - totalC;
  aoa.push([
    `합계 (${rows.length}건)`,'','','','','','','','',
    '','', totalActual,
    '','',
    totalC, totalS, totalDiff, '',''
  ]);

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // ── 수식 삽입: 합계/차액은 값이 아닌 수식으로 출력 (엑셀에서 금액 수정 시 자동 재계산) ──
  // 컬럼: J=기본운임(운송사) K=추가비용(운송사) L=실제청구 M=기본운임(화주) N=추가비용(화주)
  //       O=운송사합계 P=화주합계 Q=차액
  const firstDataRow = 6;                     // 엑셀 1-based 첫 데이터 행
  const lastDataRow  = 5 + rows.length;       // 엑셀 1-based 마지막 데이터 행
  rows.forEach((r, ri) => {
    const xlRow = firstDataRow + ri;          // 엑셀 1-based 행번호
    const sheetR = 5 + ri;                    // SheetJS 0-based 행 인덱스
    const cBaseN = num(r.cBase) || 0, cExtraN = num(r.cExtra) || 0;
    const sBaseN = num(r.sBase) || 0, sExtraN = num(r.sExtra) || 0;
    // O 운송사합계 = J + K
    ws[XLSX.utils.encode_cell({r:sheetR,c:14})] = { t:'n', f:`J${xlRow}+K${xlRow}`, v:cBaseN+cExtraN };
    // P 화주합계 = M + N
    ws[XLSX.utils.encode_cell({r:sheetR,c:15})] = { t:'n', f:`M${xlRow}+N${xlRow}`, v:sBaseN+sExtraN };
    // Q 차액 = P - O
    ws[XLSX.utils.encode_cell({r:sheetR,c:16})] = { t:'n', f:`P${xlRow}-O${xlRow}`, v:(sBaseN+sExtraN)-(cBaseN+cExtraN) };
  });
  // 합계 행 수식 (SUM)
  if (rows.length) {
    const totRow = 6 + rows.length;           // 엑셀 1-based 합계행
    const totR   = 5 + rows.length;           // SheetJS 0-based
    ws[XLSX.utils.encode_cell({r:totR,c:11})] = { t:'n', f:`SUM(L${firstDataRow}:L${lastDataRow})`, v:totalActual };
    ws[XLSX.utils.encode_cell({r:totR,c:14})] = { t:'n', f:`SUM(O${firstDataRow}:O${lastDataRow})`, v:totalC };
    ws[XLSX.utils.encode_cell({r:totR,c:15})] = { t:'n', f:`SUM(P${firstDataRow}:P${lastDataRow})`, v:totalS };
    ws[XLSX.utils.encode_cell({r:totR,c:16})] = { t:'n', f:`P${totRow}-O${totRow}`, v:totalDiff };
  }

  // 셀 스타일 적용
  const COL = 19;
  // 병합: 제목/청구기간 + 그룹 헤더(가로) + 세로병합 5개 단독 컬럼
  ws['!merges'] = [
    { s:{r:0,c:0}, e:{r:0,c:COL-1} },        // 제목
    { s:{r:1,c:0}, e:{r:1,c:1} },            // "청구 연월" 라벨
    { s:{r:1,c:3}, e:{r:1,c:COL-1} },        // 안내문구
    { s:{r:2,c:0}, e:{r:2,c:1} },            // "입력 안내" 라벨
    { s:{r:2,c:2}, e:{r:2,c:COL-1} },        // 입력안내 문구
    { s:{r:3,c:0},  e:{r:3,c:8} },    // 기본 정보 (9)
    { s:{r:3,c:9},  e:{r:3,c:10} },   // 운송사 운임 (2)
    { s:{r:3,c:11}, e:{r:4,c:11} },   // 운송사 실제 청구금액 (세로병합)
    { s:{r:3,c:12}, e:{r:3,c:13} },   // 화주 청구 운임 (2)
    { s:{r:3,c:14}, e:{r:4,c:14} },   // 운송사 합계 (세로병합)
    { s:{r:3,c:15}, e:{r:4,c:15} },   // 화주 합계 (세로병합)
    { s:{r:3,c:16}, e:{r:4,c:16} },   // 차액 (세로병합)
    { s:{r:3,c:17}, e:{r:4,c:17} },   // Q'ty (세로병합)
    { s:{r:3,c:18}, e:{r:4,c:18} },   // 비고 (세로병합)
  ];

  // 1행 제목
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:0,c}); if (ws[ref]) ws[ref].s = S_TITLE;
  }
  // 2행: 청구 연월 + 안내문
  const setS = (r,c,st) => { const ref=XLSX.utils.encode_cell({r,c}); if(ws[ref]) ws[ref].s=st; };
  setS(1,0,S_LABEL); setS(1,1,S_LABEL); setS(1,2,S_MONTH);
  for (let c=3;c<COL;c++) setS(1,c,S_NOTE);
  // 3행: 입력 안내
  setS(2,0,S_LABEL); setS(2,1,S_LABEL);
  for (let c=2;c<COL;c++) setS(2,c,S_GUIDE);
  // 그룹 헤더 (4행) — 컬럼별 색상
  // 0-8 기본정보 / 9-10 운송사운임 / 11 실제청구 / 12-13 화주청구 / 14 운송사합계 / 15 화주합계 / 16-18 기타
  const S_GRP_LBLUE = mkS('BFDBFE','1E3A8A',true,11);   // 운송사 운임/실제청구 (연한 파랑)
  const S_GRP_ORANGE = mkS('C2703C','FFFFFF',true,11);  // 화주 청구 운임 (주황)
  const grpColorOf = c => {
    if (c <= 8) return S_GRP_INFO;       // 기본 정보 (네이비)
    if (c <= 11) return S_GRP_LBLUE;     // 운송사 운임 + 실제청구 (연파랑)
    if (c <= 13) return S_GRP_ORANGE;    // 화주 청구 운임 (주황)
    return S_GRP_INFO;                   // 운송사합계/화주합계/차액/Qty/비고 (네이비)
  };
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:3,c}); if (ws[ref]) ws[ref].s = grpColorOf(c);
  }
  // 컬럼 헤더 (5행)
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:4,c}); if (ws[ref]) ws[ref].s = S_HDR;
  }
  // 숫자 컬럼: 9,10(운송사 기본/추가) 11(실제청구) 12,13(화주 기본/추가) 14(운송사합계) 15(화주합계) 16(차액)
  const numCols = [9,10,11,12,13,14,15,16];
  rows.forEach((_, ri) => {
    for (let c=0; c<COL; c++) {
      const ref = XLSX.utils.encode_cell({r:5+ri,c});
      if (!ws[ref]) continue;
      if (numCols.includes(c)) {
        if ([14,15,16].includes(c)) ws[ref].s = S_CALC;   // 합계/차액 강조
        else ws[ref].s = S_NUM;
      } else if (c === 3 || c === 18) {
        ws[ref].s = S_TXTL;   // 출발지 / 비고 좌측정렬
      } else {
        ws[ref].s = S_TXT;
      }
    }
  });
  // 합계 행
  const totalRow = 5 + rows.length;
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:totalRow,c});
    if (!ws[ref]) ws[ref] = { v:'' };
    ws[ref].s = mkS('FEF3C7','9A3412',true,11, c>=9?'right':'center');
    if ([11,14,15,16].includes(c)) ws[ref].s = { ...ws[ref].s, numFmt:'#,##0' };
  }

  ws['!cols'] = [
    {wch:5},{wch:12},{wch:16},{wch:8},{wch:13},{wch:11},{wch:16},{wch:7},{wch:8},
    {wch:11},{wch:10},{wch:16},
    {wch:11},{wch:10},
    {wch:12},{wch:12},{wch:13},{wch:9},{wch:18}
  ];
  ws['!rows'] = [{hpt:30},{hpt:22},{hpt:20},{hpt:24},{hpt:34},...rows.map(()=>({hpt:18})),{hpt:24}];

  const wb = { SheetNames:['운송비청구서'], Sheets:{ '운송비청구서': ws } };
  const fname = `메틀러토레도_운송비청구서_${f}_${t}.xlsx`;
  XLSX.writeFile(wb, fname);
}

        <button onclick="document.getElementById('rateLookupModal').remove()" style="background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:15px;">✕</button>

            onkeydown="if(event.key==='Enter')doRateLookup()">
          <button onclick="doRateLookup()" style="background:#0284c7;color:#fff;border:none;border-radius:8px;padding:0 18px;cursor:pointer;font-weight:700;font-size:14px;">조회</button>
        </div>
        <div style="font-size:11px;color:#94a3b8;margin-bottom:12px;">운임표와 동일하게 정규화·별칭 매칭됩니다 (수정값 반영)</div>
        <div id="rlResult"></div>

function doRateLookup() {
  const VT = ['다마스','1톤','2.5톤','5톤','11톤'];
  const raw = document.getElementById('rlInput').value.trim();
  const box = document.getElementById('rlResult');
  if (!raw) { box.innerHTML = '<div style="color:#ef4444;font-size:13px;">시군구를 입력하세요.</div>'; return; }
  const norm = normalizeDistrict(raw);
  const aliased = aliasMatch(raw);
  // 매칭된 시군구 표시명
  let matchedName = '';
  for (const vt of VT) { if (lookupRate(raw, vt, 'carrier') > 0) { matchedName = norm; break; } }
  if (!matchedName && aliased) matchedName = aliased;

  let rowsHtml = '';
  let anyMatch = false;
  VT.forEach(vt => {
    const c = lookupRate(raw, vt, 'carrier');
    const k = lookupRate(raw, vt, 'shipper');
    if (c > 0 || k > 0) anyMatch = true;
    rowsHtml += `<tr>
      <td style="padding:7px 10px;border:1px solid #e2e8f0;font-weight:600;">${vt}</td>
      <td style="padding:7px 10px;border:1px solid #e2e8f0;text-align:right;color:#1e40af;font-weight:700;">${c>0?c.toLocaleString():'-'}</td>
      <td style="padding:7px 10px;border:1px solid #e2e8f0;text-align:right;color:#166534;font-weight:700;">${k>0?k.toLocaleString():'-'}</td>
    </tr>`;
  });
  box.innerHTML = `
    <div style="font-size:13px;margin-bottom:8px;">
      입력 <b>"${raw}"</b> → ${anyMatch ? `인식 시군구 <b style="color:#0284c7;">${matchedName||norm}</b>` : '<b style="color:#ef4444;">운임표 미매칭</b>'}
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr>
        <th style="padding:8px;border:1px solid #cbd5e0;background:#f1f5f9;">차종</th>
        <th style="padding:8px;border:1px solid #cbd5e0;background:#ebf4ff;color:#1e40af;">운송사 운임</th>
        <th style="padding:8px;border:1px solid #cbd5e0;background:#f0fff4;color:#166534;">화주 청구 운임</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    ${anyMatch ? '' : '<div style="font-size:12px;color:#d97706;margin-top:8px;">⚠ 별칭/구·동명을 다르게 입력하거나 시 이름(예: 용인, 화성)으로 시도해보세요.</div>'}`;
}

/* ════════ 운임표 확인/수정 (billing.html과 동일 · rate_override 공유) ════════ */
const RATE_OVERRIDE_KEY = 'rate_override';
function openRateModal() {
  const VEHICLE_TYPES = ['다마스','1톤','2.5톤','5톤','11톤'];
  let overrides = {};
  try { overrides = JSON.parse(localStorage.getItem(RATE_OVERRIDE_KEY) || '{}'); } catch(e) {}
  const grouped = {};
  Object.entries(RATE_TABLE).forEach(([key, v]) => {
    if (!grouped[v.sido]) grouped[v.sido] = [];
    grouped[v.sido].push({ key, sigun: v.sigun, carrier: v.carrier, client: v.client });
  });
  const thBase = 'padding:10px 8px;text-align:center;font-size:13px;font-weight:700;border:1px solid #cbd5e0;white-space:nowrap;';
  const thC = thBase + 'background:#ebf4ff;color:#1e40af;';
  const thK = thBase + 'background:#f0fff4;color:#166534;';
  const thLabel = thBase + 'background:#f7fafc;color:#374151;text-align:left;';
  let html = `
  <div id="rateModal" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow:auto;">
    <div style="background:#fff;border-radius:16px;width:100%;max-width:1100px;box-shadow:0 12px 48px rgba(0,0,0,.2);overflow:hidden;">
      <div style="background:linear-gradient(135deg,#667eea,#764ba2);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="color:#fff;font-size:18px;font-weight:700;"><i class="fas fa-table" style="margin-right:8px;"></i>운임표 확인 / 수정</div>
          <div style="color:rgba(255,255,255,.75);font-size:12px;margin-top:4px;">수정 후 저장하면 이 기기의 운송청구서·운송내역서 양쪽에 함께 반영됩니다</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="saveRateOverrides()" style="background:#fff;color:#667eea;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-weight:700;font-size:13px;"><i class="fas fa-save"></i> 저장</button>
          <button onclick="resetRateOverrides()" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;"><i class="fas fa-undo"></i> 초기화</button>
          <button onclick="document.getElementById('rateModal').remove()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:16px;">✕</button>
        </div>
      </div>
      <div style="padding:10px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;gap:20px;font-size:12px;align-items:center;">
        <span style="background:#ebf4ff;color:#1e40af;border:1.5px solid #bfdbfe;padding:3px 10px;border-radius:6px;font-weight:600;">■ 운송사 운임</span>
        <span style="background:#f0fff4;color:#166534;border:1.5px solid #bbf7d0;padding:3px 10px;border-radius:6px;font-weight:600;">■ 화주 청구 운임</span>
        <span style="background:#fefce8;color:#854d0e;border:1.5px solid #fde68a;padding:3px 10px;border-radius:6px;font-weight:600;">■ 수정된 값</span>
        <span style="color:#6b7280;">값을 클릭하여 직접 수정 가능합니다</span>
      </div>
      <div style="overflow:auto;max-height:72vh;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead style="position:sticky;top:0;z-index:2;">
          <tr>
            <th rowspan="2" style="${thLabel}min-width:70px;">시도</th>
            <th rowspan="2" style="${thLabel}min-width:65px;">시군구</th>
            <th colspan="5" style="${thC}border-bottom:none;">🚚 운송사 운임</th>
            <th colspan="5" style="${thK}border-bottom:none;">🏢 화주 청구 운임</th>
          </tr>
          <tr>
            ${VEHICLE_TYPES.map(v=>`<th style="${thC}min-width:82px;">${v}</th>`).join('')}
            ${VEHICLE_TYPES.map(v=>`<th style="${thK}min-width:82px;">${v}</th>`).join('')}
          </tr>
        </thead>
        <tbody>`;
  let rowIdx = 0;
  Object.entries(grouped).sort().forEach(([sido, items]) => {
    items.sort((a,b)=>a.sigun.localeCompare(b.sigun,'ko')).forEach((item, ii) => {
      const bg = rowIdx%2===0 ? '#ffffff' : '#f9fafb';
      const ov = overrides[item.key] || {};
      const sidoTd = ii===0
        ? `<td rowspan="${items.length}" style="padding:8px 10px;border:1px solid #e2e8f0;font-weight:700;color:#374151;background:#f0f4ff;text-align:center;vertical-align:middle;font-size:12px;">${sido}</td>`
        : '';
      html += `<tr style="background:${bg};">
        ${sidoTd}
        <td style="padding:7px 10px;border:1px solid #e2e8f0;font-weight:600;color:#1a202c;white-space:nowrap;">${item.sigun}</td>
        ${VEHICLE_TYPES.map(vt=>{
          const orig = item.carrier[vt];
          const val = ov[`c_${vt}`] ?? orig;
          const isOv = ov[`c_${vt}`] != null;
          return `<td style="padding:3px 4px;border:1px solid #e2e8f0;background:${isOv?'#fefce8':'#f0f7ff'};">
            <input type="text" data-key="${item.key}" data-field="c_${vt}" value="${val!=null?val.toLocaleString():''}" placeholder="-"
              style="width:100%;background:${isOv?'#fef9c3':'transparent'};color:${isOv?'#92400e':'#1e40af'};border:none;text-align:right;padding:5px 6px;font-size:13px;font-weight:${isOv?'700':'400'};border-radius:4px;font-family:inherit;"
              oninput="markRateInput(this)"></td>`;
        }).join('')}
        ${VEHICLE_TYPES.map(vt=>{
          const orig = item.client[vt];
          const val = ov[`k_${vt}`] ?? orig;
          const isOv = ov[`k_${vt}`] != null;
          return `<td style="padding:3px 4px;border:1px solid #e2e8f0;background:${isOv?'#fefce8':'#f0fff4'};">
            <input type="text" data-key="${item.key}" data-field="k_${vt}" value="${val!=null?val.toLocaleString():''}" placeholder="-"
              style="width:100%;background:${isOv?'#fef9c3':'transparent'};color:${isOv?'#92400e':'#166534'};border:none;text-align:right;padding:5px 6px;font-size:13px;font-weight:${isOv?'700':'400'};border-radius:4px;font-family:inherit;"
              oninput="markRateInput(this)"></td>`;
        }).join('')}
      </tr>`;
      rowIdx++;
    });
  });
  html += `</tbody></table></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}
function markRateInput(el) {
  el.style.background = '#fef9c3'; el.style.color = '#92400e'; el.style.fontWeight = '700';
}
function saveRateOverrides() {
  let overrides = {};
  try { overrides = JSON.parse(localStorage.getItem(RATE_OVERRIDE_KEY) || '{}'); } catch(e) {}
  document.querySelectorAll('#rateModal input[data-key]').forEach(inp => {
    const key = inp.dataset.key, field = inp.dataset.field;
    const rawv = inp.value.replace(/[^0-9]/g,'');
    if (!overrides[key]) overrides[key] = {};
    if (rawv === '') delete overrides[key][field];
    else overrides[key][field] = parseInt(rawv);
  });
  // 빈 객체 정리
  Object.keys(overrides).forEach(k => { if (!Object.keys(overrides[k]).length) delete overrides[k]; });
  localStorage.setItem(RATE_OVERRIDE_KEY, JSON.stringify(overrides));
  document.getElementById('rateModal').remove();
  toast('운임표가 저장되었습니다. 데이터 조회 시 반영됩니다.');
  loadBilling();
}
function resetRateOverrides() {
  if (!confirm('저장된 운임 수정값을 모두 초기화하고 기본 운임표로 되돌릴까요?')) return;
  localStorage.removeItem(RATE_OVERRIDE_KEY);
  document.getElementById('rateModal').remove();
  toast('운임표가 기본값으로 초기화되었습니다.');
  loadBilling();
}
</script>
</body>
</html>
