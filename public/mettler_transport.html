<script>
const TYPE_OPTIONS = ['','왕복','이동','입고','재고이동','지역간','출고'];
const VEHICLE_OPTIONS = ['','오토바이','다마스','라보','1톤','2.5톤','3.5톤','5톤','11톤'];

let rates = [];        // 운임표 (mettler_rates.json)
let rows = [];         // 현재 청구서 행 데이터

const adminToken = sessionStorage.getItem('adminToken');
const staffToken = sessionStorage.getItem('staffToken');
const authToken  = adminToken || staffToken;
const authH = () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+authToken });

const fmt = n => (n||0).toLocaleString('ko-KR');
const num = v => { const n = parseFloat(String(v).replace(/[^\d.-]/g,'')); return isNaN(n)?0:n; };

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2600);
}

/* ════════ 기간 설정 ════════
 * 청구 주기: 전월 16일 ~ 당월 15일 (당월 청구분)
 * - 오늘 5/2 (날짜 ≤15): 이번달 청구 = 4/16 ~ 5/15
 * - 오늘 5/20 (날짜 ≥16): 이번달 청구 = 5/16 ~ 6/15
 */
function setQuickRange(mode) {
  const today = new Date();
  // 오늘이 속한 청구 주기의 시작/종료 계산
  let cycleStart, cycleEnd;
  if (today.getDate() >= 16) {
    // 이번달 16일 ~ 다음달 15일
    cycleStart = new Date(today.getFullYear(), today.getMonth(), 16);
    cycleEnd   = new Date(today.getFullYear(), today.getMonth() + 1, 15);
  } else {
    // 전월 16일 ~ 이번달 15일
    cycleStart = new Date(today.getFullYear(), today.getMonth() - 1, 16);
    cycleEnd   = new Date(today.getFullYear(), today.getMonth(), 15);
  }
  let from, to;
  if (mode === 'this') {
    from = cycleStart; to = cycleEnd;
  } else if (mode === 'prev') {
    from = new Date(cycleStart.getFullYear(), cycleStart.getMonth() - 1, 16);
    to   = new Date(cycleStart.getFullYear(), cycleStart.getMonth(), 15);
  } else if (mode === 'next') {
    from = new Date(cycleStart.getFullYear(), cycleStart.getMonth() + 1, 16);
    to   = new Date(cycleStart.getFullYear(), cycleStart.getMonth() + 2, 15);
  }
  document.getElementById('dateFrom').value = todayKST(from);
  document.getElementById('dateTo').value   = todayKST(to);
  updatePeriodInfo();
}

function updatePeriodInfo() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  document.getElementById('docPeriod').textContent = (f && t) ? `${f} ~ ${t}` : '-';
  // 제목 업데이트 — 청구월 = 종료일이 속한 달
  if (f && t) {
    const td = new Date(t);
    document.getElementById('docTitle').textContent =
      `메틀러토레도 ${td.getMonth()+1}월 운송비 청구서`;
  }
  document.getElementById('periodInfo').textContent =
    (f && t) ? `※ 메틀러 운송 청구는 전월 16일~당월 15일 주기` : '';
}

function periodKey() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!f || !t) return null;
  return `${f}~${t}`;
}

/* ════════ 운임표 로드 ════════ */
async function loadRates() {
  try {
    const res = await fetch('mettler_rates.json', { cache: 'force-cache' });
    rates = await res.json();
  } catch(e) {
    console.error('운임표 로드 실패:', e);
    rates = [];
  }
}

  '용산':'용산구','은평':'은평구','종로':'종로구','중랑':'중랑구',

  '강남':'강남구','테헤란로':'강남구','역삼':'강남구','삼성':'강남구','대치':'강남구','논현':'강남구','신사':'강남구','압구정':'강남구','청담':'강남구','도곡':'강남구','개포':'강남구','일원':'강남구','수서':'강남구','자곡':'강남구',
  '미아':'강북구','수유':'강북구','우이':'강북구','번동':'강북구',

  '신림':'관악구','봉천':'관악구','남현':'관악구',

  '시흥동':'금천구','독산':'금천구','가산':'금천구',
  '상계':'노원구','중계':'노원구','하계':'노원구','월계':'노원구','공릉':'노원구',

// 입력값을 운임표 시군구 형태로 정규화 (예: "경기도 용인시" → "용인")
// 광역시 단독명 → 운임표 매칭값 (대전, 광주, 울산, 세종)
const SIDO_TO_SIGUN = {
  '대전광역시':'대전','대전':'대전',
  '광주광역시':'광주','광주':'광주',
  '울산광역시':'울산','울산':'울산',
  '세종특별자치시':'세종','세종':'세종',
};

// RATE_TABLE에 sigun이 존재하는지 확인 (billing.html과 호환)
function rtHas(name) {
  if (typeof RATE_TABLE === 'undefined') return false;
  for (const k in RATE_TABLE) if (RATE_TABLE[k].sigun === name) return true;
  return false;
}

function normalizeRegion(input) {
  if (!input) return '';
  let s = String(input).trim();
  // 광역시/시도 단독명
  if (SIDO_TO_SIGUN[s]) return SIDO_TO_SIGUN[s];
  // 시도 prefix 제거
  for (const sido of SIDO_PREFIXES) {
    if (s.startsWith(sido + ' ')) { s = s.substring(sido.length).trim(); break; }
  }
  // 첫 번째 토큰
  const firstToken = s.split(/\s+/)[0];
  // RATE_TABLE에 직접 매칭되는지
  if (rtHas(s)) return s;
  if (rtHas(firstToken)) return firstToken;
  // "OO시" → "OO"
  if (firstToken.endsWith('시') && firstToken.length >= 3) {
    const cand = firstToken.slice(0, -1);
    if (rtHas(cand)) return cand;
  }
  // "OO군" → "OO"
  if (firstToken.endsWith('군') && firstToken.length >= 3) {
    const cand = firstToken.slice(0, -1);
    if (rtHas(cand)) return cand;
  }
  // 별칭 매핑 (구/읍/면) - 입력 전체에서 alias 키 찾기
  for (const key of Object.keys(REGION_ALIAS)) {
    if (s.includes(key)) return REGION_ALIAS[key];
  }
  // 첫 토큰으로 alias
  if (REGION_ALIAS[firstToken]) return REGION_ALIAS[firstToken];
  // 모두 실패 시 원본 (또는 첫 토큰) 반환
  return firstToken || s;
}

// 도착지(시/군)와 차종으로 운임 조회
// billing.html(운송청구서)과 동일한 RATE_TABLE 사용 (rates.js)
function lookupRate(sigungu, vehicle, side) {
  if (!sigungu || !vehicle) return 0;
  if (typeof RATE_TABLE === 'undefined') return 0;
  const RATE_VEHICLES = ['다마스','1톤','2.5톤','5톤','11톤'];
  if (!RATE_VEHICLES.includes(vehicle)) return 0;
  const normalized = normalizeRegion(sigungu);
  if (!normalized) return 0;

  // 1차: 정확 매칭
  for (const key in RATE_TABLE) {
    const e = RATE_TABLE[key];
    if (e.sigun === normalized) {
      const v = side === 'shipper' ? e.client[vehicle] : e.carrier[vehicle];
      return v || 0;
    }
  }
  // 2차: 부분 매칭 (시/군 제거 후)
  const clean = normalized.replace(/[시도구군읍면동로길]/g,'');
  for (const key in RATE_TABLE) {
    const e = RATE_TABLE[key];
    const sc = e.sigun.replace(/[시도구군읍면동]/g,'');
    if (clean && sc && (clean.includes(sc) || sc.includes(clean))) {
      const v = side === 'shipper' ? e.client[vehicle] : e.carrier[vehicle];
      return v || 0;
    }
  }
  return 0;
}

// 주소에서 시/군 추출 (정규화 적용)
function extractSigungu(address) {
  if (!address) return '';
  return normalizeRegion(address);
}

// 도착지 상호로 시군구 추론 (특정 거래처는 고정 시군구)
// 운임표에 "송파구"로 등록되어 있으므로 "송파구"로 매핑
const DEST_NAME_TO_REGION = {
  '메틀러토레도': '송파구',
  '메틀러토레도(주)': '송파구',
  '메틀러토레도㈜': '송파구',
  '한국메틀러토레도': '송파구',
  '메틀러토레도코리아': '송파구',
};
function regionFromDestName(destName) {
  if (!destName) return '';
  const s = String(destName).replace(/\s+/g,'');
  for (const key of Object.keys(DEST_NAME_TO_REGION)) {
    if (s.includes(key.replace(/\s+/g,''))) return DEST_NAME_TO_REGION[key];
  }
  return '';
}

/* ════════ 데이터 조회 ════════ */
async function loadBilling() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!f || !t) { toast('청구 기간을 선택해주세요.', 'error'); return; }
  if (f > t) { toast('시작일이 종료일보다 클 수 없습니다.', 'error'); return; }
  updatePeriodInfo();

  // 1) 서버 저장본 미리 가져오기 (메모/수동 수정값 병합용)
  const key = periodKey();
  let serverRows = [];
  try {
    const r = await fetch('/api/mettler-transport/' + encodeURIComponent(key), { headers: authH() });
    const j = await r.json();
    serverRows = j.data || [];
  } catch(e) {}

  // 2) 항상 admin 오더에서 fresh 로드 (billing.html과 동일 결과 보장)
  try {
    const url = `/api/records?dateFrom=${encodeURIComponent(f)}&dateTo=${encodeURIComponent(t)}&client_code=mettler&limit=2000`;
    const r = await fetch(url, { headers: authH() });
    if (!r.ok) {
      const errText = await r.text();
      throw new Error(`HTTP ${r.status}: ${errText.slice(0,100)}`);
    }
    const j = await r.json();
    const orders = (j.data || j || []);
    console.log('[admin records]', orders.length, '건');

    // 등록이 빠른 순(오래된 순) 정렬 — delivery_date asc, 같은 날짜는 id asc
    orders.sort((a, b) => {
      const da = (a.delivery_date || '').slice(0,10);
      const db = (b.delivery_date || '').slice(0,10);
      if (da !== db) return da.localeCompare(db);
      return (a.id || 0) - (b.id || 0);
    });

    rows = orders.map((o, idx) => {
      // billing.html과 동일한 변환 로직
      const vt = o.vehicle_type || '';
      const tt = o.transport_type || '';

      // 운임 기준 시군구 결정
      let billingDistrict = '';
      if (tt === '회수') {
        billingDistrict = o.origin_sigun || extractSigungu(o.origin_address || '');
      } else {
        billingDistrict = o.dest_sigun || extractSigungu(o.customer_address || '');
      }
      // 자동정정: 운임 매칭 안되면 다양한 방법 시도
      if (vt && (!billingDistrict || lookupRate(billingDistrict, vt, 'carrier') === 0)) {
        // 1차: 도착지 상호로 추론 (메틀러토레도 → 송파구)
        let alt = regionFromDestName(o.customer_company || '');
        // 2차: customer_address 전체에서 별칭 매칭
        if (!alt || lookupRate(alt, vt, 'carrier') === 0) {
          alt = normalizeRegion(o.customer_address || '');
        }
        // 3차: 기존 billingDistrict 자체를 정규화
        if ((!alt || lookupRate(alt, vt, 'carrier') === 0) && billingDistrict) {
          alt = normalizeRegion(billingDistrict);
        }
        if (alt && lookupRate(alt, vt, 'carrier') > 0) {
          console.log(`[자동정정] ${o.order_no}: ${billingDistrict || '(없음)'} → ${alt}`);
          billingDistrict = alt;
        }
      }

      // 출발지/도착지 표시
      let originDisplay = '', originNameDisplay = '', destNameDisplay = '';
      if (tt === '회수' || tt === '입고') {
        originDisplay = billingDistrict || o.origin_sigun || extractSigungu(o.origin_address || '') || o.origin || '';
        originNameDisplay = o.customer_company || '';
        destNameDisplay = 'ACT';
      } else {
        const isActOrigin = (o.origin === 'ACT' || (o.origin || '').toUpperCase() === 'ACT');
        originNameDisplay = isActOrigin ? 'ACT' : (o.origin_address || o.origin || 'ACT');
        originDisplay = isActOrigin ? '김포' : (o.origin_sigun || extractSigungu(o.origin_address || '') || o.origin || '김포');
        destNameDisplay = o.customer_company || '';
      }

      // 내용(형태) 자동결정
      let content = '';
      if (originNameDisplay === 'ACT') content = '출고';
      else if (destNameDisplay === 'ACT') content = '입고';
      else content = '이동';
      if (tt && !['출고','회수','이동','입고'].includes(tt)) content = tt;

      // 추가운임(work_fee) — billing.html과 동일하게 운송사/화주 양쪽에 적용
      const addFee = parseInt(o.work_fee) || 0;

      const row = {
        no: idx + 1,
        date: (o.delivery_date || '').slice(0,10),
        dn: o.order_no || '',
        src: originDisplay,
        srcCode: originNameDisplay || 'ACT',
        dest: billingDistrict,
        destCode: destNameDisplay,
        type: content,
        vehicle: vt,
        cBase: 0, cExtra: addFee, cActual: 0, cMemo: '',
        sBase: 0, sExtra: addFee,
        qty: o.quantity || '',
        memo: o.notes || '',
        _src: 'auto'
      };
      autoCalcRow(row);
      return row;
    });

    // 3) 서버 저장본 병합 — DN 기준 매칭 시 저장된 모든 편집값 복원
    //    (사용자가 저장한 행은 저장본이 source of truth, 자동계산 결과를 덮어씀)
    if (serverRows.length) {
      let merged = 0;
      // 매칭에 사용된 저장본 DN 추적 → 저장본에만 있는 행(삭제된 오더 등)도 유지
      const usedDN = new Set();
      rows.forEach(row => {
        const sv = serverRows.find(s => s.dn && s.dn === row.dn && !usedDN.has(s));
        if (sv) {
          usedDN.add(sv);
          // 저장본의 모든 편집 필드를 복원 (no, _src 제외)
          Object.keys(sv).forEach(k => {
            if (k === 'no' || k === '_src') return;
            row[k] = sv[k];
          });
          merged++;
        }
      });
      // 저장본에만 있고 fresh 오더에는 없는 행 추가 (수동 입력행 보존)
      serverRows.forEach(sv => {
        if (!usedDN.has(sv)) {
          rows.push({ ...sv, no: rows.length + 1, _src: sv._src || 'manual' });
        }
      });
      renumber();
      console.log(`[병합] 저장본 ${serverRows.length}건 중 ${merged}건 병합, 추가 ${serverRows.length - merged}건`);
    }

    renderRows();
    if (rows.length) {
      const matched = rows.filter(r => r.cBase > 0 || r.sBase > 0).length;
      const mergedMsg = serverRows.length ? `, 저장본 병합` : '';
      toast(`운송청구서와 동일 ${rows.length}건 (자동매칭 ${matched}건${mergedMsg})`);
    } else {
      toast('해당 기간 메틀러 오더가 없습니다. + 행 추가로 직접 입력하세요.', 'error');
    }
  } catch(e) {
    console.error('데이터 조회 실패:', e);
    rows = [];
    renderRows();
    toast('데이터 조회 실패: ' + e.message, 'error');
  }
}

/* ════════ 행 추가/삭제 ════════ */
function addRow() {
  rows.push({
    no: rows.length + 1,
    date: '', dn: '', src: '김포', srcCode: 'ACT',
    dest: '', destCode: '', type: '', vehicle: '',
    cBase: 0, cExtra: 0, cActual: 0, cBill: 0, cMemo: '',
    sBase: 0, sExtra: 0,
    qty: '', memo: '', _src: 'manual'
  });
  renderRows();
}

function deleteRow(idx) {
  if (!confirm('이 행을 삭제하시겠습니까?')) return;
  rows.splice(idx, 1);
  renumber();
  renderRows();
}

function renumber() { rows.forEach((r, i) => r.no = i + 1); }

// ACT 출발지번호 체크 (대소문자 무관, 부분포함)
function isActSource(srcCode) {
  return /act/i.test(String(srcCode || ''));
}

// 도착지/차종/출발지번호 변경 시 자동계산
function autoCalcRow(row) {
  if (!row) return;
  // billing.html과 동일 — ACT 여부와 무관하게 도착지(구/군)+차종으로 운임 자동조회
  const cb = lookupRate(row.dest, row.vehicle, 'carrier');
  const sb = lookupRate(row.dest, row.vehicle, 'shipper');
  if (cb > 0) row.cBase = cb;
  if (sb > 0) row.sBase = sb;
}

/* ════════ 셀 변경 핸들러 ════════ */
function onCellChange(idx, field, value) {
  const row = rows[idx];
  if (!row) return;
  row[field] = value;
  // 도착지 입력 시 자동 정규화 (예: "경기도 용인시" → "용인")
  if (field === 'dest') {
    const normalized = normalizeRegion(value);
    if (normalized && normalized !== value) {
      row.dest = normalized;
    }
  }
  // 도착지번호 입력 시 거래처별 자동 시군구 (예: 메틀러토레도 → 송파)
  if (field === 'destCode') {
    const auto = regionFromDestName(value);
    if (auto && !row.dest) {
      row.dest = auto;
    } else if (auto) {
      // 이미 dest 있어도 메틀러는 송파로 강제 (사용자 요구)
      row.dest = auto;
    }
  }
  // 도착지/차종/출발지번호/도착지번호 변경 시 자동계산 갱신
  if (['dest','vehicle','srcCode','destCode'].includes(field)) {
    autoCalcRow(row);
    renderRows();
    return;
  }
  // 숫자 필드는 합계 다시 계산하기 위해 리렌더
  if (['cBase','cExtra','cActual','cBill','sBase','sExtra'].includes(field)) {
    row[field] = num(value);
    renderRows();
    return;
  }
}

/* ════════ 렌더링 ════════ */
function renderRows() {
  const body = document.getElementById('billBody');
  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="20" class="empty-state">
      <i class="fas fa-inbox"></i>
      <strong>등록된 청구 내역이 없습니다.</strong><br>
      청구 기간 선택 후 <strong>"데이터 조회"</strong>를 클릭하거나 <strong>"+ 행 추가"</strong> 버튼을 누르세요.
    </td></tr>`;
    document.getElementById('billFoot').innerHTML = '';
    return;
  }

  body.innerHTML = rows.map((r, idx) => {
    // 운송사 합계 = 기본운임(J) + 추가운임(K)
    const cBaseN  = num(r.cBase) || 0;
    const cExtraN = num(r.cExtra) || 0;
    const cTotal = cBaseN + cExtraN;
    const sTotal = (num(r.sBase) || 0) + (num(r.sExtra) || 0);
    const diff   = sTotal - cTotal;
    const diffCls = diff > 0 ? 'diff-pos' : (diff < 0 ? 'diff-neg' : 'diff-zero');
    const isACT = isActSource(r.srcCode);
    return `<tr>
      <td class="no"><button class="row-del-btn" onclick="deleteRow(${idx})" title="삭제"><i class="fas fa-times"></i></button></td>
      <td class="no">${r.no}<div class="row-badge ${r._src==='auto'?'auto':'manual'}" style="margin-top:2px;">${r._src==='auto'?'자동':'수동'}</div></td>
      <td><input type="date" value="${r.date||''}" onchange="onCellChange(${idx},'date',this.value)"></td>
      <td><input type="text" value="${r.dn||''}" onchange="onCellChange(${idx},'dn',this.value)"></td>
      <td><input type="text" class="left" value="${r.src||''}" onchange="onCellChange(${idx},'src',this.value)"></td>
      <td class="${isACT?'src-code-act':''}"><input type="text" value="${r.srcCode||''}" onchange="onCellChange(${idx},'srcCode',this.value)" placeholder="ACT"></td>
      <td><input type="text" value="${r.dest||''}" onchange="onCellChange(${idx},'dest',this.value)" placeholder="구/군"></td>
      <td><input type="text" value="${r.destCode||''}" onchange="onCellChange(${idx},'destCode',this.value)"></td>
      <td><select onchange="onCellChange(${idx},'type',this.value)">${TYPE_OPTIONS.map(t=>`<option value="${t}" ${r.type===t?'selected':''}>${t}</option>`).join('')}</select></td>
      <td><select onchange="onCellChange(${idx},'vehicle',this.value)">${VEHICLE_OPTIONS.map(v=>`<option value="${v}" ${r.vehicle===v?'selected':''}>${v}</option>`).join('')}</select></td>
      <td><input type="number" class="right" value="${r.cBase||''}" onchange="onCellChange(${idx},'cBase',this.value)" placeholder="${isACT?'자동':'0'}"></td>
      <td><input type="number" class="right" value="${r.cExtra||''}" onchange="onCellChange(${idx},'cExtra',this.value)"></td>
      <td><input type="number" class="right" value="${r.cActual||''}" onchange="onCellChange(${idx},'cActual',this.value)" placeholder="0"></td>
      <td><input type="number" class="right" value="${r.sBase||''}" onchange="onCellChange(${idx},'sBase',this.value)" placeholder="${isACT?'자동':'0'}"></td>
      <td><input type="number" class="right" value="${r.sExtra||''}" onchange="onCellChange(${idx},'sExtra',this.value)"></td>
      <td class="calc">${cTotal?fmt(cTotal):'-'}</td>
      <td class="calc">${sTotal?fmt(sTotal):'-'}</td>
      <td class="calc ${diffCls}">${diff?fmt(diff):'-'}</td>
      <td><input type="text" value="${r.qty||''}" onchange="onCellChange(${idx},'qty',this.value)"></td>
      <td><input type="text" class="left" value="${r.memo||''}" onchange="onCellChange(${idx},'memo',this.value)"></td>
    </tr>`;
  }).join('');

  // 합계 (운송사 합계 = J+K)
  const totalC = rows.reduce((s,r) => s + num(r.cBase) + num(r.cExtra), 0);
  const totalActual = rows.reduce((s,r) => s + num(r.cActual), 0);
  const totalS = rows.reduce((s,r) => s + num(r.sBase) + num(r.sExtra), 0);
  const totalDiff = totalS - totalC;
  document.getElementById('billFoot').innerHTML = `
    <tr>
      <td class="lbl" colspan="12">합계 (${rows.length}건)</td>
      <td>${fmt(totalActual)}</td>
      <td class="lbl" colspan="2"></td>
      <td>${fmt(totalC)}</td>
      <td>${fmt(totalS)}</td>
      <td class="diff">${fmt(totalDiff)}</td>
      <td class="lbl" colspan="2"></td>
    </tr>
  `;
}

/* ════════ 저장 ════════ */
async function saveBilling() {
  const key = periodKey();
  if (!key) { toast('청구 기간을 선택해주세요.', 'error'); return; }
  if (!rows.length) { toast('저장할 데이터가 없습니다.', 'error'); return; }
  if (!authToken) { toast('로그인이 필요합니다.', 'error'); return; }

  console.log('[saveBilling] periodKey:', key, '| rows:', rows.length, '| token:', authToken ? 'OK' : '없음');

  try {
    const url = '/api/mettler-transport/' + encodeURIComponent(key);
    const body = JSON.stringify({ data: rows, meta: { carrier: '패스로직스' } });
    console.log('[saveBilling] PUT', url, '| body size:', body.length);

    const res = await fetch(url, {
      method: 'PUT',
      headers: authH(),
      body: body
    });

    let respText = '';
    try { respText = await res.text(); } catch(_) {}
    console.log('[saveBilling] response:', res.status, respText.slice(0, 200));

    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try {
        const j = JSON.parse(respText);
        if (j.error) errMsg += ': ' + j.error;
      } catch(_) { errMsg += ': ' + respText.slice(0, 80); }
      throw new Error(errMsg);
    }
    toast(`저장 완료 (${rows.length}건)`);
  } catch(e) {
    console.error('[saveBilling] 실패:', e);
    toast('저장 실패: ' + (e.message || '알 수 없는 오류'), 'error');
  }
}

/* ════════ 엑셀 다운로드 ════════ */
function exportExcel() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  if (!rows.length) { toast('출력할 데이터가 없습니다.', 'error'); return; }
  const td = new Date(t);
  const month = td.getMonth() + 1; // 청구월 = 종료일이 속한 달

  const mkS = (bgRgb, fontRgb, bold=false, sz=10, halign='center') => ({
    font: { bold, sz, color:{rgb:fontRgb}, name:'맑은 고딕' },
    fill: bgRgb ? { patternType:'solid', fgColor:{rgb:bgRgb} } : undefined,
    alignment: { horizontal:halign, vertical:'center', wrapText:true },
    border: { top:{style:'thin',color:{rgb:'BFBFBF'}}, bottom:{style:'thin',color:{rgb:'BFBFBF'}},
              left:{style:'thin',color:{rgb:'BFBFBF'}}, right:{style:'thin',color:{rgb:'BFBFBF'}} }
  });

  const S_TITLE = mkS('1F4E78','FFFFFF',true,14);
  const S_GRP_INFO = mkS('1E293B','FFFFFF',true,11);
  const S_GRP_C    = mkS('1E40AF','FFFFFF',true,11);
  const S_GRP_S    = mkS('B91C1C','FFFFFF',true,11);
  const S_GRP_SUM  = mkS('7C3AED','FFFFFF',true,11);
  const S_HDR  = mkS('F1F5F9','000000',true,10);
  const S_TXT  = mkS(null,'000000',false,10);
  const S_TXTL = mkS(null,'000000',false,10,'left');
  const S_NUM  = { ...mkS(null,'000000',false,10,'right'), numFmt:'#,##0' };
  const S_CALC = { ...mkS('F0FDF4','065F46',true,10,'right'), numFmt:'#,##0' };

  // 컬럼 헤더 (첨부 양식: 19컬럼)
  const HDRS = [
    'No.','차량사용일','DN No.','출발지','출발지\n상호','도착지\n(구/군)','도착지 상호','내용','차종',
    '기본운임','추가비용',          // 운송사 운임
    '',                            // 운송사 실제 청구금액 (그룹행과 세로병합)
    '기본운임','추가비용',          // 화주 청구 운임
    '','','','',''                 // 운송사합계/화주합계/차액/Q'ty/비고 (그룹행과 세로병합)
  ];
  const aoa = [];
  // Row 1: 제목 (19 cols)
  aoa.push([`메틀러토레도 월별 운송비 청구서`, ...Array(18).fill('')]);
  // Row 2: 청구기간
  aoa.push([`청구 기간: ${f} ~ ${t}`, ...Array(18).fill('')]);
  // Row 3: 빈 줄
  aoa.push(Array(19).fill(''));
  // Row 4: 그룹 헤더
  aoa.push([
    '기본 정보','','','','','','','','',
    '운송사 운임','',
    '운송사 실제\n청구금액',
    '화주 청구 운임','',
    '운송사\n합계','화주\n합계','차액\n(화주-운송사)',"Q'ty",'비고'
  ]);
  // Row 5: 컬럼 헤더
  aoa.push(HDRS);
  // Row 6+: 데이터
  rows.forEach(r => {
    const cBaseN  = num(r.cBase) || 0;
    const cExtraN = num(r.cExtra) || 0;
    const cTotal  = cBaseN + cExtraN;
    const sTotal  = num(r.sBase) + num(r.sExtra);
    const diff    = sTotal - cTotal;
    aoa.push([
      r.no, r.date, r.dn, r.src, r.srcCode, r.dest, r.destCode, r.type, r.vehicle,
      cBaseN, cExtraN, num(r.cActual),
      num(r.sBase), num(r.sExtra),
      cTotal, sTotal, diff, r.qty, r.memo
    ]);
  });
  // 합계
  const totalC = rows.reduce((s,r) => s + num(r.cBase) + num(r.cExtra), 0);
  const totalActual = rows.reduce((s,r) => s + num(r.cActual), 0);
  const totalS = rows.reduce((s,r) => s + num(r.sBase) + num(r.sExtra), 0);
  const totalDiff = totalS - totalC;
  aoa.push([
    `합계 (${rows.length}건)`,'','','','','','','','',
    '','', totalActual,
    '','',
    totalC, totalS, totalDiff, '',''
  ]);

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // ── 수식 삽입: 합계/차액은 값이 아닌 수식으로 출력 (엑셀에서 금액 수정 시 자동 재계산) ──
  // 컬럼: J=기본운임(운송사) K=추가비용(운송사) L=실제청구 M=기본운임(화주) N=추가비용(화주)
  //       O=운송사합계 P=화주합계 Q=차액
  const firstDataRow = 6;                     // 엑셀 1-based 첫 데이터 행
  const lastDataRow  = 5 + rows.length;       // 엑셀 1-based 마지막 데이터 행
  rows.forEach((r, ri) => {
    const xlRow = firstDataRow + ri;          // 엑셀 1-based 행번호
    const sheetR = 5 + ri;                    // SheetJS 0-based 행 인덱스
    const cBaseN = num(r.cBase) || 0, cExtraN = num(r.cExtra) || 0;
    const sBaseN = num(r.sBase) || 0, sExtraN = num(r.sExtra) || 0;
    // O 운송사합계 = J + K
    ws[XLSX.utils.encode_cell({r:sheetR,c:14})] = { t:'n', f:`J${xlRow}+K${xlRow}`, v:cBaseN+cExtraN };
    // P 화주합계 = M + N
    ws[XLSX.utils.encode_cell({r:sheetR,c:15})] = { t:'n', f:`M${xlRow}+N${xlRow}`, v:sBaseN+sExtraN };
    // Q 차액 = P - O
    ws[XLSX.utils.encode_cell({r:sheetR,c:16})] = { t:'n', f:`P${xlRow}-O${xlRow}`, v:(sBaseN+sExtraN)-(cBaseN+cExtraN) };
  });
  // 합계 행 수식 (SUM)
  if (rows.length) {
    const totRow = 6 + rows.length;           // 엑셀 1-based 합계행
    const totR   = 5 + rows.length;           // SheetJS 0-based
    ws[XLSX.utils.encode_cell({r:totR,c:11})] = { t:'n', f:`SUM(L${firstDataRow}:L${lastDataRow})`, v:totalActual };
    ws[XLSX.utils.encode_cell({r:totR,c:14})] = { t:'n', f:`SUM(O${firstDataRow}:O${lastDataRow})`, v:totalC };
    ws[XLSX.utils.encode_cell({r:totR,c:15})] = { t:'n', f:`SUM(P${firstDataRow}:P${lastDataRow})`, v:totalS };
    ws[XLSX.utils.encode_cell({r:totR,c:16})] = { t:'n', f:`P${totRow}-O${totRow}`, v:totalDiff };
  }

  // 셀 스타일 적용
  const COL = 19;
  // 병합: 제목/청구기간 + 그룹 헤더(가로) + 세로병합 5개 단독 컬럼
  ws['!merges'] = [
    { s:{r:0,c:0}, e:{r:0,c:COL-1} },
    { s:{r:1,c:0}, e:{r:1,c:COL-1} },
    { s:{r:3,c:0},  e:{r:3,c:8} },    // 기본 정보 (9)
    { s:{r:3,c:9},  e:{r:3,c:10} },   // 운송사 운임 (2)
    { s:{r:3,c:11}, e:{r:4,c:11} },   // 운송사 실제 청구금액 (세로병합)
    { s:{r:3,c:12}, e:{r:3,c:13} },   // 화주 청구 운임 (2)
    { s:{r:3,c:14}, e:{r:4,c:14} },   // 운송사 합계 (세로병합)
    { s:{r:3,c:15}, e:{r:4,c:15} },   // 화주 합계 (세로병합)
    { s:{r:3,c:16}, e:{r:4,c:16} },   // 차액 (세로병합)
    { s:{r:3,c:17}, e:{r:4,c:17} },   // Q'ty (세로병합)
    { s:{r:3,c:18}, e:{r:4,c:18} },   // 비고 (세로병합)
  ];

  // 1행 제목 / 2행 청구기간 스타일
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:0,c}); if (ws[ref]) ws[ref].s = S_TITLE;
    const ref2 = XLSX.utils.encode_cell({r:1,c}); if (ws[ref2]) ws[ref2].s = mkS(null,'333333',false,11,'left');
  }
  // 그룹 헤더 (4행) — 컬럼별 색상
  // 0-8 기본정보 / 9-10 운송사운임 / 11 실제청구 / 12-13 화주청구 / 14 운송사합계 / 15 화주합계 / 16-18 기타
  const grpColorOf = c => {
    if (c <= 8) return S_GRP_INFO;
    if (c <= 10) return S_GRP_C;
    if (c === 11) return mkS('0E7490','FFFFFF',true,11);
    if (c <= 13) return S_GRP_S;
    if (c === 14) return S_GRP_C;
    if (c === 15) return S_GRP_S;
    return S_GRP_INFO;
  };
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:3,c}); if (ws[ref]) ws[ref].s = grpColorOf(c);
  }
  // 컬럼 헤더 (5행)
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:4,c}); if (ws[ref]) ws[ref].s = S_HDR;
  }
  // 숫자 컬럼: 9,10(운송사 기본/추가) 11(실제청구) 12,13(화주 기본/추가) 14(운송사합계) 15(화주합계) 16(차액)
  const numCols = [9,10,11,12,13,14,15,16];
  rows.forEach((_, ri) => {
    for (let c=0; c<COL; c++) {
      const ref = XLSX.utils.encode_cell({r:5+ri,c});
      if (!ws[ref]) continue;
      if (numCols.includes(c)) {
        if ([14,15,16].includes(c)) ws[ref].s = S_CALC;   // 합계/차액 강조
        else ws[ref].s = S_NUM;
      } else if (c === 3 || c === 18) {
        ws[ref].s = S_TXTL;   // 출발지 / 비고 좌측정렬
      } else {
        ws[ref].s = S_TXT;
      }
    }
  });
  // 합계 행
  const totalRow = 5 + rows.length;
  for (let c=0; c<COL; c++) {
    const ref = XLSX.utils.encode_cell({r:totalRow,c});
    if (!ws[ref]) ws[ref] = { v:'' };
    ws[ref].s = mkS('FEF3C7','9A3412',true,11, c>=9?'right':'center');
    if ([11,14,15,16].includes(c)) ws[ref].s = { ...ws[ref].s, numFmt:'#,##0' };
  }

  ws['!cols'] = [
    {wch:5},{wch:12},{wch:16},{wch:8},{wch:13},{wch:11},{wch:16},{wch:7},{wch:8},
    {wch:11},{wch:10},{wch:16},
    {wch:11},{wch:10},
    {wch:12},{wch:12},{wch:13},{wch:9},{wch:18}
  ];
  ws['!rows'] = [{hpt:28},{hpt:18},{hpt:6},{hpt:22},{hpt:32},...rows.map(()=>({hpt:18})),{hpt:24}];

  const wb = { SheetNames:['운송비청구서'], Sheets:{ '운송비청구서': ws } };
  const fname = `메틀러토레도_운송비청구서_${f}_${t}.xlsx`;
  XLSX.writeFile(wb, fname);
}

  await loadRates();
  setQuickRange('this');  // 기본: 이번달
  updatePeriodInfo();
  document.getElementById('dateFrom').addEventListener('change', updatePeriodInfo);
  document.getElementById('dateTo').addEventListener('change', updatePeriodInfo);
  // 자동으로 데이터 조회 (저장된게 있으면 로드)
  loadBilling();
}
init();
</script>
