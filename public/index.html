<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배송 인수증명 시스템</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .logo{font-size:40px;margin-bottom:10px;}
    .sys-title{color:#fff;font-size:22px;font-weight:900;margin-bottom:4px;text-align:center;}
    .sys-sub{color:rgba(255,255,255,.6);font-size:12px;margin-bottom:28px;text-align:center;}

    /* ── 공통 화면 ── */
    .screen{width:100%;max-width:500px;display:none;}
    #clientScreen{display:block;text-align:center;}

    /* ── 화주 선택 ── */
    .sel-title{color:#fff;font-size:17px;font-weight:700;margin-bottom:4px;}
    .sel-sub{color:rgba(255,255,255,.55);font-size:12px;margin-bottom:20px;}
    .client-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:380px){.client-grid{grid-template-columns:1fr;}}
    .client-btn{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.15);border-radius:18px;padding:22px 14px;text-align:center;cursor:pointer;transition:all .25s;color:#fff;font-family:inherit;}
    .client-btn:hover{background:rgba(255,255,255,.16);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.3);}
    .client-btn .c-emoji{font-size:30px;display:block;margin-bottom:10px;}
    .client-btn .c-name{font-size:14px;font-weight:700;line-height:1.4;}

    /* ── 메뉴 화면 ── */
    #menuScreen{max-width:520px;}
    .client-badge-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:5px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-bottom:16px;}
    .client-badge-btn:hover{background:rgba(255,255,255,.2);}

    /* ── 섹션 구분선 ── */
    .section-label{display:flex;align-items:center;gap:10px;margin:14px 0 10px;width:100%;}
    .section-label span{color:rgba(255,255,255,.45);font-size:11px;font-weight:600;white-space:nowrap;}
    .section-label::before,.section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.15);}

    /* ── 메뉴 카드 ── */
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
    @media(max-width:480px){.cards{grid-template-columns:1fr;}}
    .card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:24px 16px;text-align:center;text-decoration:none;color:#fff;transition:all .25s;display:block;}
    .card:hover{background:rgba(255,255,255,.15);transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.3);}
    .card .icon{font-size:30px;margin-bottom:10px;display:block;}
    .card h2{font-size:15px;font-weight:700;margin-bottom:4px;}
    .card p{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5;}
    .card.span2{grid-column:span 2;}
    @media(max-width:480px){.card.span2{grid-column:span 1;}}

    /* ── 로그인 카드 (직원/관리자) ── */
    .login-card{background:rgba(255,255,255,.06);border:1.5px dashed rgba(255,255,255,.2);border-radius:20px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .25s;color:#fff;}
    .login-card:hover{background:rgba(255,255,255,.12);border-style:solid;}
    .login-card.staff-card:hover{border-color:#34d399;}
    .login-card.admin-card:hover{border-color:#60a5fa;}
    .login-card .icon{font-size:28px;margin-bottom:8px;display:block;}
    .login-card h2{font-size:14px;font-weight:700;margin-bottom:3px;}
    .login-card p{font-size:11px;color:rgba(255,255,255,.55);line-height:1.4;}
    .login-card.staff-card .icon{color:#34d399;}
    .login-card.admin-card .icon{color:#60a5fa;}

    /* ── 로그인 후 역할 뱃지 ── */
    .role-badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;margin-bottom:14px;}
    .role-badge.staff{background:rgba(52,211,153,.2);color:#34d399;border:1px solid rgba(52,211,153,.35);}
    .role-badge.admin{background:rgba(96,165,250,.2);color:#60a5fa;border:1px solid rgba(96,165,250,.35);}
    .role-badge:hover{opacity:.75;}

    /* ── 로그인 화면 오버레이 ── */
    .login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;}
    .login-overlay.show{display:flex;}
    .login-box{background:rgba(22,33,62,.97);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:32px 28px;width:100%;max-width:360px;text-align:center;}
    .login-box-emoji{font-size:36px;margin-bottom:10px;}
    .login-box-title{color:#fff;font-size:18px;font-weight:700;margin-bottom:4px;}
    .login-box-sub{color:rgba(255,255,255,.5);font-size:12px;margin-bottom:22px;}
    .pw-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:12px;font-size:16px;color:#fff;font-family:inherit;text-align:center;letter-spacing:4px;outline:none;}
    .pw-input::placeholder{letter-spacing:0;color:rgba(255,255,255,.3);font-size:13px;}
    .pw-input:focus{border-color:rgba(255,255,255,.5);}
    .login-err{color:#fc8181;font-size:12px;margin:8px 0 6px;display:none;}
    .login-submit{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .login-submit.staff{background:linear-gradient(135deg,#34d399,#059669);color:#fff;}
    .login-submit.admin{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;}
    .login-cancel{margin-top:10px;background:none;border:none;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;font-family:inherit;padding:6px;}
    .login-cancel:hover{color:rgba(255,255,255,.7);}
    .version{color:rgba(255,255,255,.25);font-size:11px;margin-top:20px;text-align:center;}
  </style>
</head>
<body>
  <div class="logo">📦</div>
  <p class="sys-title">배송 인수증명 시스템</p>
  <p class="sys-sub">디지털 서명 · 실시간 저장 · PDF 출력</p>

  <!-- ① 화주 선택 -->
  <div class="screen" id="clientScreen">
    <p class="sel-title">화주 선택</p>
    <p class="sel-sub">작업할 화주를 선택하세요</p>
    <div class="client-grid" id="clientGrid"></div>
  </div>

  <!-- ② 메뉴 화면 (로그인 여부에 따라 동적 렌더) -->
  <div class="screen" id="menuScreen">
    <div style="text-align:center;">
      <button class="client-badge-btn" onclick="changeClient()">
        <span id="badgeEmoji"></span>
        <span id="badgeName"></span>
        <i class="fas fa-exchange-alt" style="font-size:10px;opacity:.6;"></i>
      </button>
    </div>
    <div id="menuBody"></div>
    <p class="version">v1.0</p>
  </div>

  <!-- 로그인 팝업 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div class="login-box-emoji" id="loginEmoji">🔐</div>
      <div class="login-box-title" id="loginTitle">로그인</div>
      <div class="login-box-sub" id="loginSub">비밀번호를 입력하세요</div>
      <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호 입력" maxlength="30"
             onkeydown="if(event.key==='Enter')doLogin()">
      <div class="login-err" id="loginErr">비밀번호가 틀렸습니다.</div>
      <button class="login-submit" id="loginSubmit" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> 로그인
      </button>
      <button class="login-cancel" onclick="closeLogin()">취소</button>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════
       화주 설정
       staffMenus  : 직원 로그인 후 추가되는 메뉴
       adminMenus  : 관리자 로그인 후 추가되는 메뉴
       publicMenus : 로그인 없이 항상 노출
    ══════════════════════════════════════════ */
    const CLIENTS = [
      {
        id: 'mettler', name: '메틀러토레도', emoji: '⚖️',
        borderColor: 'rgba(96,165,250,.55)',
        publicMenus: ['sign', 'carrier'],
        staffMenus:  [],
        adminMenus:  ['admin', 'list', 'billing']
      },
      /* 새 화주 추가 시 여기에 객체 추가 */
    ];

    const MENUS = {
      sign:    { href:'sign.html',    icon:'fas fa-truck',               iconColor:'#f87171', h2:'배송기사 서명',    p:'DN번호 입력 후<br>기사·수령자 서명' },
      admin:   { href:'admin.html',   icon:'fas fa-clipboard-list',      iconColor:'#60a5fa', h2:'오더 관리',        p:'출고 오더 등록 및<br>기본 정보 수정' },
      carrier: { href:'carrier.html', icon:'fas fa-clipboard-check',     iconColor:'#a78bfa', h2:'운송사 작업입력',  p:'DN번호 입력 후<br>현장 작업내용 등록' },
      list:    { href:'list.html',    icon:'fas fa-search',              iconColor:'#34d399', h2:'조회 · 출력',      p:'기간 검색 · 건별 조회 · PDF' },
      billing: { href:'billing.html', icon:'fas fa-file-invoice-dollar', iconColor:'#f093fb', h2:'운송 청구서',      p:'기간별 운송비 집계<br>엑셀 청구서 출력' }
    };

    /* ── 상태 ── */
    let currentClientId = null;
    let currentRole     = null;  // null | 'staff' | 'admin'
    let pendingRole     = null;  // 로그인 시도 중인 역할

    /* ── 화주 선택 ── */
    function renderClientGrid() {
      document.getElementById('clientGrid').innerHTML = CLIENTS.map(c =>
        `<button class="client-btn" onclick="selectClient('${c.id}')" style="border-color:${c.borderColor};">
           <span class="c-emoji">${c.emoji}</span>
           <span class="c-name">${c.name}</span>
         </button>`
      ).join('');
    }

    function selectClient(id) {
      currentClientId = id;
      localStorage.setItem('selectedClient', id);
      const c = CLIENTS.find(c => c.id === id);
      document.getElementById('badgeEmoji').textContent = c.emoji;
      document.getElementById('badgeName').textContent  = c.name;
      showScreen('menuScreen');
      renderMenu();
    }

    function changeClient() {
      currentClientId = null; currentRole = null;
      localStorage.removeItem('selectedClient');
      sessionStorage.removeItem('adminToken');
      sessionStorage.removeItem('staffToken');
      sessionStorage.removeItem('userRole');
      showScreen('clientScreen');
    }

    /* ── 메뉴 렌더링 ── */
    function renderMenu() {
      const c = CLIENTS.find(c => c.id === currentClientId);
      if (!c) return;
      const role = currentRole;

      // 공개 메뉴 + 역할별 추가 메뉴 합치기
      let visibleMenus = [...c.publicMenus];
      if (role === 'staff')  visibleMenus = [...visibleMenus, ...c.staffMenus];
      if (role === 'admin')  visibleMenus = [...visibleMenus, ...c.adminMenus];
      // 중복 제거
      visibleMenus = [...new Set(visibleMenus)];

      let html = '';

      // ── 공개 메뉴 (로그인 없이) ──
      html += makeSectionLabel('🚚 로그인 없이 사용 가능');
      html += '<div class="cards">';
      html += makeCards(c.publicMenus);
      html += '</div>';

      // ── 역할별 추가 메뉴 ──
      if (role === 'admin' && c.adminMenus.length) {
        html += makeSectionLabel('🔵 관리자 메뉴');
        html += '<div style="text-align:center;margin-bottom:10px;">';
        html += `<button class="role-badge admin" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 관리자 로그인 중 (로그아웃)</button>`;
        html += '</div>';
        html += '<div class="cards">';
        html += makeCards(c.adminMenus);
        html += '</div>';
      } else if (role === 'staff' && c.staffMenus.length) {
        html += makeSectionLabel('🟢 직원 메뉴');
        html += '<div style="text-align:center;margin-bottom:10px;">';
        html += `<button class="role-badge staff" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 직원 로그인 중 (로그아웃)</button>`;
        html += '</div>';
        html += '<div class="cards">';
        html += makeCards(c.staffMenus);
        html += '</div>';
      }

      // ── 로그인 버튼 (미로그인 상태) ──
      if (!role) {
        html += makeSectionLabel('🔐 추가 메뉴 (로그인 필요)');
        html += '<div class="cards">';
        html += `<div class="login-card staff-card" onclick="openLogin('staff')">
                   <span class="icon"><i class="fas fa-hard-hat"></i></span>
                   <h2>직원 로그인</h2>
                   <p>직원 비밀번호로<br>추가 메뉴 접근</p>
                 </div>`;
        html += `<div class="login-card admin-card" onclick="openLogin('admin')">
                   <span class="icon"><i class="fas fa-user-shield"></i></span>
                   <h2>관리자 로그인</h2>
                   <p>오더관리 · 조회<br>운송청구서 접근</p>
                 </div>`;
        html += '</div>';
      } else if (role === 'staff') {
        // 직원 로그인 중 → 관리자 로그인 버튼만 추가
        html += makeSectionLabel('🔵 관리자 전용 메뉴');
        html += '<div class="cards">';
        html += `<div class="login-card admin-card span2" onclick="openLogin('admin')">
                   <span class="icon"><i class="fas fa-user-shield"></i></span>
                   <h2>관리자 로그인</h2>
                   <p>오더관리 · 조회출력 · 운송청구서 접근</p>
                 </div>`;
        html += '</div>';
      }

      document.getElementById('menuBody').innerHTML = html;
    }

    function makeCards(keys) {
      return keys.map((key, i) => {
        const m = MENUS[key];
        const isLast = i === keys.length - 1;
        const spanCls = (isLast && keys.length % 2 !== 0) ? ' span2' : '';
        return `<a href="${m.href}" class="card${spanCls}">
          <span class="icon" style="color:${m.iconColor};"><i class="${m.icon}"></i></span>
          <h2>${m.h2}</h2><p>${m.p}</p>
        </a>`;
      }).join('');
    }

    function makeSectionLabel(txt) {
      return `<div class="section-label"><span>${txt}</span></div>`;
    }

    /* ── 로그인 팝업 ── */
    function openLogin(role) {
      pendingRole = role;
      const isAdmin = role === 'admin';
      document.getElementById('loginEmoji').textContent  = isAdmin ? '🔵' : '🟢';
      document.getElementById('loginTitle').textContent  = isAdmin ? '관리자 로그인' : '직원 로그인';
      document.getElementById('loginSub').textContent    = isAdmin ? '관리자 비밀번호를 입력하세요' : '직원 비밀번호를 입력하세요';
      document.getElementById('loginSubmit').className   = `login-submit ${role}`;
      document.getElementById('loginSubmit').innerHTML   = `<i class="fas fa-sign-in-alt"></i> ${isAdmin?'관리자':'직원'} 로그인`;
      document.getElementById('pwInput').value = '';
      document.getElementById('loginErr').style.display = 'none';
      document.getElementById('loginOverlay').classList.add('show');
      setTimeout(() => document.getElementById('pwInput').focus(), 100);
    }

    function closeLogin() {
      document.getElementById('loginOverlay').classList.remove('show');
      pendingRole = null;
    }

    async function doLogin() {
      const pw = document.getElementById('pwInput').value;
      if (!pw) return;
      document.getElementById('loginSubmit').disabled = true;
      document.getElementById('loginErr').style.display = 'none';

      try {
        const res  = await fetch('/api/auth', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw})});
        const data = await res.json();

        if (res.ok) {
          const serverRole = data.role;
          // 관리자 탭에서 직원 PW → 거부
          if (pendingRole === 'admin' && serverRole !== 'admin') {
            showLoginErr('관리자 비밀번호가 틀렸습니다.');
            return;
          }
          // 토큰 저장
          if (serverRole === 'admin') {
            sessionStorage.setItem('adminToken', data.token);
            sessionStorage.removeItem('staffToken');
            currentRole = 'admin';
          } else {
            sessionStorage.setItem('staffToken', data.token);
            sessionStorage.removeItem('adminToken');
            currentRole = pendingRole === 'admin' ? 'staff' : 'staff';
          }
          sessionStorage.setItem('userRole', currentRole);
          closeLogin();
          renderMenu();
        } else {
          showLoginErr('비밀번호가 틀렸습니다.');
        }
      } catch(e) {
        showLoginErr('서버 연결 오류입니다.');
      }
    }

    function showLoginErr(msg) {
      const el = document.getElementById('loginErr');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('loginSubmit').disabled = false;
      document.getElementById('loginSubmit').innerHTML = `<i class="fas fa-sign-in-alt"></i> ${pendingRole==='admin'?'관리자':'직원'} 로그인`;
    }

    /* ── 로그아웃 ── */
    function logout() {
      if (!confirm('로그아웃 하시겠습니까?')) return;
      currentRole = null;
      sessionStorage.removeItem('adminToken');
      sessionStorage.removeItem('staffToken');
      sessionStorage.removeItem('userRole');
      renderMenu();
    }

    /* ── 화면 전환 ── */
    function showScreen(id) {
      ['clientScreen','menuScreen'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    /* ── 초기화 ── */
    renderClientGrid();

    (function restore() {
      const savedClient = localStorage.getItem('selectedClient');
      const savedRole   = sessionStorage.getItem('userRole');
      const token       = sessionStorage.getItem('adminToken') || sessionStorage.getItem('staffToken');

      if (savedClient && CLIENTS.find(c => c.id === savedClient)) {
        currentClientId = savedClient;
        const c = CLIENTS.find(c => c.id === savedClient);
        document.getElementById('badgeEmoji').textContent = c.emoji;
        document.getElementById('badgeName').textContent  = c.name;

        if (savedRole && token) {
          // 토큰 검증
          fetch('/api/auth/check', {headers:{'Authorization':`Bearer ${token}`}})
            .then(r => {
              currentRole = r.ok ? savedRole : null;
              if (!r.ok) {
                sessionStorage.removeItem('adminToken');
                sessionStorage.removeItem('staffToken');
                sessionStorage.removeItem('userRole');
              }
              showScreen('menuScreen');
              renderMenu();
            }).catch(() => {
              currentRole = null;
              showScreen('menuScreen');
              renderMenu();
            });
        } else {
          showScreen('menuScreen');
          renderMenu();
        }
      } else {
        showScreen('clientScreen');
      }
    })();
  </script>
</body>
</html>
