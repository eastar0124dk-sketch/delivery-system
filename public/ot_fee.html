<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OT Fee 관리 - 메틀러토레도</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body { display: flex; min-height: 100vh; background: #f0f4f8; margin: 0; font-family: 'Noto Sans KR', sans-serif; }

    /* ── 공통 버튼 ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; font-family: inherit;
      transition: all .15s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
    .btn-green   { background: linear-gradient(135deg,#38a169,#276749); color: #fff; }
    .btn-blue    { background: linear-gradient(135deg,#3b82f6,#1d4ed8); color: #fff; }
    .btn-gray    { background: #e2e8f0; color: #4a5568; }
    .btn-sm      { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

    /* ── 컨트롤 바 ── */
    .control-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border-radius: 14px; padding: 14px 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-bottom: 20px;
      flex-wrap: wrap; gap: 12px;
    }
    .period-label { font-size: 13px; font-weight: 700; color: #2d3748; }
    .period-range { font-size: 12px; color: #718096; margin-left: 10px; }
    .period-selects { display: flex; align-items: center; gap: 8px; }
    .period-select {
      padding: 7px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; font-family: inherit; color: #2d3748; background: #fff;
      cursor: pointer;
    }
    .period-select:focus { outline: none; border-color: #667eea; }
    .action-btns { display: flex; gap: 8px; }

    /* ── 섹션 카드 ── */
    .section-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 28px;
      overflow: hidden;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid #e2e8f0;
    }
    .section-header.green { background: linear-gradient(135deg,#1a202c 0%,#2d3748 100%); border-bottom: 3px solid #38a169; }
    .section-header.blue  { background: linear-gradient(135deg,#1a202c 0%,#2d3748 100%); border-bottom: 3px solid #3b82f6; }
    .section-title { font-size: 15px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .add-emp-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; background: rgba(56,161,105,.2); border: 1px solid #38a169;
      color: #68d391; border-radius: 8px; cursor: pointer; font-size: 12px;
      font-family: inherit; font-weight: 600; transition: all .15s;
    }
    .add-emp-btn:hover { background: rgba(56,161,105,.35); }

    /* ── 테이블 래퍼 ── */
    .table-wrap { overflow-x: auto; padding: 0; }
    table.fee-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
      min-width: 600px;
    }

    /* 헤더 */
    table.fee-table thead tr {
      background: #1e293b; color: #e2e8f0;
      position: sticky; top: 0; z-index: 10;
    }
    table.fee-table thead th {
      padding: 10px 8px; font-weight: 600; font-size: 12px;
      white-space: nowrap; text-align: center; border: 1px solid #334155;
    }
    table.fee-table thead th.emp-header {
      cursor: pointer; min-width: 72px; position: relative;
    }
    table.fee-table thead th.emp-header:hover { background: #334155; }
    table.fee-table thead th.emp-header .remove-emp {
      display: none; position: absolute; top: 3px; right: 3px;
      background: #ef4444; color: #fff; border: none; border-radius: 50%;
      width: 15px; height: 15px; font-size: 9px; line-height: 15px;
      text-align: center; cursor: pointer; padding: 0;
    }
    table.fee-table thead th.emp-header:hover .remove-emp { display: block; }

    /* 데이터 행 */
    table.fee-table tbody tr { border-bottom: 1px solid #f0f4f8; }
    table.fee-table tbody tr:nth-child(even) { background: #f8fafc; }
    table.fee-table tbody tr.row-sat  { background: #eff6ff !important; }
    table.fee-table tbody tr.row-hol  { background: #fff5f5 !important; }
    table.fee-table tbody td {
      padding: 6px 8px; text-align: center; vertical-align: middle;
      border: 1px solid #f0f4f8; color: #2d3748;
    }
    table.fee-table tbody td.date-cell {
      font-size: 12px; white-space: nowrap; font-weight: 600; min-width: 80px;
      cursor: pointer; user-select: none;
    }
    table.fee-table tbody td.date-cell.sat  { color: #3b82f6; }
    table.fee-table tbody td.date-cell.hol  { color: #ef4444; }
    table.fee-table tbody td.date-cell.wday { color: #1a202c; }
    table.fee-table tbody td.date-cell:hover { opacity: .75; }
    table.fee-table tbody td.total-cell {
      font-weight: 700; background: #f1f5f9 !important; color: #1a202c;
    }

    /* 합계 행 */
    table.fee-table tfoot tr.summary-row td {
      background: #1e293b !important; color: #e2e8f0 !important;
      font-weight: 700; padding: 9px 8px; border: 1px solid #334155;
      font-size: 12px;
    }
    table.fee-table tfoot tr.summary-row.wday td { background: #1e3a5f !important; }
    table.fee-table tfoot tr.summary-row.hol  td { background: #3b1f1f !important; }
    table.fee-table tfoot tr.summary-row td.lbl { text-align: left; padding-left: 12px; }
    table.fee-table tfoot tr.summary-row td.grand { color: #fbbf24 !important; font-size: 14px; }

    /* 입력 셀 */
    .num-input {
      width: 60px; border: none; background: transparent;
      text-align: center; font-size: 13px; font-family: inherit;
      padding: 4px 2px; outline: none; border-radius: 4px;
    }
    .num-input:focus { background: #eff6ff; border: 1px solid #3b82f6; }
    .num-input.has-value-wday { font-weight: 700; color: #2563eb; }
    .num-input.has-value-hol  { font-weight: 700; color: #dc2626; }

    /* ── 토스트 ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: #1a202c; color: #fff; padding: 10px 22px; border-radius: 10px;
      font-size: 13px; font-weight: 600; z-index: 9999;
      transition: transform .3s ease, opacity .3s ease; opacity: 0;
      pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      .control-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<script src="hub-nav.js"></script>
<div id="sidebar"></div>

<main class="hub-main">
  <h1 class="hub-page-title">⏱️ OT Fee 관리 <span style="font-size:14px;color:#888;">메틀러토레도</span></h1>

  <!-- 기간 선택 & 액션 -->
  <div class="control-bar">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
      <span class="period-label">📅 기간:</span>
      <div class="period-selects">
        <select class="period-select" id="selYear"></select>
        <select class="period-select" id="selMonth"></select>
        <button class="btn btn-primary btn-sm" onclick="loadPeriod()">조회</button>
      </div>
      <span class="period-range" id="periodRange"></span>
    </div>
    <div class="action-btns">
      <button class="btn btn-green btn-sm" onclick="saveData()">💾 저장</button>
      <button class="btn btn-blue btn-sm"  onclick="exportExcel()">📥 엑셀 출력</button>
    </div>
  </div>

  <!-- OT Fee 섹션 -->
  <div class="section-card">
    <div class="section-header green">
      <div class="section-title">📊 OverTime Fee</div>
      <button class="add-emp-btn" onclick="addEmployee()">＋ 직원 추가</button>
    </div>
    <div class="table-wrap">
      <table class="fee-table" id="otTable">
        <thead id="otHead"></thead>
        <tbody id="otBody"></tbody>
        <tfoot id="otFoot"></tfoot>
      </table>
    </div>
  </div>

  <!-- Part Time 섹션 -->
  <div class="section-card">
    <div class="section-header blue">
      <div class="section-title">👤 Part Time List</div>
    </div>
    <div class="table-wrap">
      <table class="fee-table" id="ptTable">
        <thead id="ptHead"></thead>
        <tbody id="ptBody"></tbody>
        <tfoot id="ptFoot"></tfoot>
      </table>
    </div>
  </div>
</main>

<div id="toast">저장됨</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════
//  한국 공휴일 (2024-2027 하드코딩)
// ════════════════════════════════════════════
const KR_HOLIDAYS = new Set([
  // 2024
  '2024-01-01','2024-02-09','2024-02-10','2024-02-11','2024-02-12',
  '2024-03-01','2024-04-10','2024-05-05','2024-05-06','2024-05-15',
  '2024-06-06','2024-08-15','2024-09-16','2024-09-17','2024-09-18',
  '2024-10-03','2024-10-09','2024-12-25',
  // 2025
  '2025-01-01','2025-01-28','2025-01-29','2025-01-30',
  '2025-03-01','2025-05-05','2025-05-06','2025-05-15',
  '2025-06-06','2025-08-15','2025-10-03','2025-10-05','2025-10-06','2025-10-07','2025-10-09',
  '2025-12-25',
  // 2026
  '2026-01-01','2026-02-16','2026-02-17','2026-02-18',
  '2026-03-01','2026-05-05','2026-05-24','2026-06-06',
  '2026-08-15','2026-09-24','2026-09-25','2026-09-26',
  '2026-10-03','2026-10-09','2026-12-25',
  // 2027
  '2027-01-01','2027-02-06','2027-02-07','2027-02-08',
  '2027-03-01','2027-05-05','2027-05-13','2027-06-06',
  '2027-08-15','2027-10-03','2027-10-14','2027-10-15','2027-10-16','2027-10-09','2027-12-25',
]);

const DAY_KO = ['일','월','화','수','목','금','토'];

// ════════════════════════════════════════════
//  상태
// ════════════════════════════════════════════
let selYear  = new Date().getFullYear();
let selMonth = new Date().getMonth() + 1; // 선택된 월 (기간의 끝월)
let employees = [];
let dateList  = []; // {dateStr, dow, isWeekend, isHoliday, isRedDay}
let data      = {}; // data[dateStr] = { ot: [...], pt1: n, pt2: n, holiday: bool }

const EMPLOYEES_KEY = 'ot_fee_employees';
const dataKey = (y, m) => `ot_fee_data_${y}_${m}`;

// ════════════════════════════════════════════
//  초기화
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initNav('ot_fee.html');
  buildYearMonthSelects();
  loadEmployees();
  loadPeriod();
});

function buildYearMonthSelects() {
  const yel = document.getElementById('selYear');
  const mel = document.getElementById('selMonth');
  for (let y = 2024; y <= 2027; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '년';
    if (y === selYear) o.selected = true;
    yel.appendChild(o);
  }
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  monthNames.forEach((mn, i) => {
    const o = document.createElement('option');
    o.value = i + 1; o.textContent = mn;
    if (i + 1 === selMonth) o.selected = true;
    mel.appendChild(o);
  });
}

// ════════════════════════════════════════════
//  직원 관리
// ════════════════════════════════════════════
function loadEmployees() {
  const saved = localStorage.getItem(EMPLOYEES_KEY);
  if (saved) {
    try { employees = JSON.parse(saved); } catch { employees = defaultEmployees(); }
  } else {
    employees = defaultEmployees();
  }
}

function defaultEmployees() {
  return ['조한준', '이현수', '윤지훈', '박준상'];
}

function saveEmployees() {
  localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(employees));
}

function addEmployee() {
  const name = prompt('새 직원 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  employees.push(name.trim());
  saveEmployees();
  // 기존 data에 새 직원 열 추가
  dateList.forEach(d => {
    if (data[d.dateStr]) data[d.dateStr].ot.push(null);
  });
  renderTables();
  autoSave();
}

function removeEmployee(idx) {
  if (employees.length <= 1) { alert('최소 1명의 직원이 필요합니다.'); return; }
  if (!confirm(`"${employees[idx]}" 직원을 삭제하시겠습니까?\n해당 직원의 OT 데이터도 삭제됩니다.`)) return;
  employees.splice(idx, 1);
  saveEmployees();
  dateList.forEach(d => {
    if (data[d.dateStr]) data[d.dateStr].ot.splice(idx, 1);
  });
  renderTables();
  autoSave();
}

function renameEmployee(idx) {
  const newName = prompt('직원 이름 변경:', employees[idx]);
  if (!newName || !newName.trim()) return;
  employees[idx] = newName.trim();
  saveEmployees();
  renderTables();
  autoSave();
}

// ════════════════════════════════════════════
//  기간 계산
// ════════════════════════════════════════════
function calcPeriod(year, month) {
  // 기간: (month-1)년 + 21일 ~ 선택한 month 년 20일
  let prevYear  = year;
  let prevMonth = month - 1;
  if (prevMonth === 0) { prevMonth = 12; prevYear = year - 1; }
  const startStr = `${prevYear}-${String(prevMonth).padStart(2,'0')}-21`;
  const endStr   = `${year}-${String(month).padStart(2,'0')}-20`;
  return { startStr, endStr };
}

function buildDateList(startStr, endStr) {
  const list = [];
  let cur = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  while (cur <= end) {
    const y  = cur.getFullYear();
    const m  = String(cur.getMonth() + 1).padStart(2,'0');
    const d  = String(cur.getDate()).padStart(2,'0');
    const dateStr = `${y}-${m}-${d}`;
    const dow = cur.getDay(); // 0=Sun, 6=Sat
    const isSat  = dow === 6;
    const isSun  = dow === 0;
    const isKRHol = KR_HOLIDAYS.has(dateStr);
    // 사용자 수동 토글은 data[dateStr].holiday
    const isWeekend = isSat || isSun;
    list.push({ dateStr, dow, isSat, isSun, isKRHol, isWeekend });
    cur.setDate(cur.getDate() + 1);
  }
  return list;
}

function isRedDay(entry) {
  // 공휴일(법정) 또는 일요일 또는 수동 토글
  const manualHol = data[entry.dateStr] && data[entry.dateStr].holiday;
  return entry.isSun || entry.isKRHol || manualHol;
}

function isHolidayOrWeekend(entry) {
  return entry.isSat || isRedDay(entry);
}

// ════════════════════════════════════════════
//  데이터 로드/저장
// ════════════════════════════════════════════
function loadPeriod() {
  selYear  = parseInt(document.getElementById('selYear').value);
  selMonth = parseInt(document.getElementById('selMonth').value);

  const { startStr, endStr } = calcPeriod(selYear, selMonth);
  document.getElementById('periodRange').textContent = `📆 ${startStr} ~ ${endStr}`;

  dateList = buildDateList(startStr, endStr);
  loadData();
  renderTables();
}

function loadData() {
  const key  = dataKey(selYear, selMonth);
  const saved = localStorage.getItem(key);
  if (saved) {
    try { data = JSON.parse(saved); } catch { data = {}; }
  } else {
    data = {};
  }
  // 누락된 날짜 초기화
  dateList.forEach(d => {
    if (!data[d.dateStr]) {
      data[d.dateStr] = { ot: employees.map(() => null), pt1: null, pt2: null, holiday: false };
    } else {
      // employees 길이 맞추기
      while (data[d.dateStr].ot.length < employees.length) data[d.dateStr].ot.push(null);
      if (data[d.dateStr].ot.length > employees.length) data[d.dateStr].ot.length = employees.length;
    }
  });
}

function saveData() {
  const key = dataKey(selYear, selMonth);
  localStorage.setItem(key, JSON.stringify(data));
  showToast('저장됨 ✓');
}

let saveTimer = null;
function autoSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const key = dataKey(selYear, selMonth);
    localStorage.setItem(key, JSON.stringify(data));
    showToast('저장됨 ✓');
  }, 600);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ════════════════════════════════════════════
//  테이블 렌더링
// ════════════════════════════════════════════
function renderTables() {
  renderOTTable();
  renderPTTable();
}

// ── OT 테이블 ────────────────────────────────
function renderOTTable() {
  const thead = document.getElementById('otHead');
  const tbody = document.getElementById('otBody');
  const tfoot = document.getElementById('otFoot');

  // 헤더
  let thHTML = '<tr><th style="min-width:88px;">날짜</th>';
  employees.forEach((emp, i) => {
    thHTML += `<th class="emp-header" onclick="renameEmployee(${i})" title="클릭하여 이름 변경">
      ${escHtml(emp)}
      <button class="remove-emp" onclick="event.stopPropagation();removeEmployee(${i})" title="직원 삭제">✕</button>
    </th>`;
  });
  thHTML += '<th style="min-width:60px;">합계</th></tr>';
  thead.innerHTML = thHTML;

  // 본문
  let tbHTML = '';
  dateList.forEach(entry => {
    const { dateStr, isSat } = entry;
    const red    = isRedDay(entry);
    const hlWknd = isHolidayOrWeekend(entry);
    const rowCls = isSat && !red ? 'row-sat' : (red ? 'row-hol' : '');
    const dateCls = isSat && !red ? 'sat' : (red ? 'hol' : 'wday');

    const [y, m, d] = dateStr.split('-');
    const dow = new Date(dateStr + 'T00:00:00').getDay();
    const dateLabel = `${parseInt(m)}/${parseInt(d)} (${DAY_KO[dow]})`;

    const rowData = data[dateStr] || { ot: employees.map(() => null), pt1: null, pt2: null, holiday: false };

    let rowTotal = 0;
    let inputCells = '';
    employees.forEach((_, i) => {
      const val = rowData.ot[i];
      const inputCls = (val > 0) ? (hlWknd ? 'has-value-hol' : 'has-value-wday') : '';
      inputCells += `<td><input type="number" class="num-input ${inputCls}" min="0" max="24" step="1"
        value="${val !== null && val !== undefined ? val : ''}"
        data-date="${dateStr}" data-emp="${i}" data-type="ot"
        onchange="onOTInput(this)"
        onkeydown="cellKeyNav(event,this,'ot')"
      ></td>`;
      if (val > 0) rowTotal += parseInt(val);
    });

    tbHTML += `<tr class="${rowCls}">
      <td class="date-cell ${dateCls}" onclick="toggleHoliday('${dateStr}')" title="클릭하여 휴일 토글">${dateLabel}</td>
      ${inputCells}
      <td class="total-cell" id="ot-total-${dateStr}">${rowTotal > 0 ? rowTotal : ''}</td>
    </tr>`;
  });
  tbody.innerHTML = tbHTML;

  // 합계 행
  renderOTSummary();
}

function onOTInput(el) {
  const dateStr = el.dataset.date;
  const empIdx  = parseInt(el.dataset.emp);
  const val     = el.value === '' ? null : Math.max(0, Math.min(24, parseInt(el.value) || 0));
  if (!data[dateStr]) data[dateStr] = { ot: employees.map(() => null), pt1: null, pt2: null, holiday: false };
  while (data[dateStr].ot.length <= empIdx) data[dateStr].ot.push(null);
  data[dateStr].ot[empIdx] = val;

  // 스타일 업데이트
  const entry  = dateList.find(d => d.dateStr === dateStr);
  const hlWknd = entry && isHolidayOrWeekend(entry);
  el.className = 'num-input';
  if (val > 0) el.classList.add(hlWknd ? 'has-value-hol' : 'has-value-wday');

  // 행 합계 업데이트
  updateOTRowTotal(dateStr);
  // 열 합계(summary) 업데이트
  renderOTSummary();
  autoSave();
}

function updateOTRowTotal(dateStr) {
  const rowData = data[dateStr];
  if (!rowData) return;
  let total = 0;
  rowData.ot.forEach(v => { if (v > 0) total += parseInt(v); });
  const cell = document.getElementById(`ot-total-${dateStr}`);
  if (cell) cell.textContent = total > 0 ? total : '';
}

function renderOTSummary() {
  const tfoot = document.getElementById('otFoot');
  const nEmp  = employees.length;

  // 평일 합계
  let wdaySums = employees.map(() => 0);
  let wdayGrand = 0;
  // 휴일/주말 합계
  let holSums  = employees.map(() => 0);
  let holGrand = 0;

  dateList.forEach(entry => {
    const rowData = data[entry.dateStr];
    if (!rowData) return;
    const isHW = isHolidayOrWeekend(entry);
    employees.forEach((_, i) => {
      const v = parseInt(rowData.ot[i]) || 0;
      if (isHW) { holSums[i] += v; holGrand += v; }
      else       { wdaySums[i] += v; wdayGrand += v; }
    });
  });

  let fHTML = '';

  // 평일 OT 행
  fHTML += `<tr class="summary-row wday">
    <td class="lbl">📅 OT (평일)</td>`;
  employees.forEach((_, i) => {
    fHTML += `<td>${wdaySums[i] > 0 ? wdaySums[i] : '-'}</td>`;
  });
  fHTML += `<td class="grand">${wdayGrand > 0 ? wdayGrand : '-'}</td></tr>`;

  // 휴일/주말 OT 행
  fHTML += `<tr class="summary-row hol">
    <td class="lbl">🔴 OT (휴일/주말)</td>`;
  employees.forEach((_, i) => {
    fHTML += `<td>${holSums[i] > 0 ? holSums[i] : '-'}</td>`;
  });
  fHTML += `<td class="grand">${holGrand > 0 ? holGrand : '-'}</td></tr>`;

  tfoot.innerHTML = fHTML;
}

// ── Part Time 테이블 ─────────────────────────
function renderPTTable() {
  const thead = document.getElementById('ptHead');
  const tbody = document.getElementById('ptBody');
  const tfoot = document.getElementById('ptFoot');

  // 헤더
  thead.innerHTML = `<tr>
    <th style="min-width:88px;">날짜</th>
    <th style="min-width:90px;">Part Time (1일)</th>
    <th style="min-width:90px;">Part Time (4시간)</th>
    <th style="min-width:80px;">Day Total</th>
  </tr>`;

  // 본문
  let tbHTML = '';
  dateList.forEach(entry => {
    const { dateStr, isSat } = entry;
    const red    = isRedDay(entry);
    const rowCls = isSat && !red ? 'row-sat' : (red ? 'row-hol' : '');
    const dateCls = isSat && !red ? 'sat' : (red ? 'hol' : 'wday');

    const [y, m, d] = dateStr.split('-');
    const dow = new Date(dateStr + 'T00:00:00').getDay();
    const dateLabel = `${parseInt(m)}/${parseInt(d)} (${DAY_KO[dow]})`;

    const rowData = data[dateStr] || { ot: [], pt1: null, pt2: null, holiday: false };
    const pt1 = rowData.pt1;
    const pt2 = rowData.pt2;
    const dayTotal = (parseInt(pt1)||0) + (parseInt(pt2)||0);

    tbHTML += `<tr class="${rowCls}">
      <td class="date-cell ${dateCls}" onclick="toggleHoliday('${dateStr}')" title="클릭하여 휴일 토글">${dateLabel}</td>
      <td><input type="number" class="num-input ${pt1 > 0 ? 'has-value-wday' : ''}" min="0" max="99" step="1"
        value="${pt1 !== null && pt1 !== undefined ? pt1 : ''}"
        data-date="${dateStr}" data-type="pt1"
        onchange="onPTInput(this,'pt1')"
        onkeydown="cellKeyNav(event,this,'pt')"
      ></td>
      <td><input type="number" class="num-input ${pt2 > 0 ? 'has-value-wday' : ''}" min="0" max="99" step="1"
        value="${pt2 !== null && pt2 !== undefined ? pt2 : ''}"
        data-date="${dateStr}" data-type="pt2"
        onchange="onPTInput(this,'pt2')"
        onkeydown="cellKeyNav(event,this,'pt')"
      ></td>
      <td class="total-cell" id="pt-total-${dateStr}">${dayTotal > 0 ? dayTotal : ''}</td>
    </tr>`;
  });
  tbody.innerHTML = tbHTML;

  // 합계 행
  renderPTSummary();
}

function onPTInput(el, field) {
  const dateStr = el.dataset.date;
  const val     = el.value === '' ? null : Math.max(0, parseInt(el.value) || 0);
  if (!data[dateStr]) data[dateStr] = { ot: employees.map(() => null), pt1: null, pt2: null, holiday: false };
  data[dateStr][field] = val;

  el.className = 'num-input';
  if (val > 0) el.classList.add('has-value-wday');

  // Day Total 업데이트
  const r = data[dateStr];
  const dayTotal = (parseInt(r.pt1)||0) + (parseInt(r.pt2)||0);
  const cell = document.getElementById(`pt-total-${dateStr}`);
  if (cell) cell.textContent = dayTotal > 0 ? dayTotal : '';

  renderPTSummary();
  autoSave();
}

function renderPTSummary() {
  const tfoot = document.getElementById('ptFoot');
  let totalPt1 = 0, totalPt2 = 0;
  dateList.forEach(entry => {
    const r = data[entry.dateStr];
    if (!r) return;
    totalPt1 += parseInt(r.pt1) || 0;
    totalPt2 += parseInt(r.pt2) || 0;
  });
  const totalAll = totalPt1 + totalPt2;
  tfoot.innerHTML = `<tr class="summary-row">
    <td class="lbl">합계 (Total)</td>
    <td class="grand">${totalPt1 > 0 ? totalPt1 : '-'}</td>
    <td class="grand">${totalPt2 > 0 ? totalPt2 : '-'}</td>
    <td class="grand">${totalAll > 0 ? totalAll : '-'}</td>
  </tr>`;
}

// ════════════════════════════════════════════
//  휴일 수동 토글
// ════════════════════════════════════════════
function toggleHoliday(dateStr) {
  if (!data[dateStr]) data[dateStr] = { ot: employees.map(() => null), pt1: null, pt2: null, holiday: false };
  data[dateStr].holiday = !data[dateStr].holiday;
  // OT & PT 테이블 재렌더 (색상 변경)
  renderTables();
  autoSave();
}

// ════════════════════════════════════════════
//  키보드 탐색 (Enter/Tab → 다음 셀)
// ════════════════════════════════════════════
function cellKeyNav(e, el, tableType) {
  if (e.key !== 'Enter' && e.key !== 'Tab') return;
  e.preventDefault();
  const tableId = tableType === 'ot' ? 'otTable' : 'ptTable';
  const inputs  = Array.from(document.getElementById(tableId).querySelectorAll('input.num-input'));
  const idx     = inputs.indexOf(el);
  if (idx < 0) return;
  const next = inputs[idx + 1];
  if (next) { next.focus(); next.select(); }
}

// ════════════════════════════════════════════
//  엑셀 출력 (SheetJS)
// ════════════════════════════════════════════
function exportExcel() {
  const { startStr, endStr } = calcPeriod(selYear, selMonth);
  const fileName = `OT_Fee_메틀러토레도_${selYear}_${String(selMonth).padStart(2,'0')}.xlsx`;
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: OT Fee ──────────────────────
  const otAoa = [];
  // 타이틀
  otAoa.push([`OT Fee - 메틀러토레도 (${startStr} ~ ${endStr})`]);
  otAoa.push([]);
  // 헤더
  otAoa.push(['날짜', ...employees, '합계']);

  dateList.forEach(entry => {
    const { dateStr, isSat } = entry;
    const red = isRedDay(entry);
    const [y, m, d] = dateStr.split('-');
    const dow = new Date(dateStr + 'T00:00:00').getDay();
    const label = `${parseInt(m)}/${parseInt(d)} (${DAY_KO[dow]})`;
    const rowData = data[dateStr] || {};
    const otVals = employees.map((_, i) => parseInt(rowData.ot && rowData.ot[i]) || 0);
    const total  = otVals.reduce((s, v) => s + v, 0);
    otAoa.push([label, ...otVals, total]);
  });

  otAoa.push([]);
  // 평일 합계
  let wdaySums = employees.map(() => 0);
  let wdayGrand = 0;
  let holSums  = employees.map(() => 0);
  let holGrand  = 0;
  dateList.forEach(entry => {
    const r = data[entry.dateStr] || {};
    const isHW = isHolidayOrWeekend(entry);
    employees.forEach((_, i) => {
      const v = parseInt(r.ot && r.ot[i]) || 0;
      if (isHW) { holSums[i] += v; holGrand += v; }
      else       { wdaySums[i] += v; wdayGrand += v; }
    });
  });
  otAoa.push(['OT (평일)', ...wdaySums, wdayGrand]);
  otAoa.push(['OT (휴일/주말)', ...holSums, holGrand]);

  const wsOT = XLSX.utils.aoa_to_sheet(otAoa);
  const colWidths = [{ wch: 14 }, ...employees.map(() => ({ wch: 10 })), { wch: 8 }];
  wsOT['!cols'] = colWidths;
  // 병합: 타이틀 셀
  wsOT['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: employees.length + 1 } }];
  XLSX.utils.book_append_sheet(wb, wsOT, 'OT Fee');

  // ── Sheet 2: Part Time ───────────────────
  const ptAoa = [];
  ptAoa.push([`Part Time List - 메틀러토레도 (${startStr} ~ ${endStr})`]);
  ptAoa.push([]);
  ptAoa.push(['날짜', 'Part Time (1일)', 'Part Time (4시간)', 'Day Total']);

  let totalPt1 = 0, totalPt2 = 0;
  dateList.forEach(entry => {
    const { dateStr } = entry;
    const [y, m, d] = dateStr.split('-');
    const dow = new Date(dateStr + 'T00:00:00').getDay();
    const label = `${parseInt(m)}/${parseInt(d)} (${DAY_KO[dow]})`;
    const r = data[dateStr] || {};
    const pt1 = parseInt(r.pt1) || 0;
    const pt2 = parseInt(r.pt2) || 0;
    totalPt1 += pt1; totalPt2 += pt2;
    ptAoa.push([label, pt1 || '', pt2 || '', (pt1 + pt2) || '']);
  });

  ptAoa.push([]);
  ptAoa.push(['합계 (Total)', totalPt1, totalPt2, totalPt1 + totalPt2]);

  const wsPT = XLSX.utils.aoa_to_sheet(ptAoa);
  wsPT['!cols'] = [{ wch: 14 }, { wch: 18 }, { wch: 18 }, { wch: 12 }];
  wsPT['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 3 } }];
  XLSX.utils.book_append_sheet(wb, wsPT, 'Part Time');

  XLSX.writeFile(wb, fileName);
}

// ════════════════════════════════════════════
//  유틸
// ════════════════════════════════════════════
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
