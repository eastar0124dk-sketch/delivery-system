<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업체 관리 - 토탈 물류</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { display: flex; min-height: 100vh; background: #f0f4f8; margin: 0; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 24px; margin-bottom: 24px; }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
      border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600;
    }
    .btn-primary:hover { opacity: .9; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .search-box {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .search-input {
      padding: 10px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; font-family: inherit; width: 220px;
    }
    .search-input:focus { outline: none; border-color: #667eea; }
    .filter-select {
      padding: 10px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; font-family: inherit;
    }
    .filter-select:focus { outline: none; border-color: #667eea; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f7fafc; color: #4a5568; padding: 11px 12px; text-align: left; font-weight: 600; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    td { padding: 11px 12px; border-bottom: 1px solid #f0f4f8; color: #2d3748; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fafc; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .badge-transport { background: #dbeafe; color: #1e40af; }
    .badge-shipper   { background: #d1fae5; color: #065f46; }
    .badge-forwarder { background: #ede9fe; color: #5b21b6; }
    .badge-other     { background: #f3f4f6; color: #4b5563; }

    .btn-edit {
      padding: 5px 12px; border-radius: 7px; border: 1.5px solid #667eea;
      background: #fff; color: #667eea; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
    }
    .btn-edit:hover { background: #ebf4ff; }
    .btn-del {
      padding: 5px 12px; border-radius: 7px; border: 1.5px solid #fc8181;
      background: #fff; color: #e53e3e; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
    }
    .btn-del:hover { background: #fff5f5; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; padding: 28px; width: 520px;
      max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 700; color: #1a202c; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; font-family: inherit; box-sizing: border-box;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #667eea; }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { padding: 10px 20px; border-radius: 10px; border: 1.5px solid #e2e8f0; background: #fff; color: #718096; cursor: pointer; font-family: inherit; font-size: 14px; }
    .empty-msg { text-align: center; padding: 40px; color: #a0aec0; font-size: 14px; }
    .count-label { font-size: 13px; color: #718096; }
    .ocr-loading { display: flex; align-items: center; gap: 8px; color: #667eea; font-size: 13px; margin: 8px 0; }
    .ocr-spinner { width: 18px; height: 18px; border: 2px solid #e2e8f0; border-top-color: #667eea; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="hub-main">
    <div class="hub-page-title">🏢 업체 관리</div>

    <div class="card">
      <div class="top-bar">
        <div class="search-box">
          <input type="text" class="search-input" id="searchInput" placeholder="업체명/담당자 검색" oninput="renderTable()">
          <select class="filter-select" id="typeFilter" onchange="renderTable()">
            <option value="">전체 구분</option>
            <option value="transport">운송사</option>
            <option value="shipper">화주</option>
            <option value="forwarder">포워더</option>
            <option value="other">기타</option>
          </select>
          <span class="count-label" id="countLabel"></span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-primary" style="background:linear-gradient(135deg,#38a169,#276749);" onclick="exportExcel()">📥 엑셀 다운로드</button>
          <label class="btn-primary" style="background:linear-gradient(135deg,#ed8936,#c05621);cursor:pointer;" title="명함 사진을 업로드하면 자동으로 정보를 인식합니다">
            📷 명함 스캔 등록
            <input type="file" id="cardInput" accept="image/*" style="display:none;" onchange="scanBusinessCard(event)">
          </label>
          <button class="btn-primary" onclick="openModal()">+ 업체 추가</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>업체명</th>
              <th>구분</th>
              <th>담당자</th>
              <th>전화번호</th>
              <th>주소</th>
              <th>메모</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="vendorTable">
            <tr><td colspan="7" class="empty-msg">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">🏢 업체 추가</div>
      <div id="cardPreviewBox" style="display:none;margin-bottom:16px;background:#f7fafc;border-radius:10px;padding:12px;">
        <div style="font-size:12px;font-weight:600;color:#718096;margin-bottom:8px;">📷 인식된 명함</div>
        <img id="cardPreviewImg" style="max-width:100%;max-height:160px;border-radius:8px;object-fit:contain;" alt="명함">
        <div id="ocrStatusMsg" style="font-size:12px;color:#667eea;margin-top:6px;"></div>
      </div>
      <input type="hidden" id="inp-id">
      <div class="form-group">
        <label class="form-label">업체명 <span style="color:#ef4444">*</span></label>
        <input type="text" class="form-input" id="inp-name" placeholder="업체명">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">구분</label>
          <select class="form-select" id="inp-type">
            <option value="transport">운송사</option>
            <option value="shipper">화주</option>
            <option value="forwarder">포워더</option>
            <option value="other">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">담당자</label>
          <input type="text" class="form-input" id="inp-manager" placeholder="담당자명">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">전화번호</label>
        <input type="tel" class="form-input" id="inp-phone" placeholder="010-0000-0000">
      </div>
      <div class="form-group">
        <label class="form-label">주소</label>
        <input type="text" class="form-input" id="inp-address" placeholder="주소">
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-textarea" id="inp-memo" placeholder="추가 메모 (선택)"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveVendor()">저장</button>
      </div>
    </div>
  </div>

  <script src="hub-nav.js"></script>
  <script>
    initNav('vendors.html');

    const token = sessionStorage.getItem('adminToken');
    const authH = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` });

    let vendors = [];

    const typeLabel = { transport: '운송사', shipper: '화주', forwarder: '포워더', other: '기타' };
    const typeClass = { transport: 'badge-transport', shipper: 'badge-shipper', forwarder: 'badge-forwarder', other: 'badge-other' };

    async function loadVendors() {
      try {
        const res = await fetch('/api/vendors', { headers: authH() });
        if (!res.ok) throw new Error();
        vendors = await res.json();
      } catch {
        vendors = [];
      }
      renderTable();
    }

    function renderTable() {
      const q     = document.getElementById('searchInput').value.trim().toLowerCase();
      const tType = document.getElementById('typeFilter').value;

      let filtered = vendors;
      if (q)     filtered = filtered.filter(v => (v.name||'').toLowerCase().includes(q) || (v.contact||'').toLowerCase().includes(q));
      if (tType) filtered = filtered.filter(v => v.vendor_type === tType);

      document.getElementById('countLabel').textContent = `${filtered.length}개 업체`;

      if (filtered.length === 0) {
        document.getElementById('vendorTable').innerHTML =
          '<tr><td colspan="7" class="empty-msg">업체가 없습니다.</td></tr>';
        return;
      }

      document.getElementById('vendorTable').innerHTML = filtered.map(v => `
        <tr>
          <td><strong>${escHtml(v.name || '-')}</strong></td>
          <td><span class="badge ${typeClass[v.vendor_type] || 'badge-other'}">${typeLabel[v.vendor_type] || v.vendor_type || '-'}</span></td>
          <td>${escHtml(v.contact || '-')}</td>
          <td>${v.phone ? `<a href="tel:${escHtml(v.phone)}" style="color:#667eea;text-decoration:none;">${escHtml(v.phone)}</a>` : '-'}</td>
          <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(v.address || '-')}</td>
          <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#718096;">${escHtml(v.notes || '-')}</td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="btn-edit" onclick="editVendor(${v.id})">수정</button>
              <button class="btn-del" onclick="deleteVendor(${v.id})">삭제</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function openModal(vendor = null) {
      document.getElementById('inp-id').value      = vendor ? vendor.id : '';
      document.getElementById('inp-name').value    = vendor ? (vendor.name || '')            : '';
      document.getElementById('inp-type').value    = vendor ? (vendor.vendor_type || 'transport') : 'transport';
      document.getElementById('inp-manager').value = vendor ? (vendor.contact || '')         : '';
      document.getElementById('inp-phone').value   = vendor ? (vendor.phone || '')           : '';
      document.getElementById('inp-address').value = vendor ? (vendor.address || '')         : '';
      document.getElementById('inp-memo').value    = vendor ? (vendor.notes || '')           : '';
      document.getElementById('modalTitle').textContent = vendor ? '🏢 업체 수정' : '🏢 업체 추가';
      document.getElementById('modal').classList.add('show');
    }

    function editVendor(id) {
      const v = vendors.find(x => x.id === id);
      if (v) openModal(v);
    }

    async function saveVendor() {
      const name = document.getElementById('inp-name').value.trim();
      if (!name) { alert('업체명을 입력하세요.'); return; }

      const id = document.getElementById('inp-id').value;
      const body = {
        name,
        vendor_type: document.getElementById('inp-type').value,
        contact:     document.getElementById('inp-manager').value.trim() || null,
        phone:       document.getElementById('inp-phone').value.trim() || null,
        address:     document.getElementById('inp-address').value.trim() || null,
        notes:       document.getElementById('inp-memo').value.trim() || null
      };

      try {
        let res;
        if (id) {
          res = await fetch(`/api/vendors/${id}`, { method: 'PATCH', headers: authH(), body: JSON.stringify(body) });
        } else {
          res = await fetch('/api/vendors', { method: 'POST', headers: authH(), body: JSON.stringify(body) });
        }
        if (!res.ok) throw new Error();
        closeModal();
        await loadVendors();
      } catch { alert('저장에 실패했습니다.'); }
    }

    async function deleteVendor(id) {
      const v = vendors.find(x => x.id === id);
      if (!confirm(`"${v?.name || '업체'}"를 삭제하시겠습니까?`)) return;
      try {
        await fetch(`/api/vendors/${id}`, { method: 'DELETE', headers: authH() });
        vendors = vendors.filter(x => x.id !== id);
        renderTable();
      } catch { alert('삭제에 실패했습니다.'); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    function exportExcel() {
      if (!vendors.length) { alert('데이터가 없습니다.'); return; }
      const typeLabel = { transport:'운송사', shipper:'화주', forwarder:'포워더', other:'기타' };
      const rows = [['업체명', '구분', '담당자', '전화번호', '주소', '메모']];
      vendors.forEach(v => rows.push([
        v.name || '', typeLabel[v.vendor_type] || v.vendor_type || '',
        v.contact || '', v.phone || '', v.address || '', v.notes || ''
      ]));
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{wch:20},{wch:8},{wch:12},{wch:14},{wch:30},{wch:30}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '업체관리');
      XLSX.writeFile(wb, `업체관리_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // ── 명함 스캔 OCR ──────────────────────────────────────
    async function scanBusinessCard(event) {
      const file = event.target.files[0];
      if (!file) return;

      // 미리보기 표시 + 모달 열기
      const reader = new FileReader();
      reader.onload = async (e) => {
        const imgSrc = e.target.result;
        document.getElementById('cardPreviewImg').src = imgSrc;
        document.getElementById('cardPreviewBox').style.display = '';
        document.getElementById('ocrStatusMsg').innerHTML =
          '<div class="ocr-loading"><div class="ocr-spinner"></div>명함 인식 중...</div>';

        // 폼 초기화 후 모달 열기
        document.getElementById('inp-id').value = '';
        document.getElementById('inp-name').value = '';
        document.getElementById('inp-manager').value = '';
        document.getElementById('inp-phone').value = '';
        document.getElementById('inp-address').value = '';
        document.getElementById('inp-memo').value = '';
        document.getElementById('inp-type').value = 'other';
        document.getElementById('modalTitle').textContent = '📷 명함 스캔 등록';
        document.getElementById('modal').classList.add('show');

        // Tesseract OCR 실행
        try {
          const { data: { text } } = await Tesseract.recognize(imgSrc, 'kor+eng', {
            logger: m => {
              if (m.status === 'recognizing text') {
                const pct = Math.round((m.progress || 0) * 100);
                document.getElementById('ocrStatusMsg').innerHTML =
                  `<div class="ocr-loading"><div class="ocr-spinner"></div>텍스트 인식 중... ${pct}%</div>`;
              }
            }
          });

          parseCardText(text);
          document.getElementById('ocrStatusMsg').innerHTML =
            '✅ 인식 완료 — 내용을 확인 후 수정하세요.';
          document.getElementById('ocrStatusMsg').style.color = '#276749';
        } catch (err) {
          document.getElementById('ocrStatusMsg').innerHTML = '⚠️ 인식 실패 — 직접 입력해주세요.';
          document.getElementById('ocrStatusMsg').style.color = '#e53e3e';
          console.error('OCR error:', err);
        }

        // 파일 input 초기화 (재사용 가능)
        event.target.value = '';
      };
      reader.readAsDataURL(file);
    }

    function parseCardText(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const allText = lines.join(' ');

      // 전화번호 추출 (다양한 패턴)
      const phoneMatch = allText.match(/(?:Tel|TEL|전화|Mobile|M|HP|핸드폰|연락처)?[:\s]*(\d{2,4}[-.\s]?\d{3,4}[-.\s]?\d{4})/i);
      if (phoneMatch) {
        let phone = phoneMatch[1].replace(/[^\d-]/g, '');
        if (!phone.includes('-')) {
          phone = phone.replace(/^(\d{2,3})(\d{3,4})(\d{4})$/, '$1-$2-$3');
        }
        document.getElementById('inp-phone').value = phone;
      }

      // 이메일 추출
      const emailMatch = allText.match(/[\w.-]+@[\w.-]+\.\w+/);
      let emailNote = '';
      if (emailMatch) emailNote = emailMatch[0];

      // 주소 추출 (시/도/구 포함 라인)
      const addressMatch = lines.find(l =>
        /서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주|시|구|동|로\s|길\s/.test(l) &&
        l.length > 10
      );
      if (addressMatch) document.getElementById('inp-address').value = addressMatch;

      // 업체명 추출 (주식회사/㈜/(주) 포함 라인 우선, 또는 첫 번째 긴 라인)
      const companyLine = lines.find(l =>
        /주식회사|㈜|\(주\)|Corp|Co\.|Ltd|Inc|LLC|물류|운송|포워딩|Logistics|Trading/.test(l)
      ) || lines.find(l => l.length >= 3 && l.length <= 30 && /[가-힣a-zA-Z]/.test(l));
      if (companyLine) {
        document.getElementById('inp-name').value = companyLine.replace(/[\(\)㈜]/g, '').trim();
        // 업체 타입 자동 분류
        if (/운송|물류|배송|Logistics|Transport/.test(companyLine)) {
          document.getElementById('inp-type').value = 'transport';
        } else if (/포워딩|Forwarding|Forwarder/.test(companyLine)) {
          document.getElementById('inp-type').value = 'forwarder';
        }
      }

      // 담당자명 추출 (직함 앞 한글 이름)
      const nameMatch = allText.match(/([가-힣]{2,4})\s*(?:대표|부장|차장|과장|팀장|이사|사장|실장|주임|대리|사원|매니저|Manager|Director)/);
      if (nameMatch) document.getElementById('inp-manager').value = nameMatch[1];

      // 메모에 이메일 기록
      if (emailNote) {
        document.getElementById('inp-memo').value = `이메일: ${emailNote}`;
      }
    }

    loadVendors();
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
</body>
</html>
