<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보세 반입/출 관리 - 토탈 물류</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="hub-nav.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;display:flex;min-height:100vh;background:#f0f4f8;}
    .hub-main{margin-left:220px;padding:24px;flex:1;}
    @media(max-width:768px){.hub-main{margin-left:0;padding:16px;}}

    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:20px;font-weight:700;color:#1a202c;display:flex;align-items:center;gap:10px;}
    .page-title i{color:#2b6cb0;}

    .btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4);}
    .btn-danger{background:#fed7d7;color:#c53030;}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}

    /* 필터 영역 */
    .filter-bar{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
    .filter-bar label{font-size:12px;font-weight:600;color:#4a5568;white-space:nowrap;}
    .filter-bar input[type=date]{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;}
    .filter-bar select{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;}

    /* 요약 카드 */
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
    @media(max-width:700px){.summary-grid{grid-template-columns:1fr 1fr;}}
    .stat-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:18px;text-align:center;}
    .stat-card .stat-label{font-size:11px;font-weight:600;color:#718096;margin-bottom:6px;text-transform:uppercase;}
    .stat-card .stat-value{font-size:28px;font-weight:700;}
    .stat-card.in .stat-value{color:#2b6cb0;}
    .stat-card.out .stat-value{color:#c05621;}
    .stat-card.total .stat-value{color:#2d3748;}
    .stat-card.pending .stat-value{color:#6b46c1;}

    /* 테이블 */
    .card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px;}
    .card-title{font-size:15px;font-weight:700;color:#2d3748;display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:2px solid #f0f4f8;margin-bottom:16px;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:#f7fafc;color:#4a5568;font-weight:600;padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap;}
    td{padding:10px 12px;border-bottom:1px solid #f0f4f8;vertical-align:middle;}
    tr:hover td{background:#fafafa;}
    .no-data{text-align:center;padding:40px;color:#a0aec0;}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .badge-in{background:#ebf8ff;color:#2b6cb0;}
    .badge-out{background:#fff7ed;color:#c05621;}

    /* 모달 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;}
    .modal-overlay.show{display:flex;}
    .modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:17px;font-weight:700;color:#2d3748;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:500px){.form-grid{grid-template-columns:1fr;}}
    .form-group{display:flex;flex-direction:column;gap:5px;}
    .form-group.span2{grid-column:span 2;}
    @media(max-width:500px){.form-group.span2{grid-column:span 1;}}
    .form-group label{font-size:12px;font-weight:600;color:#4a5568;}
    .req{color:#e53e3e;margin-left:2px;}
    .form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa;transition:border .2s;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#667eea;background:#fff;}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

    .alert{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:14px;display:none;align-items:center;gap:8px;}
    .alert-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0;display:flex;}
    .alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;display:flex;}
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="hub-main">
    <div class="page-header">
      <div class="page-title"><i class="fas fa-ship"></i> 보세 반입/출 관리</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <label class="btn" style="background:#48bb78;color:#fff;cursor:pointer;" title="엑셀/CSV 파일로 일괄 업로드">
          <i class="fas fa-file-excel"></i> 엑셀 업로드
          <input type="file" id="excelUpload" accept=".xlsx,.xls,.csv" style="display:none;" onchange="handleExcelUpload(event)">
        </label>
        <button class="btn" style="background:#4299e1;color:#fff;" onclick="exportExcel()"><i class="fas fa-download"></i> 엑셀 다운로드</button>
        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> 반입/출 등록</button>
      </div>
    </div>

    <div class="alert alert-success" id="alertSuccess"><i class="fas fa-check-circle"></i> <span id="alertSuccessMsg"></span></div>
    <div class="alert alert-error" id="alertError"><i class="fas fa-exclamation-circle"></i> <span id="alertErrorMsg"></span></div>

    <!-- 필터 -->
    <div class="filter-bar">
      <label><i class="fas fa-calendar" style="color:#667eea;margin-right:4px;"></i> 날짜</label>
      <input type="date" id="filterDate" onchange="loadRecords()">
      <label>구분</label>
      <select id="filterType" onchange="loadRecords()">
        <option value="">전체</option>
        <option value="반입">반입</option>
        <option value="반출">반출</option>
      </select>
      <button class="btn btn-primary" style="padding:8px 14px;" onclick="setToday()">
        <i class="fas fa-calendar-day"></i> 오늘
      </button>
      <button class="btn" style="background:#e2e8f0;color:#4a5568;padding:8px 14px;" onclick="clearFilter()">
        <i class="fas fa-times"></i> 초기화
      </button>
    </div>

    <!-- 요약 -->
    <div class="summary-grid">
      <div class="stat-card in">
        <div class="stat-label">📥 반입 건수</div>
        <div class="stat-value" id="cntIn">-</div>
      </div>
      <div class="stat-card out">
        <div class="stat-label">📤 반출 건수</div>
        <div class="stat-value" id="cntOut">-</div>
      </div>
      <div class="stat-card total">
        <div class="stat-label">📦 전체 건수</div>
        <div class="stat-value" id="cntTotal">-</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-label">📋 조회 날짜</div>
        <div class="stat-value" id="filterDateDisplay" style="font-size:14px;padding-top:6px;">-</div>
      </div>
    </div>

    <!-- 목록 -->
    <div class="card">
      <div class="card-title"><i class="fas fa-list" style="color:#2b6cb0;"></i> 반입/출 내역</div>
      <div class="table-wrap">
        <table id="recordsTable">
          <thead>
            <tr>
              <th>구분</th>
              <th>날짜</th>
              <th>BL번호</th>
              <th>MRN</th>
              <th>화주명</th>
              <th>품명</th>
              <th>수량</th>
              <th>중량</th>
              <th>비고</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr><td colspan="10" class="no-data"><i class="fas fa-ship" style="display:block;font-size:32px;margin-bottom:8px;"></i>데이터가 없습니다</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 등록/수정 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title"><i class="fas fa-ship" style="color:#2b6cb0;"></i> <span id="modalTitle">반입/출 등록</span></div>
      <div class="form-grid">
        <div class="form-group">
          <label>구분 <span class="req">*</span></label>
          <select id="fType">
            <option value="반입">📥 반입</option>
            <option value="반출">📤 반출</option>
          </select>
        </div>
        <div class="form-group">
          <label>날짜 <span class="req">*</span></label>
          <input type="date" id="fDate">
        </div>
        <div class="form-group">
          <label>BL번호</label>
          <input type="text" id="fBl" placeholder="BL번호 입력">
        </div>
        <div class="form-group">
          <label>MRN</label>
          <input type="text" id="fMrn" placeholder="MRN 입력">
        </div>
        <div class="form-group">
          <label>화주명</label>
          <input type="text" id="fCustomer" placeholder="화주명">
        </div>
        <div class="form-group">
          <label>품명</label>
          <input type="text" id="fProduct" placeholder="품명">
        </div>
        <div class="form-group">
          <label>수량</label>
          <input type="text" id="fQty" placeholder="수량">
        </div>
        <div class="form-group">
          <label>중량 (KG)</label>
          <input type="text" id="fWeight" placeholder="중량">
        </div>
        <div class="form-group span2">
          <label>비고</label>
          <input type="text" id="fNotes" placeholder="기타 메모">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" style="background:#e2e8f0;color:#4a5568;" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveRecord()"><i class="fas fa-save"></i> 저장</button>
      </div>
    </div>
  </div>

  <!-- BL 상세 모달 -->
  <div class="modal-overlay" id="blDetailModal">
    <div class="modal-box" style="max-width:640px;">
      <div class="modal-title"><i class="fas fa-search" style="color:#2b6cb0;"></i> BL 상세 이력</div>
      <div id="blDetailContent"></div>
      <div class="modal-actions">
        <button class="btn" style="background:#e2e8f0;color:#4a5568;" onclick="document.getElementById('blDetailModal').classList.remove('show')">닫기</button>
      </div>
    </div>
  </div>

  <!-- 엑셀 업로드 가이드 모달 -->
  <div class="modal-overlay" id="uploadGuideModal">
    <div class="modal-box" style="max-width:520px;">
      <div class="modal-title"><i class="fas fa-file-excel" style="color:#48bb78;"></i> 엑셀 업로드 결과</div>
      <div id="uploadResult"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="document.getElementById('uploadGuideModal').classList.remove('show');loadRecords()">확인</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script>
    const token = sessionStorage.getItem('adminToken');
    if (!token) location.href = 'index.html';
    const authH = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` });
    if (typeof initNav === 'function') initNav('bonded');

    let editId = null;
    let allRecords = [];

    function setToday() {
      document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
      loadRecords();
    }

    function clearFilter() {
      document.getElementById('filterDate').value = '';
      document.getElementById('filterType').value = '';
      loadRecords();
    }

    async function loadRecords() {
      const date = document.getElementById('filterDate').value;
      const type = document.getElementById('filterType').value;
      let url = '/api/bonded';
      const params = [];
      if (date) params.push(`date=${date}`);
      if (type) params.push(`type=${encodeURIComponent(type)}`);
      if (params.length) url += '?' + params.join('&');
      try {
        const res = await fetch(url, { headers: authH() });
        const json = await res.json();
        allRecords = json.data || [];
        renderTable(allRecords);
        updateStats(allRecords, date);
      } catch(e) { console.error(e); }
    }

    function updateStats(records, date) {
      const inCnt  = records.filter(r => r.record_type === '반입').length;
      const outCnt = records.filter(r => r.record_type === '반출').length;
      document.getElementById('cntIn').textContent    = inCnt;
      document.getElementById('cntOut').textContent   = outCnt;
      document.getElementById('cntTotal').textContent = records.length;
      document.getElementById('filterDateDisplay').textContent = date || '전체';
    }

    function renderTable(records) {
      const tbody = document.getElementById('recordsBody');
      if (!records.length) {
        tbody.innerHTML = '<tr><td colspan="10" class="no-data"><i class="fas fa-ship" style="display:block;font-size:32px;margin-bottom:8px;"></i>데이터가 없습니다</td></tr>';
        return;
      }
      tbody.innerHTML = records.map(r => `
        <tr>
          <td><span class="badge badge-${r.record_type==='반입'?'in':'out'}">${r.record_type==='반입'?'📥 반입':'📤 반출'}</span></td>
          <td>${r.record_date||'-'}</td>
          <td style="font-family:monospace;font-weight:700;color:#2b6cb0;cursor:pointer;text-decoration:underline;" onclick="openBLDetail('${r.bl_no||''}')">${r.bl_no||'-'}</td>
          <td style="font-family:monospace;font-size:12px;">${r.mrn||'-'}</td>
          <td>${r.customer||'-'}</td>
          <td>${r.product||'-'}</td>
          <td>${r.quantity||'-'}</td>
          <td>${r.weight||'-'}</td>
          <td style="font-size:12px;color:#718096;">${r.notes||'-'}</td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-sm" style="background:#ebf8ff;color:#2b6cb0;" onclick="editRecord(${r.id})"><i class="fas fa-edit"></i></button>
              <button class="btn btn-sm btn-danger" onclick="deleteRecord(${r.id})"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>`).join('');
    }

    function openModal(id=null) {
      editId = id;
      document.getElementById('modalTitle').textContent = id ? '반입/출 수정' : '반입/출 등록';
      if (!id) {
        document.getElementById('fType').value = '반입';
        document.getElementById('fDate').value = document.getElementById('filterDate').value || new Date().toISOString().split('T')[0];
        document.getElementById('fBl').value = '';
        document.getElementById('fMrn').value = '';
        document.getElementById('fCustomer').value = '';
        document.getElementById('fProduct').value = '';
        document.getElementById('fQty').value = '';
        document.getElementById('fWeight').value = '';
        document.getElementById('fNotes').value = '';
      }
      document.getElementById('modalOverlay').classList.add('show');
    }

    function editRecord(id) {
      const r = allRecords.find(x => x.id === id);
      if (!r) return;
      editId = id;
      document.getElementById('modalTitle').textContent = '반입/출 수정';
      document.getElementById('fType').value = r.record_type || '반입';
      document.getElementById('fDate').value = r.record_date || '';
      document.getElementById('fBl').value = r.bl_no || '';
      document.getElementById('fMrn').value = r.mrn || '';
      document.getElementById('fCustomer').value = r.customer || '';
      document.getElementById('fProduct').value = r.product || '';
      document.getElementById('fQty').value = r.quantity || '';
      document.getElementById('fWeight').value = r.weight || '';
      document.getElementById('fNotes').value = r.notes || '';
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      editId = null;
    }

    async function saveRecord() {
      const body = {
        record_type: document.getElementById('fType').value,
        record_date: document.getElementById('fDate').value,
        bl_no: document.getElementById('fBl').value,
        mrn: document.getElementById('fMrn').value,
        customer: document.getElementById('fCustomer').value,
        product: document.getElementById('fProduct').value,
        quantity: document.getElementById('fQty').value,
        weight: document.getElementById('fWeight').value,
        notes: document.getElementById('fNotes').value,
      };
      if (!body.record_date) { alert('날짜를 입력해주세요.'); return; }
      try {
        let res;
        if (editId) {
          res = await fetch(`/api/bonded/${editId}`, { method:'PATCH', headers: authH(), body: JSON.stringify(body) });
        } else {
          res = await fetch('/api/bonded', { method:'POST', headers: authH(), body: JSON.stringify(body) });
        }
        if (res.ok) {
          closeModal(); loadRecords();
          showAlert('success', editId ? '수정되었습니다.' : '등록되었습니다.');
        } else {
          const e = await res.json();
          showAlert('error', e.error||'저장 실패');
        }
      } catch(e) { showAlert('error', '오류: '+e.message); }
    }

    async function deleteRecord(id) {
      const r = allRecords.find(x => x.id === id);
      if (!confirm(`[${r?.bl_no||'이 항목'}] 을 삭제하시겠습니까?`)) return;
      try {
        const res = await fetch(`/api/bonded/${id}`, { method:'DELETE', headers: authH() });
        if (res.ok) { loadRecords(); showAlert('success','삭제되었습니다.'); }
      } catch(e) { showAlert('error','삭제 실패'); }
    }

    function showAlert(type, msg) {
      const el = document.getElementById(type==='success'?'alertSuccess':'alertError');
      const ml = document.getElementById(type==='success'?'alertSuccessMsg':'alertErrorMsg');
      ml.textContent = msg; el.style.display = 'flex';
      setTimeout(() => el.style.display='none', 3000);
    }

    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    // ── BL 상세 이력 조회 ──
    function openBLDetail(blNo) {
      if (!blNo) return;
      const records = allRecords.filter(r => r.bl_no === blNo);
      // 전체 데이터에서도 조회 (필터와 무관하게)
      const content = document.getElementById('blDetailContent');
      if (records.length === 0) {
        content.innerHTML = '<p style="color:#a0aec0;text-align:center;padding:20px;">해당 BL 이력이 없습니다.</p>';
      } else {
        const r0 = records[0];
        content.innerHTML = `
          <div style="background:#ebf8ff;border-radius:10px;padding:14px;margin-bottom:16px;">
            <div style="font-size:15px;font-weight:700;color:#2b6cb0;margin-bottom:4px;">
              <i class="fas fa-barcode"></i> BL번호: ${r0.bl_no}
            </div>
            <div style="font-size:12px;color:#4a5568;">화주: ${r0.customer||'-'} &nbsp;|&nbsp; 품명: ${r0.product||'-'} &nbsp;|&nbsp; MRN: ${r0.mrn||'-'}</div>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
              <tr>
                <th style="background:#f7fafc;padding:8px;text-align:left;border-bottom:2px solid #e2e8f0;">구분</th>
                <th style="background:#f7fafc;padding:8px;text-align:left;border-bottom:2px solid #e2e8f0;">날짜</th>
                <th style="background:#f7fafc;padding:8px;text-align:right;border-bottom:2px solid #e2e8f0;">수량</th>
                <th style="background:#f7fafc;padding:8px;text-align:right;border-bottom:2px solid #e2e8f0;">중량(KG)</th>
                <th style="background:#f7fafc;padding:8px;text-align:left;border-bottom:2px solid #e2e8f0;">비고</th>
              </tr>
            </thead>
            <tbody>
              ${records.map(r => `
                <tr>
                  <td style="padding:8px;border-bottom:1px solid #f0f4f8;">
                    <span class="badge badge-${r.record_type==='반입'?'in':'out'}">${r.record_type==='반입'?'📥 반입':'📤 반출'}</span>
                  </td>
                  <td style="padding:8px;border-bottom:1px solid #f0f4f8;font-weight:600;">${r.record_date||'-'}</td>
                  <td style="padding:8px;border-bottom:1px solid #f0f4f8;text-align:right;">${r.quantity||'-'}</td>
                  <td style="padding:8px;border-bottom:1px solid #f0f4f8;text-align:right;">${r.weight||'-'}</td>
                  <td style="padding:8px;border-bottom:1px solid #f0f4f8;font-size:12px;color:#718096;">${r.notes||'-'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
          <div style="margin-top:12px;padding:10px;background:#f7fafc;border-radius:8px;font-size:12px;color:#718096;text-align:center;">
            총 ${records.length}건 이력 (반입 ${records.filter(r=>r.record_type==='반입').length}건 / 반출 ${records.filter(r=>r.record_type==='반출').length}건)
          </div>
        `;
      }
      document.getElementById('blDetailModal').classList.add('show');
    }

    document.getElementById('blDetailModal').addEventListener('click', e => {
      if (e.target === document.getElementById('blDetailModal'))
        document.getElementById('blDetailModal').classList.remove('show');
    });

    // ── 엑셀 다운로드 ──
    function exportExcel() {
      if (!allRecords.length) { alert('다운로드할 데이터가 없습니다.'); return; }
      const now = new Date();
      const exportDate = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
      const filterDate = document.getElementById('filterDate').value || now.toISOString().split('T')[0];

      /* ── 스타일 헬퍼 ── */
      const BM={top:{style:'medium',color:{rgb:'1E293B'}},bottom:{style:'medium',color:{rgb:'1E293B'}},left:{style:'medium',color:{rgb:'1E293B'}},right:{style:'medium',color:{rgb:'1E293B'}}};
      const BT={top:{style:'thin',color:{rgb:'CBD5E0'}},bottom:{style:'thin',color:{rgb:'CBD5E0'}},left:{style:'thin',color:{rgb:'CBD5E0'}},right:{style:'thin',color:{rgb:'CBD5E0'}}};
      const sA=(ws,ref,s)=>{if(ws[ref])ws[ref].s=s;};
      const sR=(ws,r1,c1,r2,c2,s)=>{
        for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
          const ref=XLSX.utils.encode_cell({r,c});
          if(!ws[ref])ws[ref]={t:'z',v:''};
          ws[ref].s=s;
        }
      };
      const mk=(bold,sz,fg,bg,align='center',bdr=BT)=>({font:{bold,sz,color:{rgb:fg},name:'맑은 고딕'},fill:{patternType:'solid',fgColor:{rgb:bg}},alignment:{horizontal:align,vertical:'center'},border:bdr});

      const NC=9;
      const inCnt  = allRecords.filter(r=>r.record_type==='반입').length;
      const outCnt = allRecords.filter(r=>r.record_type==='반출').length;

      const aoa=[
        [`보세창고  반입 / 반출 현황`,...Array(NC-1).fill('')],
        [`기준일 : ${filterDate}`,'',`출력일 : ${exportDate}`,...Array(NC-3).fill('')],
        Array(NC).fill(''),
        ['구분','날짜','BL 번호','MRN','화 주 명','품  명','수량','중량 (KG)','비고'],
        ...allRecords.map(r=>[r.record_type,r.record_date,r.bl_no,r.mrn,r.customer,r.product,r.quantity,r.weight,r.notes||'']),
        Array(NC).fill(''),
        ['반입 건수','','',inCnt,'반출 건수','','',outCnt,''],
        ['총 건수','','',allRecords.length,'','','','',''],
      ];

      const ws=XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols']=[{wch:8},{wch:12},{wch:20},{wch:16},{wch:16},{wch:16},{wch:8},{wch:11},{wch:20}];
      ws['!rows']=[{hpt:32},{hpt:18},{hpt:6},{hpt:22}];
      ws['!merges']=[
        {s:{r:0,c:0},e:{r:0,c:NC-1}},
        {s:{r:1,c:0},e:{r:1,c:1}},{s:{r:1,c:2},e:{r:1,c:NC-1}},
      ];

      sR(ws,0,0,0,NC-1,mk(true,16,'FFFFFF','0F3460','center',BM));
      sR(ws,1,0,1,NC-1,mk(false,10,'475569','E0F2FE','left',BT));
      sA(ws,XLSX.utils.encode_cell({r:1,c:2}),mk(false,10,'475569','E0F2FE','right',BT));
      sR(ws,3,0,3,NC-1,mk(true,11,'FFFFFF','0369A1','center',BM));

      allRecords.forEach((r,i)=>{
        const isIn=r.record_type==='반입';
        const bg=isIn?(i%2===0?'EFF6FF':'DBEAFE'):(i%2===0?'FFF7ED':'FEE2E2');
        sR(ws,4+i,0,4+i,NC-1,mk(false,10,'1E293B',bg,'center',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:0}),mk(true,10,isIn?'1D4ED8':'DC2626',bg,'center',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:1}),mk(true,10,'374151',bg,'left',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:4}),mk(false,10,'374151',bg,'left',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:5}),mk(false,10,'374151',bg,'left',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:8}),mk(false,10,'6B7280',bg,'left',BT));
      });

      const sB=4+allRecords.length+1;
      sR(ws,sB,0,sB,NC-1,mk(false,10,'374151','EFF6FF','center',BM));
      sA(ws,XLSX.utils.encode_cell({r:sB,c:0}),mk(true,10,'1D4ED8','DBEAFE','left',BM));
      sA(ws,XLSX.utils.encode_cell({r:sB,c:3}),mk(true,13,'1D4ED8','DBEAFE','center',BM));
      sA(ws,XLSX.utils.encode_cell({r:sB,c:4}),mk(true,10,'DC2626','FEE2E2','left',BM));
      sA(ws,XLSX.utils.encode_cell({r:sB,c:7}),mk(true,13,'DC2626','FEE2E2','center',BM));
      sR(ws,sB+1,0,sB+1,NC-1,mk(false,10,'374151','F1F5F9','center',BM));
      sA(ws,XLSX.utils.encode_cell({r:sB+1,c:0}),mk(true,11,'1E293B','E2E8F0','left',BM));
      sA(ws,XLSX.utils.encode_cell({r:sB+1,c:3}),mk(true,14,'D97706','FEF3C7','center',BM));

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '보세반입출');
      XLSX.writeFile(wb, `보세반입출_${filterDate}.xlsx`);
    }

    // ── 엑셀 업로드 ──
    async function handleExcelUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = ''; // 동일 파일 재업로드 허용

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

          if (rows.length === 0) { alert('데이터가 없습니다.'); return; }

          // 컬럼 매핑 (유연하게: 한글/영문 모두 지원)
          const colMap = {
            record_type: ['구분','record_type','type'],
            record_date: ['날짜','일자','record_date','date'],
            bl_no:       ['BL번호','BL','bl_no','bl'],
            mrn:         ['MRN','mrn'],
            customer:    ['화주명','화주','customer'],
            product:     ['품명','product'],
            quantity:    ['수량','qty','quantity'],
            weight:      ['중량','중량(KG)','weight'],
            notes:       ['비고','notes']
          };

          function getVal(row, keys) {
            for (const k of keys) {
              if (row[k] !== undefined && row[k] !== '') return String(row[k]).trim();
            }
            return '';
          }

          let ok=0, fail=0, errors=[];
          for (const row of rows) {
            const body = {
              record_type: getVal(row, colMap.record_type) || '반입',
              record_date: getVal(row, colMap.record_date),
              bl_no:       getVal(row, colMap.bl_no),
              mrn:         getVal(row, colMap.mrn),
              customer:    getVal(row, colMap.customer),
              product:     getVal(row, colMap.product),
              quantity:    getVal(row, colMap.quantity),
              weight:      getVal(row, colMap.weight),
              notes:       getVal(row, colMap.notes),
            };
            // 날짜 형식 정규화
            if (body.record_date && body.record_date.includes('T')) {
              body.record_date = body.record_date.split('T')[0];
            }
            if (!body.record_date) { fail++; errors.push(`행 ${ok+fail}: 날짜 없음`); continue; }

            try {
              const res = await fetch('/api/bonded', { method:'POST', headers: authH(), body: JSON.stringify(body) });
              if (res.ok) ok++; else { fail++; errors.push(`행 ${ok+fail}: 저장 실패`); }
            } catch { fail++; }
          }

          document.getElementById('uploadResult').innerHTML = `
            <div style="text-align:center;padding:10px 0;">
              <div style="font-size:32px;margin-bottom:10px;">${fail===0?'✅':'⚠️'}</div>
              <div style="font-size:20px;font-weight:700;color:${fail===0?'#065f46':'#92400e'};">
                ${ok}건 업로드 성공 ${fail>0?`/ ${fail}건 실패`:''}
              </div>
              ${errors.length ? `<div style="margin-top:12px;font-size:12px;color:#718096;text-align:left;max-height:120px;overflow-y:auto;">${errors.join('<br>')}</div>` : ''}
            </div>
            <div style="margin-top:14px;background:#f7fafc;border-radius:8px;padding:12px;font-size:12px;color:#4a5568;">
              <strong>업로드 양식 안내 (컬럼명):</strong><br>
              구분(반입/반출), 날짜(YYYY-MM-DD), BL번호, MRN, 화주명, 품명, 수량, 중량(KG), 비고
            </div>
          `;
          document.getElementById('uploadGuideModal').classList.add('show');
        } catch(err) {
          alert('파일 읽기 오류: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    setToday();
  </script>
</body>
