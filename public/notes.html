<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모장 - 토탈 물류</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { display: flex; min-height: 100vh; background: #f0f4f8; margin: 0; }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
      border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600;
    }
    .btn-primary:hover { opacity: .9; }

    .notes-layout { display: flex; gap: 20px; height: calc(100vh - 96px); }

    /* editorContent — flex 체인 유지 */
    #editorContent {
      flex: 1; display: flex; flex-direction: column;
      min-height: 0; overflow: hidden;
    }

    /* 메모 목록 */
    .notes-list-panel {
      width: 260px; flex-shrink: 0; background: #fff;
      border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .notes-list-header {
      padding: 16px; border-bottom: 1px solid #e2e8f0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .notes-list-header-title { font-size: 14px; font-weight: 700; color: #1a202c; }
    .btn-new {
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
      border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer;
      font-family: inherit; font-size: 12px; font-weight: 600;
    }
    .notes-scroll { flex: 1; overflow-y: auto; }
    .note-item {
      padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f4f8;
      transition: background .15s;
    }
    .note-item:hover { background: #f7fafc; }
    .note-item.active { background: #ebf4ff; border-left: 3px solid #667eea; }
    .note-item.done   { background: #f0fff4; }
    .note-item.done.active { background: #c6f6d5; border-left: 3px solid #38a169; }
    .note-item-title { font-size: 13px; font-weight: 600; color: #2d3748; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item.done .note-item-title { text-decoration: line-through; color: #a0aec0; }
    .note-item-time  { font-size: 11px; color: #a0aec0; }
    .note-item-preview { font-size: 12px; color: #718096; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .note-item.done .note-item-preview { color: #a0aec0; }
    .notes-empty { padding: 24px; text-align: center; color: #a0aec0; font-size: 13px; }

    /* 완료 체크 버튼 */
    .note-item-row { display: flex; align-items: flex-start; gap: 8px; }
    .note-item-info { flex: 1; min-width: 0; }
    .check-btn {
      flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid #cbd5e0; background: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: all .15s; margin-top: 1px;
    }
    .check-btn:hover { border-color: #38a169; background: #f0fff4; }
    .check-btn.checked { border-color: #38a169; background: #38a169; color: #fff; }

    /* 필터 탭 */
    .note-filter-tabs {
      display: flex; border-bottom: 1px solid #e2e8f0;
    }
    .note-filter-tab {
      flex: 1; padding: 7px 4px; text-align: center; font-size: 11px; font-weight: 600;
      cursor: pointer; border: none; background: none; font-family: inherit;
      color: #a0aec0; border-bottom: 2px solid transparent; transition: all .15s;
    }
    .note-filter-tab.active { color: #667eea; border-bottom-color: #667eea; }
    .note-filter-tab.done-tab.active { color: #38a169; border-bottom-color: #38a169; }
    .filter-count {
      display: inline-block; background: #e2e8f0; color: #718096;
      font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-left: 3px;
    }
    .note-filter-tab.active .filter-count { background: #667eea; color: #fff; }
    .note-filter-tab.done-tab.active .filter-count { background: #38a169; color: #fff; }

    /* 완료 토글 버튼 (에디터) */
    .btn-done {
      padding: 8px 14px; border-radius: 8px; border: 1.5px solid #cbd5e0;
      background: #fff; color: #718096; cursor: pointer; font-family: inherit;
      font-size: 13px; font-weight: 600; transition: all .15s;
    }
    .btn-done:hover { border-color: #38a169; color: #38a169; background: #f0fff4; }
    .btn-done.is-done { background: #38a169; border-color: #38a169; color: #fff; }
    .btn-done.is-done:hover { background: #276749; }

    /* 편집 패널 */
    .notes-editor-panel {
      flex: 1; background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      display: flex; flex-direction: column; overflow: hidden;
      min-height: 0;
    }
    .editor-header {
      padding: 14px 20px; border-bottom: 1px solid #e2e8f0;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .editor-title-input {
      flex: 1; padding: 8px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 16px; font-weight: 700;
      font-family: inherit; color: #1a202c;
    }
    .editor-title-input:focus { outline: none; border-color: #667eea; }
    .editor-actions { display: flex; gap: 8px; }
    .btn-save {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    }
    .btn-save:hover { opacity: .9; }
    .btn-del-note {
      padding: 8px 14px; border-radius: 8px; border: 1.5px solid #fc8181;
      background: #fff; color: #e53e3e; cursor: pointer; font-family: inherit; font-size: 13px;
    }
    .btn-del-note:hover { background: #fff5f5; }
    .editor-meta { padding: 6px 20px; font-size: 11px; color: #a0aec0; border-bottom: 1px solid #f0f4f8; }
    .editor-body {
      flex: 1; padding: 16px 20px;
      display: flex; flex-direction: column;
      min-height: 0; overflow: hidden;
    }
    .editor-textarea {
      flex: 1; width: 100%; border: none; outline: none; resize: none;
      font-family: inherit; font-size: 15px; color: #2d3748; line-height: 1.8;
      box-sizing: border-box; min-height: 0;
    }
    .editor-no-select {
      display: flex; align-items: center; justify-content: center;
      height: 100%; flex-direction: column; gap: 12px; color: #a0aec0;
    }
    .editor-no-select i { font-size: 40px; }
    .save-status { font-size: 12px; color: #a0aec0; padding: 6px 20px; text-align: right; }
    .save-status.saved { color: #10b981; }
    .save-status.saving { color: #f59e0b; }

    @media (max-width: 768px) {
      .notes-layout { flex-direction: column; height: auto; }
      .notes-list-panel { width: 100%; height: 200px; }
      .notes-editor-panel { min-height: 400px; }
    }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="hub-main">
    <div class="hub-page-title">📝 메모장</div>

    <div class="notes-layout">
      <!-- 목록 -->
      <div class="notes-list-panel">
        <div class="notes-list-header">
          <div class="notes-list-header-title">메모 목록</div>
          <div style="display:flex;gap:6px;">
            <button class="btn-new" style="background:linear-gradient(135deg,#38a169,#276749);color:#fff;" onclick="exportExcel()">📥</button>
            <button class="btn-new" onclick="newNote()">+ 새 메모</button>
          </div>
        </div>
        <div class="note-filter-tabs">
          <button class="note-filter-tab active" id="tab-all"      onclick="setFilter('all')">전체<span class="filter-count" id="cnt-all">0</span></button>
          <button class="note-filter-tab"         id="tab-active"  onclick="setFilter('active')">진행중<span class="filter-count" id="cnt-active">0</span></button>
          <button class="note-filter-tab done-tab" id="tab-done"   onclick="setFilter('done')">완료<span class="filter-count" id="cnt-done">0</span></button>
        </div>
        <div class="notes-scroll" id="notesList"></div>
      </div>

      <!-- 편집 -->
      <div class="notes-editor-panel">
        <div id="editorContent">
          <div class="editor-no-select">
            <i class="fa fa-sticky-note"></i>
            <span>왼쪽에서 메모를 선택하거나<br>새 메모를 추가하세요.</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="hub-nav.js"></script>
  <script>
    initNav('notes.html');

    const token = sessionStorage.getItem('adminToken');
    const authH = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` });

    let notes = [];
    let currentId = null;
    let autoSaveTimer = null;
    let isDirty = false;
    let currentFilter = 'all'; // 'all' | 'active' | 'done'

    /* ── 완료 상태 (localStorage) ── */
    const DONE_KEY = 'notes_done_v1';
    function loadDoneMap()  { try { return JSON.parse(localStorage.getItem(DONE_KEY) || '{}'); } catch { return {}; } }
    function saveDoneMap(m) { localStorage.setItem(DONE_KEY, JSON.stringify(m)); }
    function isDone(id)     { return !!loadDoneMap()[id]; }
    function toggleDone(id) {
      const m = loadDoneMap();
      m[id] = !m[id];
      if (!m[id]) delete m[id];
      saveDoneMap(m);
    }

    async function loadNotes() {
      try {
        const res = await fetch('/api/memos', { headers: authH() });
        if (!res.ok) throw new Error();
        notes = (await res.json()).data || [];
      } catch {
        notes = [];
      }
      renderList();
    }

    function setFilter(f) {
      currentFilter = f;
      ['all','active','done'].forEach(t => {
        const tab = document.getElementById('tab-'+t);
        if (tab) tab.className = 'note-filter-tab' + (t==='done'?' done-tab':'') + (t===f?' active':'');
      });
      renderList();
    }

    function renderList() {
      const el = document.getElementById('notesList');
      const doneMap = loadDoneMap();

      // 카운트 업데이트
      const allCnt    = notes.length;
      const doneCnt   = notes.filter(n => doneMap[n.id]).length;
      const activeCnt = allCnt - doneCnt;
      const cntAll    = document.getElementById('cnt-all');
      const cntActive = document.getElementById('cnt-active');
      const cntDone   = document.getElementById('cnt-done');
      if (cntAll)    cntAll.textContent    = allCnt;
      if (cntActive) cntActive.textContent = activeCnt;
      if (cntDone)   cntDone.textContent   = doneCnt;

      // 필터 적용
      const filtered = notes.filter(n => {
        if (currentFilter === 'done')   return  doneMap[n.id];
        if (currentFilter === 'active') return !doneMap[n.id];
        return true;
      });

      if (filtered.length === 0) {
        const msg = currentFilter === 'done' ? '완료된 메모가 없습니다.' :
                    currentFilter === 'active' ? '진행 중인 메모가 없습니다.' :
                    '메모가 없습니다.<br>+ 새 메모를 클릭하세요.';
        el.innerHTML = `<div class="notes-empty">${msg}</div>`;
        return;
      }

      el.innerHTML = filtered.map(n => {
        const done = !!doneMap[n.id];
        return `
          <div class="note-item ${n.id === currentId ? 'active' : ''} ${done ? 'done' : ''}" onclick="selectNote(${n.id})">
            <div class="note-item-row">
              <button class="check-btn ${done ? 'checked' : ''}"
                onclick="event.stopPropagation(); onCheckClick(${n.id})"
                title="${done ? '완료 취소' : '완료 처리'}">
                ${done ? '✓' : ''}
              </button>
              <div class="note-item-info">
                <div class="note-item-title">${escHtml(n.title || '제목 없음')}</div>
                <div class="note-item-preview">${escHtml((n.content || '').slice(0, 40))}</div>
                <div class="note-item-time">${formatTime(n.updated_at || n.created_at)}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function onCheckClick(id) {
      toggleDone(id);
      renderList();
      // 현재 편집 중인 메모라면 에디터 버튼도 업데이트
      if (id === currentId) {
        const btn = document.getElementById('btnDone');
        if (btn) {
          const done = isDone(id);
          btn.textContent = done ? '✅ 완료됨' : '⬜ 완료 처리';
          btn.className   = 'btn-done' + (done ? ' is-done' : '');
        }
      }
    }

    function selectNote(id) {
      if (isDirty) saveCurrentNote();
      currentId = id;
      const note = notes.find(n => n.id === id);
      if (!note) return;
      renderList();
      renderEditor(note);
    }

    function renderEditor(note) {
      const done = isDone(note.id);
      document.getElementById('editorContent').innerHTML = `
        <div class="editor-header">
          <input type="text" class="editor-title-input" id="noteTitle"
            value="${escAttr(note.title || '')}" placeholder="제목"
            oninput="markDirty()"
            style="${done ? 'text-decoration:line-through;color:#a0aec0;' : ''}">
          <div class="editor-actions">
            <button id="btnDone" class="btn-done ${done ? 'is-done' : ''}"
              onclick="onCheckClick(${note.id})" title="완료 상태 토글">
              ${done ? '✅ 완료됨' : '⬜ 완료 처리'}
            </button>
            <button class="btn-save" onclick="saveCurrentNote(true)">💾 저장</button>
            <button class="btn-del-note" onclick="deleteNote(${note.id})">🗑️ 삭제</button>
          </div>
        </div>
        <div class="editor-meta" style="${done ? 'background:#f0fff4;color:#38a169;' : ''}">
          ${done ? '✅ 완료된 메모 · ' : ''}마지막 수정: ${formatTime(note.updated_at || note.created_at)}
        </div>
        <div class="editor-body" style="${done ? 'opacity:0.7;' : ''}">
          <textarea class="editor-textarea" id="noteContent"
            placeholder="내용을 입력하세요..."
            oninput="markDirty()">${escHtml(note.content || '')}</textarea>
        </div>
        <div class="save-status" id="saveStatus">저장됨</div>
      `;
    }

    function markDirty() {
      isDirty = true;
      const el = document.getElementById('saveStatus');
      if (el) { el.textContent = '저장 안됨...'; el.className = 'save-status saving'; }
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => saveCurrentNote(), 3000);
    }

    async function saveCurrentNote(manual = false) {
      if (!currentId) return;
      const titleEl = document.getElementById('noteTitle');
      const contentEl = document.getElementById('noteContent');
      if (!titleEl || !contentEl) return;

      const body = { title: titleEl.value, content: contentEl.value };
      try {
        const res = await fetch(`/api/memos/${currentId}`, {
          method: 'PATCH', headers: authH(), body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error();
        const updated = await res.json();
        const idx = notes.findIndex(n => n.id === currentId);
        if (idx !== -1) notes[idx] = { ...notes[idx], ...updated, ...body };
        isDirty = false;
        renderList();
        const el = document.getElementById('saveStatus');
        if (el) { el.textContent = manual ? '저장 완료!' : '자동 저장됨'; el.className = 'save-status saved'; }
        setTimeout(() => {
          const el2 = document.getElementById('saveStatus');
          if (el2) { el2.textContent = '저장됨'; el2.className = 'save-status'; }
        }, 2000);
      } catch {
        const el = document.getElementById('saveStatus');
        if (el) { el.textContent = '저장 실패'; el.className = 'save-status'; el.style.color = '#e53e3e'; }
      }
    }

    async function newNote() {
      if (isDirty) await saveCurrentNote();
      try {
        const res = await fetch('/api/memos', {
          method: 'POST', headers: authH(),
          body: JSON.stringify({ title: '새 메모', content: '' })
        });
        if (!res.ok) throw new Error();
        const resp = await res.json();
        const newId = resp.id || resp;
        const note = { id: newId, title: '새 메모', content: '', created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
        notes.unshift(note);
        currentId = newId;
        renderList();
        renderEditor(note);
        setTimeout(() => {
          const el = document.getElementById('noteTitle');
          if (el) { el.focus(); el.select(); }
        }, 50);
      } catch { alert('생성에 실패했습니다.'); }
    }

    async function deleteNote(id) {
      if (!confirm('메모를 삭제하시겠습니까?')) return;
      try {
        await fetch(`/api/memos/${id}`, { method: 'DELETE', headers: authH() });
        notes = notes.filter(n => n.id !== id);
        // 완료 상태도 제거
        const m = loadDoneMap(); delete m[id]; saveDoneMap(m);
        currentId = null;
        isDirty = false;
        renderList();
        document.getElementById('editorContent').innerHTML = `
          <div class="editor-no-select">
            <i class="fa fa-sticky-note"></i>
            <span>왼쪽에서 메모를 선택하거나<br>새 메모를 추가하세요.</span>
          </div>
        `;
      } catch { alert('삭제에 실패했습니다.'); }
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    }

    function exportExcel() {
      if (!notes.length) { alert('데이터가 없습니다.'); return; }
      const doneMap = loadDoneMap();
      const rows = [['상태', '제목', '내용', '작성일', '수정일']];
      [...notes].sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at)).forEach(n => rows.push([
        doneMap[n.id] ? '완료' : '진행중',
        n.title || '',
        n.content || '',
        n.created_at ? new Date(n.created_at).toLocaleString('ko-KR') : '',
        n.updated_at ? new Date(n.updated_at).toLocaleString('ko-KR') : ''
      ]));
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{wch:8},{wch:25},{wch:60},{wch:18},{wch:18}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '메모장');
      XLSX.writeFile(wb, `메모장_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    loadNotes();
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</body>
</html>
