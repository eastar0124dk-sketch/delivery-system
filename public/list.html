<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조회 · 출력</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a202c;}
    .topbar{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a202c;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(67,233,123,.35);position:sticky;top:0;z-index:200;}
    .topbar .left{display:flex;align-items:center;gap:10px;}
    .topbar a{color:#1a202c;text-decoration:none;font-weight:600;font-size:13px;}
    .topbar h1{font-size:17px;font-weight:700;}
    .wrap{max-width:960px;margin:0 auto;padding:20px 14px 60px;}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    .stat-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;}
    .stat-card .num{font-size:28px;font-weight:900;margin-bottom:3px;}
    .stat-card .lbl{font-size:11px;color:#718096;font-weight:500;}
    .stat-total .num{color:#4facfe;} .stat-signed .num{color:#38f9d7;} .stat-draft .num{color:#f6ad55;}
    .search-panel{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:16px;}
    .panel-title{font-size:14px;font-weight:700;color:#2d3748;display:flex;align-items:center;gap:7px;padding-bottom:14px;border-bottom:2px solid #f0f4f8;margin-bottom:16px;}
    .panel-title i{color:#43e97b;}
    .filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;}
    .fg{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px;}
    .fg label{font-size:11px;font-weight:600;color:#718096;}
    .fg input,.fg select{padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;font-family:inherit;background:#fafafa;}
    .fg input:focus,.fg select:focus{outline:none;border-color:#43e97b;background:#fff;}
    .date-row{display:flex;gap:6px;align-items:center;flex:2;min-width:260px;}
    .date-row input{flex:1;}
    .date-sep{font-size:12px;color:#a0aec0;white-space:nowrap;}
    .btn{padding:9px 18px;border:none;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a202c;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(67,233,123,.35);}
    .btn-secondary{background:#e2e8f0;color:#4a5568;}
    .btn-blue{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;}
    .btn-pdf{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;}
    .btn-pdf:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,87,108,.35);}
    .btn-excel{background:linear-gradient(135deg,#21d07a,#1a9c5b);color:#fff;}
    .btn-excel:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(33,208,122,.35);}
    .btn-danger{background:#fed7d7;color:#c53030;}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;}
    .quick-dates{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
    .qd-btn{padding:5px 12px;border:1.5px solid #e2e8f0;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;background:#fff;color:#4a5568;transition:all .2s;}
    .qd-btn:hover,.qd-btn.active{background:#43e97b;border-color:#43e97b;color:#1a202c;}
    .filter-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
    /* 개인정보 토글 */
    .privacy-toggle{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;font-size:12px;color:#856404;cursor:pointer;transition:all .2s;}
    .privacy-toggle:hover{background:#fff0b3;}
    .privacy-toggle i{color:#ffc107;}
    .result-header{background:#fff;border-radius:14px;padding:12px 18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .result-info{font-size:13px;color:#4a5568;font-weight:600;}
    .result-info span{color:#059669;font-size:16px;font-weight:900;}
    .export-btns{display:flex;gap:8px;align-items:center;}
    .main-card{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:#f7fafc;color:#4a5568;font-weight:600;padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap;}
    td{padding:10px 12px;border-bottom:1px solid #f0f4f8;vertical-align:middle;}
    tr:hover td{background:#f7fafc;}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .badge-draft{background:#fef3c7;color:#d97706;} .badge-signed{background:#d1fae5;color:#059669;}
    .order-no{font-family:monospace;font-weight:700;color:#4facfe;background:#ebf4ff;padding:2px 8px;border-radius:6px;}
    .action-btns{display:flex;gap:5px;}
    .no-data{text-align:center;padding:40px;color:#a0aec0;}
    .no-data i{font-size:36px;display:block;margin-bottom:8px;}
    .pagination{display:flex;align-items:center;justify-content:center;gap:7px;padding:16px;border-top:1px solid #f0f4f8;}
    .page-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .2s;color:#4a5568;}
    .page-btn:hover:not(:disabled){border-color:#43e97b;}
    .page-btn.active{background:linear-gradient(135deg,#43e97b,#38f9d7);border:none;color:#1a202c;}
    /* 모달 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;overflow-y:auto;padding:20px;}
    .modal-overlay.show{display:flex;align-items:flex-start;justify-content:center;}
    .modal-box{background:#fff;border-radius:20px;width:100%;max-width:720px;padding:28px;position:relative;margin:auto;}
    .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:#f0f4f8;cursor:pointer;font-size:16px;color:#718096;display:flex;align-items:center;justify-content:center;}
    .modal-close:hover{background:#e2e8f0;}
    .modal-title{font-size:18px;font-weight:700;color:#2d3748;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
    .modal-title i{color:#43e97b;}
    .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
    .modal-actions .btn{flex:1;justify-content:center;min-width:110px;}
    /* 로그인 모달 */
    .login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;}
    .login-overlay.show{display:flex;}
    .login-box{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:360px;text-align:center;}
    .login-box h2{font-size:20px;font-weight:700;margin-bottom:6px;color:#2d3748;}
    .login-box p{font-size:13px;color:#718096;margin-bottom:24px;}
    .login-box input{width:100%;padding:13px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:12px;text-align:center;letter-spacing:3px;}
    .login-box input:focus{outline:none;border-color:#43e97b;}
    .login-error{color:#e53e3e;font-size:13px;margin-bottom:10px;display:none;}
    /* 인수증명서 인쇄 영역 */
    #printArea{background:#fff;padding:24px;border:1px solid #e2e8f0;border-radius:12px;}
    .receipt-header-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;}
    .receipt-title-sm{font-size:22px;font-weight:900;color:#1a202c;}
    .receipt-hr{border:none;border-top:2.5px solid #1a202c;margin:6px 0 14px;}
    .info-g2{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-bottom:12px;}
    .info-g2 .ii{display:flex;align-items:baseline;gap:5px;padding:3px 0;border-bottom:1px dotted #e2e8f0;font-size:12px;}
    .ii .l{font-weight:600;color:#4a5568;white-space:nowrap;min-width:80px;}
    .ii .v{color:#1a202c;}
    .dn-bar{background:#f7fafc;border:1px solid #e2e8f0;border-radius:5px;padding:6px 10px;font-size:12px;color:#2d3748;margin-bottom:12px;}
    .dn-bar span{font-weight:700;color:#4facfe;}
    .wt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px;}
    .wt th{background:#2d3748;color:#fff;padding:6px 8px;text-align:center;border:1px solid #2d3748;}
    .wt td{padding:6px 8px;border:1px solid #c8d0dc;text-align:center;}
    .cert-line{text-align:center;font-size:12px;border:1px solid #c8d0dc;border-radius:5px;padding:8px;background:#fafafa;margin-bottom:12px;}
    .sig-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .sig-col{text-align:center;}
    .sig-col .slbl{font-size:11px;font-weight:600;color:#4a5568;border-bottom:1.5px solid #1a202c;padding-bottom:3px;margin-bottom:6px;}
    .sig-col img{max-width:100%;height:80px;object-fit:contain;border:1px solid #e2e8f0;border-radius:5px;background:#fafafa;}
    .sig-col .sname{font-size:12px;font-weight:700;margin-top:3px;}
    .sig-col .sarrow{font-size:10px;color:#e53e3e;font-weight:600;display:block;margin-top:2px;}
    .sig-empty-sm{height:80px;border:1.5px dashed #e2e8f0;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#cbd5e0;font-size:11px;}
    .status-tag{text-align:center;padding:6px;border-radius:7px;font-size:12px;font-weight:700;margin-bottom:12px;}
    .status-signed-tag{background:#d1fae5;color:#065f46;} .status-draft-tag{background:#fef3c7;color:#92400e;}
    /* 모바일 카드 */
    .mobile-card{display:none;background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
    @media(max-width:640px){.desktop-only{display:none!important;}.mobile-card{display:block;}.main-card{background:transparent;box-shadow:none;overflow:visible;}}
    .mc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .mc-row .k{font-size:11px;color:#718096;} .mc-row .v{font-size:13px;font-weight:500;}
    @media print{
      body *{visibility:hidden;}
      #printArea,#printArea *{visibility:visible;}
      #printArea{position:fixed;inset:0;margin:0;padding:20px;border:none;border-radius:0;}
    }
  </style>
</head>
<body>

<!-- 로그인 -->
<div class="login-overlay show" id="loginModal">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:12px;">🔐</div>
    <h2>관리자 로그인</h2>
    <p>관리자 비밀번호를 입력하세요</p>
    <p class="login-error" id="loginError">비밀번호가 틀렸습니다.</p>
    <input type="password" id="loginPw" placeholder="비밀번호" maxlength="30">
    <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a202c;" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> 로그인
    </button>
  </div>
</div>

<div class="topbar">
  <div class="left">
    <a href="index.html"><i class="fas fa-arrow-left"></i></a>
    <h1><i class="fas fa-search"></i> 조회 · 출력</h1>
  </div>
  <a href="admin.html">오더등록</a>
</div>

<div class="wrap" id="mainWrap" style="display:none;">
  <!-- 통계 -->
  <div class="stats-grid">
    <div class="stat-card stat-total"><div class="num" id="totalCount">0</div><div class="lbl">전체 오더</div></div>
    <div class="stat-card stat-signed"><div class="num" id="signedCount">0</div><div class="lbl">서명완료</div></div>
    <div class="stat-card stat-draft"><div class="num" id="draftCount">0</div><div class="lbl">대기중</div></div>
  </div>

  <!-- 검색 패널 -->
  <div class="search-panel">
    <div class="panel-title"><i class="fas fa-filter"></i> 검색 조건</div>
    <div class="filter-row">
      <div class="date-row">
        <div class="fg"><label>배송일 시작</label><input type="date" id="dateFrom"></div>
        <span class="date-sep" style="margin-top:20px;">~</span>
        <div class="fg"><label>배송일 종료</label><input type="date" id="dateTo"></div>
      </div>
    </div>
    <div class="filter-row">
      <div class="fg"><label>DN번호</label><input type="text" id="dnInput" placeholder="DN번호 검색"></div>
      <div class="fg"><label>고객사</label><input type="text" id="companyInput" placeholder="고객사명 검색"></div>
      <div class="fg"><label>상태</label>
        <select id="statusFilter">
          <option value="">전체</option>
          <option value="draft">대기중</option>
          <option value="signed">서명완료</option>
        </select>
      </div>
    </div>
    <div class="quick-dates">
      <span style="font-size:11px;color:#718096;align-self:center;">빠른선택:</span>
      <button class="qd-btn" onclick="setQuick('today',this)">오늘</button>
      <button class="qd-btn" onclick="setQuick('yesterday',this)">어제</button>
      <button class="qd-btn" onclick="setQuick('week',this)">이번주</button>
      <button class="qd-btn" onclick="setQuick('month',this)">이번달</button>
      <button class="qd-btn" onclick="setQuick('lastmonth',this)">지난달</button>
      <button class="qd-btn" onclick="setQuick('all',this)">전체기간</button>
    </div>
    <div class="filter-btns">
      <button class="btn btn-primary" onclick="applyFilter()"><i class="fas fa-search"></i> 조회</button>
      <button class="btn btn-secondary" onclick="clearFilter()"><i class="fas fa-redo"></i> 초기화</button>
      <button class="privacy-toggle" id="privacyBtn" onclick="togglePrivacy()">
        <i class="fas fa-eye-slash"></i> <span id="privacyLabel">개인정보 마스킹 중</span>
      </button>
    </div>
  </div>

  <!-- 결과 헤더 -->
  <div class="result-header" id="resultHeader" style="display:none;">
    <div class="result-info">조회 결과 <span id="resultCount">0</span>건 <span id="resultDateRange" style="font-size:12px;color:#718096;font-weight:400;"></span></div>
    <div class="export-btns">
      <button class="btn btn-secondary btn-sm" onclick="printAll()"><i class="fas fa-print"></i> 목록 인쇄</button>
      <button class="btn btn-pdf btn-sm" onclick="exportPDFAll()"><i class="fas fa-file-pdf"></i> 목록 PDF</button>
      <button class="btn btn-excel btn-sm" onclick="exportExcel()"><i class="fas fa-file-excel"></i> 엑셀 다운로드</button>
    </div>
  </div>

  <!-- 초기 가이드 -->
  <div class="main-card" id="initGuide">
    <div class="no-data">
      <i class="fas fa-search"></i>
      <p><strong>검색 조건을 입력하고 조회 버튼을 눌러주세요</strong></p>
      <p style="font-size:12px;margin-top:8px;color:#a0aec0;">날짜 · DN번호 · 고객사 · 상태로 필터링 가능</p>
    </div>
  </div>

  <!-- 결과 테이블 -->
  <div class="main-card" id="mainCard" style="display:none;">
    <div class="table-wrap desktop-only">
      <table>
        <thead>
          <tr><th>#</th><th>DN번호</th><th>배송일</th><th>고객사</th><th>제품명</th><th>수량</th><th>수취인</th><th>기사</th><th>상태</th><th>관리</th></tr>
        </thead>
        <tbody id="orderTbody"></tbody>
      </table>
    </div>
    <div id="mobileCards"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title"><i class="fas fa-file-alt"></i> 인수증명서 상세</div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doPrint()"><i class="fas fa-print"></i> 인쇄</button>
      <button class="btn btn-pdf" id="pdfBtn" onclick="doPDF()"><i class="fas fa-file-pdf"></i> PDF 저장</button>
    </div>
    <div id="printArea"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  let adminToken = sessionStorage.getItem('adminToken')||'';
  let allData=[], filtered=[], currentPage=1, showPrivate=false;
  const PER_PAGE=20;
  let currentModalRecord=null;
  let companyName='인수증명서';

  // ── 로그인 ──
  async function doLogin() {
    const pw=document.getElementById('loginPw').value;
    const res=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const data=await res.json();
    if(res.ok){ adminToken=data.token; sessionStorage.setItem('adminToken',adminToken); initApp(); document.getElementById('loginModal').classList.remove('show'); }
    else{ document.getElementById('loginError').style.display='block'; document.getElementById('loginPw').value=''; }
  }

  async function checkAuth() {
    if(!adminToken) return;
    const res=await fetch('/api/auth/check',{headers:{'Authorization':`Bearer ${adminToken}`}});
    if(res.ok){ document.getElementById('loginModal').classList.remove('show'); initApp(); }
    else{ sessionStorage.removeItem('adminToken'); adminToken=''; }
  }

  async function initApp() {
    document.getElementById('mainWrap').style.display='block';
    const cfg=await fetch('/api/config').then(r=>r.json()).catch(()=>({}));
    if(cfg.companyName) companyName=cfg.companyName;
    await loadAll();
    // 로그인 후 자동으로 전체 목록 표시
    setQuick('all', document.querySelector('.qd-btn:last-child'));
  }

  function authH(){ return {'Content-Type':'application/json','Authorization':`Bearer ${adminToken}`}; }

  // ── 데이터 로드 ──
  async function loadAll() {
    const res=await fetch('/api/records?limit=2000',{headers:authH()}).then(r=>r.json());
    allData=(res.data||[]);
    updateStats();
  }

  function updateStats(){
    const s=allData.filter(d=>d.status==='signed').length;
    document.getElementById('totalCount').textContent=allData.length;
    document.getElementById('signedCount').textContent=s;
    document.getElementById('draftCount').textContent=allData.length-s;
  }

  // ── 빠른 날짜 ──
  function setQuick(type,btn) {
    document.querySelectorAll('.qd-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const today=new Date(), fmt=d=>d.toISOString().slice(0,10);
    let from,to=fmt(today);
    if(type==='today'){ from=to; }
    else if(type==='yesterday'){ const y=new Date(today);y.setDate(y.getDate()-1);from=to=fmt(y); }
    else if(type==='week'){ const d=new Date(today);d.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1));from=fmt(d); }
    else if(type==='month'){ from=fmt(new Date(today.getFullYear(),today.getMonth(),1)); }
    else if(type==='lastmonth'){ const f=new Date(today.getFullYear(),today.getMonth()-1,1),t=new Date(today.getFullYear(),today.getMonth(),0);from=fmt(f);to=fmt(t); }
    else{ document.getElementById('dateFrom').value='';document.getElementById('dateTo').value='';applyFilter();return; }
    document.getElementById('dateFrom').value=from;
    document.getElementById('dateTo').value=to;
    applyFilter();
  }

  // ── 필터 적용 ──
  function applyFilter() {
    const from=document.getElementById('dateFrom').value;
    const to=document.getElementById('dateTo').value;
    const dn=document.getElementById('dnInput').value.trim().toLowerCase();
    const co=document.getElementById('companyInput').value.trim().toLowerCase();
    const st=document.getElementById('statusFilter').value;
    filtered=allData.filter(d=>{
      if(from&&d.delivery_date<from) return false;
      if(to&&d.delivery_date>to) return false;
      if(dn&&!(d.order_no||'').toLowerCase().includes(dn)) return false;
      if(co&&!(d.customer_company||'').toLowerCase().includes(co)) return false;
      if(st&&d.status!==st) return false;
      return true;
    });
    currentPage=1;
    document.getElementById('initGuide').style.display='none';
    document.getElementById('resultHeader').style.display='flex';
    document.getElementById('mainCard').style.display='block';
    document.getElementById('resultCount').textContent=filtered.length;
    let rng='';
    if(from||to) rng=`(${from||'처음'} ~ ${to||'현재'})`;
    document.getElementById('resultDateRange').textContent=rng;
    renderPage();
  }

  function clearFilter() {
    ['dateFrom','dateTo','dnInput','companyInput'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('statusFilter').value='';
    document.querySelectorAll('.qd-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('resultHeader').style.display='none';
    document.getElementById('mainCard').style.display='none';
    document.getElementById('initGuide').style.display='block';
  }

  // ── 개인정보 마스킹 ──
  function maskPhone(p){ if(!p) return '-'; return showPrivate?p:p.replace(/(\d{2,3})-?(\d{3,4})-?(\d{4})/,'$1-****-$3'); }
  function maskName(n){ if(!n) return '-'; if(showPrivate) return n; if(n.length<=2) return n[0]+'*'; return n[0]+'*'.repeat(n.length-2)+n[n.length-1]; }

  function togglePrivacy() {
    showPrivate=!showPrivate;
    const btn=document.getElementById('privacyBtn');
    const lbl=document.getElementById('privacyLabel');
    if(showPrivate){ btn.style.background='#d1fae5';btn.style.borderColor='#34d399';btn.style.color='#065f46';lbl.textContent='개인정보 표시 중';btn.querySelector('i').className='fas fa-eye'; }
    else{ btn.style.background='#fff3cd';btn.style.borderColor='#ffc107';btn.style.color='#856404';lbl.textContent='개인정보 마스킹 중';btn.querySelector('i').className='fas fa-eye-slash'; }
    if(filtered.length) renderPage();
  }

  // ── 렌더링 ──
  function renderPage() {
    const start=(currentPage-1)*PER_PAGE;
    const pageData=filtered.slice(start,start+PER_PAGE);
    const total=Math.ceil(filtered.length/PER_PAGE);
    const tbody=document.getElementById('orderTbody');

    if(!pageData.length){
      tbody.innerHTML='<tr><td colspan="10" class="no-data"><i class="fas fa-inbox"></i>조건에 맞는 데이터가 없습니다.</td></tr>';
      document.getElementById('mobileCards').innerHTML='<div class="no-data"><i class="fas fa-inbox"></i><p>데이터가 없습니다.</p></div>';
      renderPagination(0); return;
    }

    tbody.innerHTML=pageData.map((r,i)=>`
      <tr>
        <td style="color:#a0aec0;font-size:12px;">${start+i+1}</td>
        <td><span class="order-no" style="cursor:pointer;text-decoration:underline;" onclick="openDetail(${r.id})" title="클릭하여 상세보기">${r.order_no}</span></td>
        <td style="white-space:nowrap;">${r.delivery_date||'-'}</td>
        <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.customer_company||'-'}</td>
        <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.product_name||'-'}</td>
        <td>${r.quantity||'-'}</td>
        <td>${maskName(r.receiver_name)}</td>
        <td>${maskName(r.driver_name)}</td>
        <td><span class="badge ${r.status==='signed'?'badge-signed':'badge-draft'}">${r.status==='signed'?'✅완료':'📋대기'}</span></td>
        <td>
          <div class="action-btns">
            <button class="btn btn-sm btn-blue" onclick="openDetail(${r.id})" title="상세/인쇄/PDF"><i class="fas fa-eye"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteRecord(${r.id},'${r.order_no}')"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      </tr>
    `).join('');

    document.getElementById('mobileCards').innerHTML=pageData.map(r=>`
      <div class="mobile-card">
        <div class="mc-row"><span class="order-no">${r.order_no}</span><span class="badge ${r.status==='signed'?'badge-signed':'badge-draft'}">${r.status==='signed'?'✅완료':'📋대기'}</span></div>
        <div class="mc-row"><span class="k">배송일</span><span class="v">${r.delivery_date||'-'}</span></div>
        <div class="mc-row"><span class="k">고객사</span><span class="v">${r.customer_company||'-'}</span></div>
        <div class="mc-row"><span class="k">제품/수량</span><span class="v">${r.product_name||'-'} / ${r.quantity||'-'}</span></div>
        <div class="mc-row"><span class="k">수취인</span><span class="v">${maskName(r.receiver_name)}</span></div>
        <div class="mc-row" style="margin-top:8px;gap:6px;">
          <button class="btn btn-sm btn-blue" style="flex:1;justify-content:center;" onclick="openDetail(${r.id})"><i class="fas fa-eye"></i> 상세/출력</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRecord(${r.id},'${r.order_no}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');

    renderPagination(total);
  }

  function renderPagination(total) {
    const el=document.getElementById('pagination');
    if(total<=1){el.innerHTML='';return;}
    let h=`<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for(let i=1;i<=total;i++){
      if(i===1||i===total||Math.abs(i-currentPage)<=2) h+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
      else if(Math.abs(i-currentPage)===3) h+=`<span style="color:#a0aec0;">…</span>`;
    }
    h+=`<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
    el.innerHTML=h;
  }

  function changePage(p){
    const t=Math.ceil(filtered.length/PER_PAGE);
    if(p<1||p>t) return;
    currentPage=p; renderPage();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  // ── 엑셀 다운로드 ──
  function exportExcel() {
    if(!filtered.length){ alert('다운로드할 데이터가 없습니다. 먼저 조회해주세요.'); return; }
    const headers = ['번호','DN번호','배송일자','고객사명','배송지주소','제품명','수량','수취인이름','수취인연락처','기사이름','기사연락처','차량번호','상태'];
    const rows = filtered.map((r,i) => [
      i+1, r.order_no||'', r.delivery_date||'', r.customer_company||'',
      r.customer_address||'', r.product_name||'', r.quantity||'',
      r.receiver_name||'', r.receiver_phone||'', r.driver_name||'',
      r.driver_phone||'', r.vehicle_no||'',
      r.status==='signed'?'서명완료':'대기중'
    ]);
    const csvContent = [headers, ...rows]
      .map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))
      .join('\n');
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `배송인수증_${today}.csv`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  // ── 삭제 ──
  async function deleteRecord(id,dn){
    if(!confirm(`DN번호 [${dn}]를 삭제하시겠습니까?`)) return;
    await fetch(`/api/records/${id}`,{method:'DELETE',headers:authH()});
    await loadAll(); applyFilter();
  }

  // ── 상세 모달 ──
  async function openDetail(id){
    const r=await fetch(`/api/records/${id}`,{headers:authH()}).then(res=>res.json());
    currentModalRecord=r;
    renderPrintArea(r);
    document.getElementById('detailModal').classList.add('show');
    document.body.style.overflow='hidden';
  }

  function closeModal(){ document.getElementById('detailModal').classList.remove('show'); document.body.style.overflow=''; }

  function renderPrintArea(r){
    let locRows='';
    try{
      const arr=JSON.parse(r.extra_locations||'[]');
      for(let i=0;i<3;i++) locRows+=`<tr><td>${i+1}.</td><td style="text-align:left;">${arr[i]||''}</td><td></td></tr>`;
    }catch(e){ for(let i=0;i<3;i++) locRows+=`<tr><td>${i+1}.</td><td></td><td></td></tr>`; }

    const statusTag=r.status==='signed'?
      `<div class="status-tag status-signed-tag">✅ 서명 완료</div>`:
      `<div class="status-tag status-draft-tag">📋 서명 대기 중</div>`;

    const driverSig=r.driver_signature?`<img src="${r.driver_signature}" alt="기사서명">`:`<div class="sig-empty-sm">서명 없음</div>`;
    const receiverSig=r.receiver_signature?`<img src="${r.receiver_signature}" alt="수령자서명">`:`<div class="sig-empty-sm">서명 없음</div>`;

    document.getElementById('printArea').innerHTML=`
      ${statusTag}
      <div class="receipt-header-row">
        <div class="receipt-title-sm">인수증명서</div>
      </div>
      <hr class="receipt-hr">
      <div class="info-g2">
        <div class="ii"><span class="l">배송일자 :</span><span class="v">${r.delivery_date||'-'}</span></div>
        <div class="ii"><span class="l">수량 :</span><span class="v">${r.quantity||'-'}</span></div>
        <div class="ii"><span class="l">고객사(배송지) :</span><span class="v">${r.customer_company||'-'}</span></div>
        <div class="ii"><span class="l">수취인 :</span><span class="v">${r.receiver_name||'-'}</span></div>
        ${r.customer_address?`<div class="ii" style="grid-column:span 2;"><span class="l">주소 :</span><span class="v">${r.customer_address}</span></div>`:''}
        <div class="ii"><span class="l">도착시간 :</span><span class="v">${r.arrival_time||'-'}</span></div>
        <div class="ii"><span class="l">수취인 연락처 :</span><span class="v">${r.receiver_phone||'-'}</span></div>
        <div class="ii" style="grid-column:span 2;"><span class="l">제품명 :</span><span class="v">${r.product_name||'-'}</span></div>
        <div class="ii" style="grid-column:span 2;"><span class="l">비고 :</span><span class="v">${r.notes||'없음'}</span></div>
      </div>
      <div class="dn-bar">DN 번호 : <span>${r.order_no}</span>${r.vehicle_no?` &nbsp;|&nbsp; 차량번호 : <span>${r.vehicle_no}</span>`:''}</div>
      <table class="wt">
        <thead><tr><th style="width:34%">작업 내용</th><th style="width:30%">단위</th><th>기타</th></tr></thead>
        <tbody>
          <tr><td>현장 대기</td><td>대기시간</td><td>${r.wait_time?r.wait_time+'분':''}</td></tr>
          <tr><td>현장 수작업</td><td>작업시간</td><td>${r.work_time?r.work_time+'분':''}</td></tr>
          <tr><td rowspan="4">배송 경유지</td></tr>
          ${locRows}
          <tr><td>폐기물 회수</td><td>회수</td><td>${r.waste_collection||'회수 불필요'}</td></tr>
        </tbody>
      </table>
      <div class="cert-line">상기와 같이 운송 중 추가 작업이 발생하였음을 증명합니다.</div>
      <div class="sig-row">
        <div class="sig-col">
          <div class="slbl">운송담당자 (서명)</div>
          ${driverSig}
          <div class="sname">${r.driver_name||''}</div>
          <span class="sarrow">▲ 배송기사님 성함</span>
        </div>
        <div class="sig-col">
          <div class="slbl">확인검수자 (서명)</div>
          ${receiverSig}
          <div class="sname">${r.receiver_name||''}</div>
          <span class="sarrow">▲ 수령자 성함</span>
        </div>
      </div>
    `;
  }

  // ── 인쇄 ──
  function doPrint(){ window.print(); }

  // ── PDF 저장 ──
  async function doPDF(){
    const btn=document.getElementById('pdfBtn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> 생성중...';
    try{
      const {jsPDF}=window.jspdf;
      const el=document.getElementById('printArea');
      const st=el.querySelector('.status-tag');
      if(st) st.style.display='none';
      const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff',logging:false});
      if(st) st.style.display='';
      const pdf=new jsPDF('p','mm','a4');
      const pw=pdf.internal.pageSize.getWidth();
      const iw=pw-20;
      const ih=(canvas.height*iw)/canvas.width;
      const ph=pdf.internal.pageSize.getHeight();
      pdf.addImage(canvas.toDataURL('image/jpeg',.95),'JPEG',10,10,iw,Math.min(ih,ph-20));
      pdf.save(`인수증명서_DN${currentModalRecord?.order_no||'unknown'}.pdf`);
    }catch(e){ alert('PDF 생성 오류: '+e.message); }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-file-pdf"></i> PDF 저장';
  }

  // ── 목록 인쇄 ──
  function printAll(){
    if(!filtered.length){alert('조회 결과가 없습니다.');return;}
    const win=window.open('','_blank','width=900,height=700');
    const rows=filtered.map((r,i)=>`
      <tr>
        <td>${i+1}</td><td>${r.order_no}</td><td>${r.delivery_date||'-'}</td>
        <td>${r.customer_company||'-'}</td><td>${r.product_name||'-'}</td>
        <td>${r.quantity||'-'}</td><td>${maskName(r.receiver_name)}</td>
        <td>${maskName(r.driver_name)}</td><td>${r.status==='signed'?'서명완료':'대기중'}</td>
      </tr>`).join('');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>출고 목록 인쇄</title>
      <style>body{font-family:'Noto Sans KR',sans-serif;padding:20px;font-size:12px;}
      h2{font-size:16px;margin-bottom:10px;}table{width:100%;border-collapse:collapse;}
      th{background:#2d3748;color:#fff;padding:7px 8px;text-align:left;}
      td{padding:6px 8px;border-bottom:1px solid #e2e8f0;}tr:nth-child(even) td{background:#f7fafc;}
      .info{font-size:11px;color:#718096;margin-bottom:8px;}</style></head><body>
      <h2>📦 출고 목록</h2>
      <p class="info">조회: ${new Date().toLocaleString('ko-KR')} / 총 ${filtered.length}건</p>
      <table><thead><tr><th>#</th><th>DN번호</th><th>배송일</th><th>고객사</th><th>제품명</th><th>수량</th><th>수취인</th><th>기사</th><th>상태</th></tr></thead>
      <tbody>${rows}</tbody></table>
      <script>window.onload=function(){window.print();window.close();}<\/script></body></html>`);
    win.document.close();
  }

  // ── 목록 PDF ──
  async function exportPDFAll(){
    if(!filtered.length){alert('조회 결과가 없습니다.');return;}
    const btn=event.target.closest('.btn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> 생성중...';
    try{
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF('l','mm','a4');
      const pw=pdf.internal.pageSize.getWidth();
      pdf.setFont('helvetica','bold'); pdf.setFontSize(14);
      pdf.text('Delivery Records',14,18);
      pdf.setFontSize(9); pdf.setFont('helvetica','normal');
      pdf.text(`Total: ${filtered.length} records | ${new Date().toLocaleDateString('ko-KR')}`,14,25);
      const headers=['#','DN번호','배송일','고객사','제품명','수량','수취인','기사','상태'];
      const colW=[10,28,22,50,52,14,28,28,18];
      let x=14,y=32;
      pdf.setFillColor(45,55,72); pdf.setTextColor(255,255,255);
      pdf.setFontSize(8); pdf.setFont('helvetica','bold');
      colW.forEach((w,i)=>{ pdf.rect(x,y,w,8,'F'); pdf.text(headers[i],x+2,y+5.5); x+=w; });
      y+=8; pdf.setTextColor(26,32,44); pdf.setFont('helvetica','normal');
      filtered.forEach((r,idx)=>{
        if(y>188){pdf.addPage();y=15;}
        x=14;
        pdf.setFillColor(...(idx%2===0?[247,250,252]:[255,255,255]));
        const tw=colW.reduce((a,b)=>a+b,0);
        pdf.rect(14,y,tw,7,'F'); pdf.setDrawColor(226,232,240); pdf.rect(14,y,tw,7,'S');
        const cells=[idx+1,r.order_no,r.delivery_date||'-',(r.customer_company||'-').substring(0,16),(r.product_name||'-').substring(0,18),r.quantity||'-',maskName(r.receiver_name).substring(0,8),maskName(r.driver_name).substring(0,8),r.status==='signed'?'완료':'대기'];
        cells.forEach((c,i)=>{ pdf.text(String(c),x+2,y+5); x+=colW[i]; });
        y+=7;
      });
      const from=document.getElementById('dateFrom').value, to=document.getElementById('dateTo').value;
      const sfx=from&&to?`_${from}_${to}`:'';
      pdf.save(`출고목록${sfx}.pdf`);
    }catch(e){ alert('PDF 오류: '+e.message); }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-file-pdf"></i> 목록 PDF';
  }

  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
  document.getElementById('loginPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  ['dnInput','companyInput'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{ if(e.key==='Enter') applyFilter(); }));

  checkAuth();
</script>
</body>
</html>
