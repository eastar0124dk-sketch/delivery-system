<!DOCTYPE html>
<html lang="ko">
<head>
  <script>window.AUTH_REQUIRE="admin";</script>
  <script src="auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>AI 비서</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a202c;font-size:13px;display:flex;min-height:100vh;}
    #sidebar{flex-shrink:0;}
    .main-wrap{flex:1;min-width:0;}
    .wrap{padding:20px 24px;max-width:920px;margin:0 auto;}

    .as-head{background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;border-radius:16px;padding:18px 22px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
    .as-head .ico{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:24px;}
    .as-head h1{font-size:19px;font-weight:800;}
    .as-head p{font-size:12px;opacity:.85;margin-top:2px;}
    .as-head .tg{margin-left:auto;font-size:11px;padding:5px 11px;border-radius:20px;font-weight:700;background:rgba(255,255,255,.2);}
    .as-head .tg.off{background:rgba(0,0,0,.2);}

    /* 빠른 명령칩 */
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
    .chip{background:#fff;border:1.5px solid #e2e8f0;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#475569;transition:all .12s;}
    .chip:hover{border-color:#6366f1;background:#eef2ff;color:#4338ca;}
    .chip i{margin-right:5px;color:#6366f1;}

    /* 채팅 영역 */
    .chat{background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;flex-direction:column;height:calc(100vh - 280px);min-height:420px;overflow:hidden;}
    .chat-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;}
    .msg{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .msg.user{align-self:flex-end;background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;border-bottom-right-radius:4px;}
    .msg.bot{align-self:flex-start;background:#f1f5f9;color:#1e293b;border-bottom-left-radius:4px;}
    .msg.bot .mt{font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:4px;}
    .msg .act{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
    .msg .act button{font-size:11px;font-weight:700;border:none;border-radius:7px;padding:5px 11px;cursor:pointer;}
    .btn-tg{background:#229ED9;color:#fff;}
    .btn-go{background:#10b981;color:#fff;}
    .btn-cp{background:#e2e8f0;color:#475569;}

    .chat-input{border-top:1px solid #e2e8f0;padding:12px 14px;display:flex;gap:8px;align-items:flex-end;}
    .chat-input textarea{flex:1;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 12px;font-size:13px;font-family:inherit;resize:none;max-height:140px;outline:none;line-height:1.5;}
    .chat-input textarea:focus{border-color:#6366f1;}
    .chat-input button{background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;border:none;border-radius:12px;width:46px;height:44px;font-size:18px;cursor:pointer;flex-shrink:0;}

    /* 리마인더 패널 */
    .rem-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);padding:16px 18px;margin-bottom:16px;}
    .rem-card h3{font-size:13px;font-weight:800;color:#334155;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
    .rem-card h3 i{color:#f59e0b;}
    .rem-list{display:flex;flex-direction:column;gap:7px;}
    .rem-item{display:flex;align-items:center;gap:10px;padding:8px 11px;background:#f8fafc;border-radius:9px;font-size:12px;}
    .rem-item.due{background:#fef2f2;border:1px solid #fecaca;}
    .rem-item .d{font-weight:800;color:#4338ca;white-space:nowrap;}
    .rem-item .t{flex:1;}
    .rem-item .x{background:#fee2e2;color:#b91c1c;border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px;}
    .rem-empty{font-size:12px;color:#94a3b8;padding:6px 0;}

    .note{font-size:11px;color:#64748b;background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:9px 13px;margin-bottom:14px;}
    .note b{color:#4338ca;}

    .toast{position:fixed;top:80px;right:20px;padding:12px 18px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:13px;font-weight:700;z-index:9999;display:none;color:#fff;}
    .toast.success{background:#10b981;}.toast.error{background:#ef4444;}
  </style>
</head>
<body>
<script src="hub-nav.js"></script>
<div id="sidebar"></div>

<main class="hub-main">
  <h1 class="hub-page-title" style="display:none;">🤖 AI 비서</h1>

  <div class="wrap">
    <div class="as-head">
      <div class="ico">🤖</div>
      <div>
        <h1>AI 비서 <span style="font-size:11px;font-weight:600;opacity:.8;">(규칙기반 v1)</span></h1>
        <p>회의록·메모 정리 · 리마인더 · 데이터 조회 · 빠른 이동</p>
      </div>
      <span class="tg off" id="tgStatus">텔레그램 확인중…</span>
    </div>

    <div class="note">
      💡 회의 내용·메모를 붙여넣으면 <b>요약·할 일·날짜</b>를 정리하고, 📎 <b>파일(엑셀·CSV·PDF·텍스트)을 첨부</b>하면 분석해 드립니다.
      "<b>리마인드 6/20 운임청구</b>"로 알림 등록, "<b>오늘 오더</b>" 같은 질문엔 시스템 데이터로 답합니다.
    </div>

    <!-- 데이터 분석 도구 (엑셀 업로드 시 표시) -->
    <div class="rem-card" id="analysisCard" style="display:none;">
      <h3 style="color:#0f172a;"><i class="fas fa-calculator" style="color:#6366f1;"></i> 데이터 분석 도구 <span id="anaFile" style="margin-left:auto;font-size:11px;color:#10b981;font-weight:700;"></span></h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:10px;">
        <div>
          <label style="font-size:11px;color:#475569;font-weight:700;">시트</label>
          <select id="anaSheet" onchange="onSheetChange()" style="width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;"></select>
        </div>
        <div>
          <label style="font-size:11px;color:#475569;font-weight:700;">분석 종류</label>
          <select id="anaOp" onchange="onOpChange()" style="width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;">
            <option value="sum">합계</option>
            <option value="avg">평균</option>
            <option value="max">최대값</option>
            <option value="min">최소값</option>
            <option value="count">건수(비어있지 않은 행)</option>
            <option value="div">개당 단가 (A ÷ B)</option>
            <option value="group">그룹별 합계</option>
          </select>
        </div>
      </div>
      <div id="anaColWrap" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:10px;"></div>
      <button onclick="runAnalysis()" style="background:linear-gradient(135deg,#4338ca,#6366f1);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;"><i class="fas fa-play"></i> 계산</button>
      <button onclick="document.getElementById('analysisCard').style.display='none'" style="background:#e2e8f0;color:#475569;border:none;border-radius:9px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;margin-left:6px;">닫기</button>
      <div id="anaResult" style="margin-top:12px;"></div>
    </div>

    <!-- 리마인더 -->
    <div class="rem-card">
      <h3><i class="fas fa-bell"></i> 등록된 리마인더 <span id="remCount" style="margin-left:auto;font-size:11px;color:#94a3b8;font-weight:600;"></span></h3>
      <div class="rem-list" id="remList"></div>
    </div>

    <!-- 빠른 명령 -->
    <div class="chips" id="chips">
      <button class="chip" onclick="quick('오늘 오더 몇건')"><i class="fas fa-box"></i> 오늘 오더</button>
      <button class="chip" onclick="quick('이번달 OT 몇시간')"><i class="fas fa-clock"></i> 이번달 OT</button>
      <button class="chip" onclick="quick('회의록 정리')"><i class="fas fa-file-lines"></i> 회의록 정리</button>
      <button class="chip" onclick="quick('견적서 초안')"><i class="fas fa-file-invoice"></i> 견적 초안</button>
      <button class="chip" onclick="quick('메뉴')"><i class="fas fa-bars"></i> 메뉴 바로가기</button>
      <button class="chip" onclick="quick('도움말')"><i class="fas fa-circle-question"></i> 도움말</button>
    </div>

    <!-- 채팅 -->
    <div class="chat">
      <div class="chat-body" id="chatBody"></div>
      <div class="chat-input">
        <button onclick="document.getElementById('fileInput').click()" title="파일 첨부" style="background:#e2e8f0;color:#475569;width:44px;"><i class="fas fa-paperclip"></i></button>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.txt,.pdf" multiple style="display:none" onchange="onFiles(this.files)">
        <textarea id="input" rows="1" placeholder="메시지 입력 / 파일 첨부(📎) — 엑셀·CSV·PDF·텍스트 분석" onkeydown="onKey(event)" oninput="autoGrow(this)"></textarea>
        <button onclick="send()" title="보내기"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<script>
  initNav('assistant.html');
  const authToken = sessionStorage.getItem('adminToken') || sessionStorage.getItem('staffToken');
  const authH = () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+authToken });
  let tgEnabled = false;

  const REM_KEY = 'assistant_reminders_v1';
  const CHAT_KEY = 'assistant_chat_v1';

  /* ── 초기화 ── */
  (async function(){
    // 텔레그램 상태
    try {
      const r = await fetch('/api/telegram-status', { headers: authH() });
      const j = await r.json();
      tgEnabled = !!j.enabled;
    } catch(e){}
    const tg = document.getElementById('tgStatus');
    tg.textContent = tgEnabled ? '📱 텔레그램 연동됨' : '📱 텔레그램 미설정';
    tg.className = 'tg' + (tgEnabled ? '' : ' off');
    renderReminders();
    restoreChat();
    if (!getChat().length) {
      botSay('안녕하세요! 물류·견적·보세·3PL 업무와 개인 일정까지 도와드리는 AI 비서입니다.\n무엇이든 입력해 보세요. 예) 회의 내용 붙여넣기, "리마인드 6/20 운임청구", "오늘 오더 몇건".');
    }
  })();

  /* ── 채팅 표시/저장 ── */
  function getChat(){ try{return JSON.parse(localStorage.getItem(CHAT_KEY)||'[]');}catch(e){return [];} }
  function saveChat(arr){ localStorage.setItem(CHAT_KEY, JSON.stringify(arr.slice(-50))); }
  function restoreChat(){ getChat().forEach(m => addBubble(m.role, m.text, m.acts, false)); scrollDown(); }

  function addBubble(role, text, acts, persist=true){
    const body = document.getElementById('chatBody');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    let html = (role==='bot' ? '<div class="mt">🤖 비서</div>' : '') + escHtml(text);
    if (acts && acts.length){
      html += '<div class="act">' + acts.map(a =>
        `<button class="${a.cls}" onclick="${a.onclick}">${a.label}</button>`).join('') + '</div>';
    }
    div.innerHTML = html;
    body.appendChild(div);
    scrollDown();
    if (persist){ const c=getChat(); c.push({role,text,acts}); saveChat(c); }
  }
  function botSay(text, acts){ addBubble('bot', text, acts); }
  function userSay(text){ addBubble('user', text); }
  function scrollDown(){ const b=document.getElementById('chatBody'); b.scrollTop=b.scrollHeight; }

  /* ── 입력 ── */
  function onKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }
  function autoGrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
  function quick(t){ document.getElementById('input').value=t; send(); }

  function send(){
    const el = document.getElementById('input');
    const text = el.value.trim();
    if (!text) return;
    userSay(text);
    el.value=''; el.style.height='auto';
    setTimeout(()=>handle(text), 120);
  }

  /* ── 명령 처리 (규칙기반) ── */
  async function handle(text){
    const t = text.trim();
    const low = t.toLowerCase();

    // 1) 리마인더 등록: "리마인드/알림/리마인더 [날짜] [내용]"
    if (/^(리마인드|리마인더|알림|알려줘)/.test(t)) { return addReminderFromText(t); }

    // 2) 데이터 조회
    if (/오늘.*오더|오더.*오늘|오늘.*몇건/.test(t)) return queryOrders('today');
    if (/이번\s*달.*오더|이번달.*오더/.test(t)) return queryOrders('month');
    if (/ot|오티|초과근무|야근/i.test(low) && /시간|몇|이번달|내역/.test(t)) return queryOT();

    // 3) 메뉴 바로가기
    if (/^메뉴|바로가기|어디|이동/.test(t)) return showMenus();

    // 4) 견적 초안
    if (/견적/.test(t)) return quoteDraft(t);

    // 5) 도움말
    if (/^도움말|^help|^\?/.test(low)) return showHelp();

    // 6) 그 외 → 텍스트 분석 (회의록/메모: 요약·할일·날짜 추출)
    return analyzeText(t);
  }

  /* ── 회의록/메모 분석 ── */
  function analyzeText(t){
    const lines = t.split(/\n|·|•|▪|‣|\d+\)|\d+\./).map(s=>s.trim()).filter(Boolean);
    // 할 일 후보: 동사/의무 표현 포함
    const todoRe = /(해야|하기로|확인|전달|작성|준비|예정|요청|진행|체크|마감|보고|발송|회신|정리|등록|수정|검토|연락|문의|발주|배차|입금|청구|견적)/;
    const todos = lines.filter(l => todoRe.test(l));
    // 날짜 추출
    const dates = extractDates(t);
    // 사람/업체(한글 2~4자 + 님/씨/대표/팀/사) — 단순
    const who = [...new Set((t.match(/[가-힣]{2,4}(님|씨|대표|부장|과장|차장|팀장|사장)/g)||[]))];

    let out = '📋 분석 결과\n';
    out += `\n• 문장 ${lines.length}개`;
    if (who.length) out += `\n• 관련 인물: ${who.join(', ')}`;
    if (dates.length) out += `\n• 날짜: ${dates.map(d=>d.label).join(', ')}`;

    out += '\n\n✅ 할 일 (' + todos.length + '건)';
    if (todos.length) out += '\n' + todos.map((x,i)=>`  ${i+1}. ${x}`).join('\n');
    else out += '\n  (자동 추출된 할 일 없음 — 직접 정리해 드릴까요?)';

    out += '\n\n📝 요약';
    out += '\n' + summarize(lines);

    const acts = [];
    if (tgEnabled) acts.push({cls:'btn-tg', label:'📱 텔레그램 전송', onclick:`sendTG(${JSON.stringify(out).replace(/"/g,'&quot;')})`});
    // 날짜가 있으면 리마인더 등록 제안
    if (dates.length && todos.length){
      const d = dates[0]; const task = todos[0];
      acts.push({cls:'btn-go', label:'⏰ 리마인더 등록', onclick:`addReminder('${d.iso}','${escAttr(task)}')`});
    }
    botSay(out, acts);
  }

  function summarize(lines){
    // 가장 정보량 많은 상위 3문장(길이+키워드 가중)
    const scored = lines.map(l=>({l, s: l.length + (/(\d|원|건|시|일|월|배차|청구|입고|출고|견적|보세)/.test(l)?20:0)}));
    scored.sort((a,b)=>b.s-a.s);
    return scored.slice(0,3).map(x=>'  - '+x.l).join('\n') || '  (요약할 내용 부족)';
  }

  /* ── 날짜 추출 ── */
  function extractDates(t){
    const out=[]; const now=new Date(); const Y=now.getFullYear();
    // M/D 또는 M월 D일
    let m;
    const re1=/(\d{1,2})\s*[\/\.월]\s*(\d{1,2})\s*일?/g;
    while((m=re1.exec(t))){
      const mo=+m[1], da=+m[2];
      if(mo>=1&&mo<=12&&da>=1&&da<=31){
        const iso=`${Y}-${String(mo).padStart(2,'0')}-${String(da).padStart(2,'0')}`;
        out.push({iso, label:`${mo}/${da}`});
      }
    }
    if(/오늘/.test(t)) out.push({iso:isoOf(now), label:'오늘'});
    if(/내일/.test(t)){ const d=new Date(now); d.setDate(d.getDate()+1); out.push({iso:isoOf(d),label:'내일'}); }
    if(/모레/.test(t)){ const d=new Date(now); d.setDate(d.getDate()+2); out.push({iso:isoOf(d),label:'모레'}); }
    // 중복 제거
    const seen=new Set(); return out.filter(d=>!seen.has(d.iso)&&seen.add(d.iso));
  }
  function isoOf(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

  /* ── 리마인더 ── */
  function getReminders(){ try{return JSON.parse(localStorage.getItem(REM_KEY)||'[]');}catch(e){return [];} }
  function saveReminders(a){ localStorage.setItem(REM_KEY, JSON.stringify(a)); }

  function addReminderFromText(t){
    const dates = extractDates(t);
    // 명령어/날짜 제거한 나머지를 내용으로
    let task = t.replace(/^(리마인드|리마인더|알림|알려줘)\s*/,'')
                .replace(/(\d{1,2})\s*[\/\.월]\s*(\d{1,2})\s*일?/,'')
                .replace(/오늘|내일|모레/,'').trim();
    if(!task) task='(내용 없음)';
    const iso = dates.length ? dates[0].iso : isoOf(new Date());
    addReminder(iso, task);
  }
  function addReminder(iso, task){
    const a=getReminders();
    a.push({id:Date.now()+''+Math.floor(Math.random()*999), date:iso, task, done:false});
    a.sort((x,y)=>x.date.localeCompare(y.date));
    saveReminders(a); renderReminders();
    const acts = tgEnabled ? [{cls:'btn-tg',label:'📱 지금 텔레그램 전송',onclick:`sendTG('⏰ 리마인더: ${escAttr(task)} (${iso})')`}] : [];
    botSay(`⏰ 리마인더 등록 완료\n• ${iso} — ${task}\n\n해당 날짜에 비서 화면을 열면 알림이 표시됩니다.`, acts);
  }
  function delReminder(id){ saveReminders(getReminders().filter(r=>r.id!==id)); renderReminders(); }
  window.delReminder=delReminder;

  function renderReminders(){
    const a=getReminders();
    const today=isoOf(new Date());
    document.getElementById('remCount').textContent = a.length ? `${a.length}건` : '';
    const list=document.getElementById('remList');
    if(!a.length){ list.innerHTML='<div class="rem-empty">등록된 리마인더가 없습니다. "리마인드 6/20 운임청구" 처럼 입력해 보세요.</div>'; return; }
    list.innerHTML = a.map(r=>{
      const due = r.date<=today;
      return `<div class="rem-item ${due?'due':''}">
        <span class="d">${r.date}${due?' ⚠️':''}</span>
        <span class="t">${escHtml(r.task)}</span>
        ${due&&tgEnabled?`<button class="x" style="background:#dbeafe;color:#1e40af;" onclick="sendTG('⏰ 리마인더: ${escAttr(r.task)} (${r.date})')">📱</button>`:''}
        <button class="x" onclick="delReminder('${r.id}')">삭제</button>
      </div>`;
    }).join('');
    // 오늘/지난 리마인더가 있으면 채팅으로 안내 (1회)
    const dueOnes=a.filter(r=>r.date<=today);
    if(dueOnes.length && !window.__remNotified){
      window.__remNotified=true;
      botSay(`🔔 오늘 처리할 리마인더 ${dueOnes.length}건이 있습니다:\n`+dueOnes.map(r=>`• ${r.date} ${r.task}`).join('\n'));
    }
  }

  /* ── 데이터 조회 ── */
  async function queryOrders(scope){
    try{
      const now=new Date();
      let from, to;
      if(scope==='today'){ from=to=isoOf(now); }
      else { from=isoOf(new Date(now.getFullYear(),now.getMonth(),1)); to=isoOf(new Date(now.getFullYear(),now.getMonth()+1,0)); }
      const r=await fetch(`/api/records?dateFrom=${from}&dateTo=${to}&limit=2000`,{headers:authH()});
      const j=await r.json();
      const data=j.data||[];
      const byClient={};
      data.forEach(o=>{ const c=o.client_code||'기타'; byClient[c]=(byClient[c]||0)+1; });
      let out=`📦 ${scope==='today'?'오늘':'이번달'} 오더 — 총 ${data.length}건`;
      const names={mettler:'메틀러토레도',canon:'캐논메디칼',chanel:'샤넬코리아',기타:'기타'};
      Object.keys(byClient).forEach(c=>{ out+=`\n• ${names[c]||c}: ${byClient[c]}건`; });
      if(!data.length) out+='\n(등록된 오더 없음)';
      const acts = tgEnabled?[{cls:'btn-tg',label:'📱 텔레그램 전송',onclick:`sendTG(${JSON.stringify(out).replace(/"/g,'&quot;')})`}]:[];
      acts.push({cls:'btn-go',label:'🗂️ 오더 관리 열기',onclick:`location.href='admin.html'`});
      botSay(out, acts);
    }catch(e){ botSay('데이터 조회 실패: '+e.message); }
  }

  async function queryOT(){
    try{
      const now=new Date();
      const from=isoOf(new Date(now.getFullYear(),now.getMonth(),1));
      const to=isoOf(new Date(now.getFullYear(),now.getMonth()+1,0));
      const r=await fetch(`/api/ot?from=${from}&to=${to}`,{headers:authH()});
      const j=await r.json();
      const data=j.data||[];
      const hours=data.reduce((s,x)=>s+parseFloat(x.ot_hours||0),0);
      let out=`⏰ 이번달 OT — ${data.length}회 / 총 ${Math.round(hours*10)/10}h`;
      const acts=[{cls:'btn-go',label:'⏰ OT 관리 열기',onclick:`location.href='ot.html'`}];
      if(tgEnabled) acts.unshift({cls:'btn-tg',label:'📱 텔레그램 전송',onclick:`sendTG(${JSON.stringify(out).replace(/"/g,'&quot;')})`});
      botSay(out, acts);
    }catch(e){ botSay('OT 조회 실패: '+e.message); }
  }

  /* ── 파일 업로드 분석 ── */
  // 드래그&드롭 (채팅 영역)
  (function(){
    const z=document.querySelector('.chat');
    if(!z) return;
    ['dragenter','dragover'].forEach(ev=>z.addEventListener(ev,e=>{e.preventDefault();z.style.outline='2px dashed #6366f1';}));
    ['dragleave','drop'].forEach(ev=>z.addEventListener(ev,e=>{e.preventDefault();z.style.outline='';}));
    z.addEventListener('drop',e=>{ if(e.dataTransfer.files.length) onFiles(e.dataTransfer.files); });
  })();

  function onFiles(list){
    const files=Array.from(list||[]);
    files.forEach(f=>processFile(f));
    document.getElementById('fileInput').value='';
  }

  async function processFile(file){
    userSay('📎 ' + file.name + '  (' + fmtSize(file.size) + ')');
    const name=file.name.toLowerCase();
    try{
      if(/\.(xlsx|xls|csv)$/.test(name)){
        const buf=await file.arrayBuffer();
        analyzeExcel(buf, file.name);
      } else if(/\.txt$/.test(name)){
        const text=await file.text();
        botSay(`📄 "${file.name}" 텍스트 분석`);
        analyzeText(text);
      } else if(/\.pdf$/.test(name)){
        botSay(`📄 "${file.name}" PDF에서 텍스트 추출 중…`);
        const text=await extractPdf(file);
        if(text.trim()) analyzeText(text);
        else botSay('PDF에서 텍스트를 추출하지 못했습니다 (스캔본일 수 있음).');
      } else {
        botSay('지원하지 않는 형식입니다. 엑셀(.xlsx/.xls), CSV, PDF, 텍스트(.txt)를 올려주세요.');
      }
    }catch(e){ botSay('파일 분석 실패: '+e.message); }
  }

  let LOADED = null;   // { fname, sheets:[{name, header, rows}] }

  function analyzeExcel(buf, fname){
    const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
    const sheets=[];
    wb.SheetNames.forEach(sn=>{
      const arr=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
      // 헤더 행 자동 탐색 (값이 가장 많은 상위 5행 중 첫 행)
      let hi=0, best=-1;
      for(let i=0;i<Math.min(arr.length,6);i++){ const c=(arr[i]||[]).filter(x=>String(x||'').trim()).length; if(c>best){best=c;hi=i;} }
      const header=(arr[hi]||[]).map(c=>String(c||'').trim());
      const rows=arr.slice(hi+1).filter(r=>r.some(c=>c!==''&&c!=null));
      sheets.push({name:sn, header, rows});
    });
    LOADED={fname, sheets};

    // 간단 요약 메시지
    const big=sheets.reduce((a,b)=>b.rows.length>a.rows.length?b:a, sheets[0]);
    let out=`📊 "${fname}" 로드 완료\n• 시트 ${sheets.length}개: ${sheets.map(s=>s.name).join(', ')}`;
    out+=`\n• 주요 시트 [${big.name}] — 행 ${big.rows.length} · 열 ${big.header.filter(Boolean).length}`;
    out+=`\n\n👇 아래 "데이터 분석 도구"에서 원하는 계산(합계·평균·개당단가·그룹별 등)을 선택하면 정확히 계산해 드립니다.`;
    botSay(out);

    // 분석 도구 표시
    setupAnalysisTool();
    document.getElementById('analysisCard').scrollIntoView({behavior:'smooth',block:'center'});
  }

  /* ── 데이터 분석 도구 ── */
  function setupAnalysisTool(){
    if(!LOADED) return;
    document.getElementById('analysisCard').style.display='block';
    document.getElementById('anaFile').textContent='📎 '+LOADED.fname;
    const ss=document.getElementById('anaSheet');
    ss.innerHTML=LOADED.sheets.map((s,i)=>`<option value="${i}">${escHtml(s.name)} (${s.rows.length}행)</option>`).join('');
    onSheetChange();
  }
  function curSheet(){ return LOADED ? LOADED.sheets[+document.getElementById('anaSheet').value||0] : null; }
  function onSheetChange(){ onOpChange(); }

  function onOpChange(){
    const sh=curSheet(); if(!sh) return;
    const op=document.getElementById('anaOp').value;
    const cols=sh.header.map((h,i)=>({h:h||`(열${i+1})`, i})).filter(c=>c.h);
    const opt=cols.map(c=>`<option value="${c.i}">${escHtml(c.h)}</option>`).join('');
    const wrap=document.getElementById('anaColWrap');
    if(op==='div'){
      wrap.innerHTML=`
        <div><label style="font-size:11px;color:#475569;font-weight:700;">금액 컬럼 (A)</label><select id="colA" style="width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;">${opt}</select></div>
        <div><label style="font-size:11px;color:#475569;font-weight:700;">수량 컬럼 (B)</label><select id="colB" style="width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;">${opt}</select></div>`;
    } else if(op==='group'){
      wrap.innerHTML=`
        <div><label style="font-size:11px;color:#475569;font-weight:700;">그룹 기준 컬럼</label><select id="colG" style="width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;">${opt}</select></div>
        <div><label style="font-size:11px;color:#475569;font-weight:700;">합산할 값 컬럼</label><select id="colV" style="width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;">${opt}</select></div>`;
    } else {
      wrap.innerHTML=`<div><label style="font-size:11px;color:#475569;font-weight:700;">대상 컬럼</label><select id="colA" style="width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:inherit;">${opt}</select></div>`;
    }
  }

  function numAt(row, ci){ const v=parseFloat(String(row[ci]??'').replace(/[^\d.\-]/g,'')); return isNaN(v)?null:v; }

  function runAnalysis(){
    const sh=curSheet(); if(!sh){ return; }
    const op=document.getElementById('anaOp').value;
    const res=document.getElementById('anaResult');
    const fmt=n=>{ const r=Math.round(n*100)/100; return r.toLocaleString('ko-KR'); };
    let html='', tgText='';
    const hname=ci=>sh.header[ci]||`열${ci+1}`;

    try{
      if(op==='sum'||op==='avg'||op==='max'||op==='min'||op==='count'){
        const ci=+document.getElementById('colA').value;
        const vals=sh.rows.map(r=>numAt(r,ci)).filter(v=>v!==null);
        let val, label;
        if(op==='count'){ val=sh.rows.filter(r=>String(r[ci]??'').trim()!=='').length; label='건수'; }
        else if(!vals.length){ res.innerHTML='<div style="color:#ef4444;font-size:12px;">숫자 데이터가 없습니다. 다른 컬럼을 선택하세요.</div>'; return; }
        else if(op==='sum'){ val=vals.reduce((a,b)=>a+b,0); label='합계'; }
        else if(op==='avg'){ val=vals.reduce((a,b)=>a+b,0)/vals.length; label='평균'; }
        else if(op==='max'){ val=Math.max(...vals); label='최대값'; }
        else { val=Math.min(...vals); label='최소값'; }
        tgText=`📊 [${sh.name}] ${hname(ci)} ${label}: ${fmt(val)}${op!=='count'?` (${vals.length}건)`:''}`;
        html=resultCard(label, hname(ci), fmt(val), op==='count'?'':`${vals.length}건 기준`);
      }
      else if(op==='div'){
        const a=+document.getElementById('colA').value, b=+document.getElementById('colB').value;
        let sumA=0,sumB=0,n=0;
        sh.rows.forEach(r=>{ const va=numAt(r,a), vb=numAt(r,b); if(va!==null&&vb!==null&&vb!==0){ sumA+=va; sumB+=vb; n++; } });
        if(!n){ res.innerHTML='<div style="color:#ef4444;font-size:12px;">계산 가능한 행이 없습니다.</div>'; return; }
        const per=sumA/sumB;
        tgText=`📊 [${sh.name}] 개당 단가 = ${hname(a)} ÷ ${hname(b)}\n= ${fmt(sumA)} ÷ ${fmt(sumB)} = ${fmt(per)}/개 (${n}건)`;
        html=resultCard('개당 단가', `${hname(a)} ÷ ${hname(b)}`, fmt(per)+' /개',
          `총 ${hname(a)} ${fmt(sumA)} ÷ 총 ${hname(b)} ${fmt(sumB)} · ${n}건`);
      }
      else if(op==='group'){
        const g=+document.getElementById('colG').value, v=+document.getElementById('colV').value;
        const map={};
        sh.rows.forEach(r=>{ const key=String(r[g]??'').trim()||'(빈값)'; const val=numAt(r,v)||0; map[key]=(map[key]||0)+val; });
        const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
        const total=entries.reduce((a,b)=>a+b[1],0);
        tgText=`📊 [${sh.name}] ${hname(g)}별 ${hname(v)} 합계\n`+entries.map(([k,val])=>`• ${k}: ${fmt(val)}`).join('\n')+`\n합계: ${fmt(total)}`;
        html=`<div style="font-size:12px;font-weight:700;color:#334155;margin-bottom:6px;">${escHtml(hname(g))}별 ${escHtml(hname(v))} 합계</div>
          <div style="max-height:240px;overflow:auto;border:1px solid #e2e8f0;border-radius:8px;">
          <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr><th style="background:#1e293b;color:#fff;padding:7px;text-align:left;">${escHtml(hname(g))}</th><th style="background:#1e293b;color:#fff;padding:7px;text-align:right;">${escHtml(hname(v))}</th></tr></thead>
          <tbody>${entries.map(([k,val])=>`<tr><td style="padding:6px 8px;border-bottom:1px solid #eee;">${escHtml(k)}</td><td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right;font-weight:700;">${fmt(val)}</td></tr>`).join('')}</tbody>
          <tfoot><tr><td style="padding:7px 8px;background:#f1f5f9;font-weight:800;">합계</td><td style="padding:7px 8px;background:#f1f5f9;font-weight:800;text-align:right;">${fmt(total)}</td></tr></tfoot>
          </table></div>`;
      }
      res.innerHTML=html;
      if(tgEnabled){
        const b=document.createElement('button');
        b.style.cssText='margin-top:10px;background:#229ED9;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;';
        b.innerHTML='📱 텔레그램 전송';
        b.onclick=()=>sendTG(tgText);
        res.appendChild(b);
      }
    }catch(e){ res.innerHTML='<div style="color:#ef4444;font-size:12px;">계산 오류: '+e.message+'</div>'; }
  }
  function resultCard(label, target, value, sub){
    return `<div style="background:linear-gradient(135deg,#eef2ff,#f5f3ff);border:1px solid #c7d2fe;border-radius:12px;padding:14px 16px;">
      <div style="font-size:11px;color:#6366f1;font-weight:700;">${escHtml(target)} — ${escHtml(label)}</div>
      <div style="font-size:26px;font-weight:900;color:#4338ca;margin-top:2px;">${escHtml(value)}</div>
      ${sub?`<div style="font-size:11px;color:#64748b;margin-top:3px;">${escHtml(sub)}</div>`:''}
    </div>`;
  }
  window.onSheetChange=onSheetChange; window.onOpChange=onOpChange; window.runAnalysis=runAnalysis;

  async function extractPdf(file){
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const tc=await page.getTextContent();
      text+=tc.items.map(it=>it.str).join(' ')+'\n';
    }
    return text;
  }

  function fmtSize(b){ if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
  window.onFiles=onFiles;

  /* ── 텔레그램 전송 ── */
  async function sendTG(text){
    try{
      const r=await fetch('/api/assistant/notify',{method:'POST',headers:authH(),body:JSON.stringify({text})});
      const j=await r.json();
      if(r.ok&&j.ok) toast('📱 텔레그램 전송 완료');
      else toast('전송 실패: '+(j.error||r.status),'error');
    }catch(e){ toast('전송 오류: '+e.message,'error'); }
  }
  window.sendTG=sendTG;

  /* ── 유틸 ── */
  function escHtml(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s){ return String(s??'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
  function toast(msg,type='success'){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast '+type; el.style.display='block'; setTimeout(()=>el.style.display='none',2400); }
</script>
