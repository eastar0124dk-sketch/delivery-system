<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메틀러토레도 업무일지 - 토탈 물류</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="hub-nav.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;display:flex;min-height:100vh;background:#f0f4f8;}
    .hub-main{margin-left:220px;padding:24px;flex:1;}
    @media(max-width:768px){.hub-main{margin-left:0;padding:16px;}}

    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:gap;}
    .page-title{font-size:20px;font-weight:700;color:#1a202c;display:flex;align-items:center;gap:10px;}
    .page-title i{color:#667eea;}

    /* 날짜 네비게이터 */
    .date-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .date-nav label{font-size:13px;font-weight:600;color:#4a5568;}
    .date-nav input[type=date]{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;}
    .btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4);}
    .btn-success{background:linear-gradient(135deg,#38a169,#2f855a);color:#fff;}
    .btn-success:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(56,161,105,.4);}
    .btn-outline{background:#fff;color:#4a5568;border:1.5px solid #e2e8f0;}
    .btn-outline:hover{background:#f7fafc;}
    .btn-excel{background:linear-gradient(135deg,#1d6f42,#155034);color:#fff;}
    .btn-excel:hover{transform:translateY(-1px);}

    /* 저장 상태 */
    .save-status{font-size:12px;padding:6px 12px;border-radius:20px;font-weight:600;}
    .save-status.saved{background:#d1fae5;color:#065f46;}
    .save-status.unsaved{background:#fef3c7;color:#92400e;}
    .save-status.saving{background:#dbeafe;color:#1e40af;}

    /* 폼 카드 */
    .card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px;}
    .card-title{font-size:15px;font-weight:700;color:#2d3748;display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:2px solid #f0f4f8;margin-bottom:20px;}
    .card-title i{color:#667eea;}

    /* 기본 정보 */
    .info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
    @media(max-width:600px){.info-grid{grid-template-columns:1fr;}}
    .form-group{display:flex;flex-direction:column;gap:5px;}
    .form-group label{font-size:12px;font-weight:600;color:#4a5568;}
    .form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa;transition:border .2s;}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,.1);}

    /* 입고 테이블 */
    .table-form{width:100%;border-collapse:collapse;}
    .table-form th{background:#ebf4ff;color:#3b82f6;font-size:13px;font-weight:700;padding:10px 12px;text-align:center;border:1.5px solid #dbeafe;}
    .table-form td{padding:8px;border:1.5px solid #e2e8f0;text-align:center;}
    .table-form td:first-child{background:#f7fafc;font-weight:600;color:#4a5568;font-size:13px;}
    .table-form input[type=number]{width:80px;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:6px;text-align:center;font-family:inherit;font-size:14px;}
    .table-form input[type=text]{width:100%;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-family:inherit;font-size:13px;}
    .table-form input:focus{outline:none;border-color:#667eea;}
    .th-import{background:linear-gradient(135deg,#ebf4ff,#dbeafe);}
    .th-export{background:linear-gradient(135deg,#f0fff4,#dcfce7);}

    /* 특이사항 */
    .special-notes{width:100%;min-height:100px;padding:12px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;background:#fafafa;}
    .special-notes:focus{outline:none;border-color:#667eea;background:#fff;}

    /* 미리보기 박스 */
    .preview-box{background:#fff;border:2px solid #e2e8f0;border-radius:12px;padding:20px;margin-top:20px;}
    .preview-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px;color:#2d3748;}
    .preview-table{width:100%;border-collapse:collapse;font-size:13px;}
    .preview-table th,.preview-table td{border:1px solid #e2e8f0;padding:8px 10px;text-align:center;}
    .preview-table th{background:#ebf4ff;color:#3b82f6;font-weight:700;}
    .preview-header{background:#dbeafe!important;font-weight:700!important;}

    .alert{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:14px;display:none;align-items:center;gap:8px;}
    .alert-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0;display:flex;}
    .alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;display:flex;}
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="hub-main">
    <div class="page-header">
      <div class="page-title"><i class="fas fa-balance-scale"></i> 메틀러토레도 일일 업무일지</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <span class="save-status saved" id="saveStatus"><i class="fas fa-check-circle"></i> 저장됨</span>
        <button class="btn btn-excel" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> 엑셀 다운로드</button>
        <button class="btn btn-success" onclick="saveJournal()"><i class="fas fa-save"></i> 저장</button>
      </div>
    </div>

    <div class="alert alert-success" id="alertSuccess"><i class="fas fa-check-circle"></i> <span id="alertSuccessMsg">저장되었습니다.</span></div>
    <div class="alert alert-error" id="alertError"><i class="fas fa-exclamation-circle"></i> <span id="alertErrorMsg">오류가 발생했습니다.</span></div>

    <!-- 날짜 선택 -->
    <div class="date-nav">
      <label><i class="fas fa-calendar-alt" style="color:#667eea;margin-right:5px;"></i> 작성일</label>
      <input type="date" id="journalDate" onchange="loadJournal()">
      <button class="btn btn-outline" onclick="goDate(-1)"><i class="fas fa-chevron-left"></i> 전날</button>
      <button class="btn btn-outline" onclick="goDate(1)">다음날 <i class="fas fa-chevron-right"></i></button>
      <button class="btn btn-primary" onclick="setToday()"><i class="fas fa-calendar-day"></i> 오늘</button>
    </div>

    <!-- 기본 정보 -->
    <div class="card">
      <div class="card-title"><i class="fas fa-info-circle"></i> 기본 정보</div>
      <div class="info-grid">
        <div class="form-group">
          <label>작성자</label>
          <input type="text" id="writer" placeholder="성명 입력" oninput="markUnsaved()">
        </div>
        <div class="form-group">
          <label>업무시작</label>
          <input type="time" id="workStart" value="08:30" oninput="markUnsaved()">
        </div>
        <div class="form-group">
          <label>업무종료</label>
          <input type="time" id="workEnd" value="18:00" oninput="markUnsaved()">
        </div>
        <div class="form-group">
          <label>인원 (명)</label>
          <input type="number" id="staffCount" min="0" placeholder="0" oninput="markUnsaved()">
        </div>
        <div class="form-group" style="grid-column:span 2;">
          <label>비고</label>
          <input type="text" id="headerNotes" placeholder="기타 사항" oninput="markUnsaved()">
        </div>
      </div>
    </div>

    <!-- 입고 현황 -->
    <div class="card">
      <div class="card-title" style="color:#3b82f6;"><i class="fas fa-arrow-down" style="color:#3b82f6;"></i> 입고 현황</div>
      <table class="table-form">
        <thead>
          <tr class="th-import">
            <th>구분</th>
            <th>신한입고</th>
            <th>내국입고</th>
            <th>특수입고</th>
            <th>비고</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>입고예정</td>
            <td><input type="number" id="plan_sinhan" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="number" id="plan_domestic" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="number" id="plan_special" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="text" id="plan_notes" placeholder="비고" oninput="markUnsaved()"></td>
          </tr>
          <tr>
            <td>입고완료</td>
            <td><input type="number" id="done_sinhan" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="number" id="done_domestic" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="number" id="done_special" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="text" id="done_notes" placeholder="비고" oninput="markUnsaved()"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 출고 현황 -->
    <div class="card">
      <div class="card-title" style="color:#38a169;"><i class="fas fa-arrow-up" style="color:#38a169;"></i> 출고 현황</div>
      <table class="table-form">
        <thead>
          <tr class="th-export">
            <th>구분</th>
            <th>택배출고 건수</th>
            <th>차량출고 건수</th>
            <th>픽업출고 건수</th>
            <th>비고</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>출고</td>
            <td><input type="number" id="exp_courier" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="number" id="exp_vehicle" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="number" id="exp_pickup" min="0" value="0" oninput="markUnsaved()"></td>
            <td><input type="text" id="exp_notes" placeholder="비고" oninput="markUnsaved()"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 특이사항 -->
    <div class="card">
      <div class="card-title"><i class="fas fa-exclamation-circle"></i> 특이사항</div>
      <textarea class="special-notes" id="specialNotes" placeholder="당일 특이사항을 입력하세요..." oninput="markUnsaved()"></textarea>
    </div>

    <!-- 미리보기 -->
    <div class="card">
      <div class="card-title"><i class="fas fa-eye"></i> 보고서 미리보기</div>
      <div class="preview-box" id="previewBox">
        <div class="preview-title">메틀러토레도 일일 업무일지</div>
        <div id="previewContent"></div>
      </div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem('adminToken');
    if (!token) location.href = 'index.html';
    const authH = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` });
    if (typeof initNav === 'function') initNav('journal_mettler');

    let isUnsaved = false;

    function setToday() {
      const today = new Date();
      document.getElementById('journalDate').value = today.toISOString().split('T')[0];
      loadJournal();
    }

    function goDate(delta) {
      const d = new Date(document.getElementById('journalDate').value);
      d.setDate(d.getDate() + delta);
      document.getElementById('journalDate').value = d.toISOString().split('T')[0];
      loadJournal();
    }

    function markUnsaved() {
      isUnsaved = true;
      const s = document.getElementById('saveStatus');
      s.className = 'save-status unsaved';
      s.innerHTML = '<i class="fas fa-circle"></i> 미저장';
      updatePreview();
    }

    function markSaved() {
      isUnsaved = false;
      const s = document.getElementById('saveStatus');
      s.className = 'save-status saved';
      s.innerHTML = '<i class="fas fa-check-circle"></i> 저장됨';
    }

    function getFormData() {
      return {
        writer: document.getElementById('writer').value,
        work_start: document.getElementById('workStart').value,
        work_end: document.getElementById('workEnd').value,
        staff_count: document.getElementById('staffCount').value,
        header_notes: document.getElementById('headerNotes').value,
        import_plan: {
          sinhan: parseInt(document.getElementById('plan_sinhan').value)||0,
          domestic: parseInt(document.getElementById('plan_domestic').value)||0,
          special: parseInt(document.getElementById('plan_special').value)||0,
          notes: document.getElementById('plan_notes').value
        },
        import_done: {
          sinhan: parseInt(document.getElementById('done_sinhan').value)||0,
          domestic: parseInt(document.getElementById('done_domestic').value)||0,
          special: parseInt(document.getElementById('done_special').value)||0,
          notes: document.getElementById('done_notes').value
        },
        export: {
          courier: parseInt(document.getElementById('exp_courier').value)||0,
          vehicle: parseInt(document.getElementById('exp_vehicle').value)||0,
          pickup: parseInt(document.getElementById('exp_pickup').value)||0,
          notes: document.getElementById('exp_notes').value
        },
        special_notes: document.getElementById('specialNotes').value
      };
    }

    function setFormData(d) {
      document.getElementById('writer').value = d.writer||'';
      document.getElementById('workStart').value = d.work_start||'08:30';
      document.getElementById('workEnd').value = d.work_end||'18:00';
      document.getElementById('staffCount').value = d.staff_count||'';
      document.getElementById('headerNotes').value = d.header_notes||'';
      const ip = d.import_plan||{};
      document.getElementById('plan_sinhan').value = ip.sinhan||0;
      document.getElementById('plan_domestic').value = ip.domestic||0;
      document.getElementById('plan_special').value = ip.special||0;
      document.getElementById('plan_notes').value = ip.notes||'';
      const id2 = d.import_done||{};
      document.getElementById('done_sinhan').value = id2.sinhan||0;
      document.getElementById('done_domestic').value = id2.domestic||0;
      document.getElementById('done_special').value = id2.special||0;
      document.getElementById('done_notes').value = id2.notes||'';
      const ex = d.export||{};
      document.getElementById('exp_courier').value = ex.courier||0;
      document.getElementById('exp_vehicle').value = ex.vehicle||0;
      document.getElementById('exp_pickup').value = ex.pickup||0;
      document.getElementById('exp_notes').value = ex.notes||'';
      document.getElementById('specialNotes').value = d.special_notes||'';
    }

    async function loadJournal() {
      const date = document.getElementById('journalDate').value;
      if (!date) return;
      try {
        const res = await fetch(`/api/journals?client=mettler&date=${date}`, { headers: authH() });
        const json = await res.json();
        if (json.data && json.data.length > 0 && json.data[0].data) {
          setFormData(json.data[0].data);
        } else {
          // 새 날짜 → 폼 초기화
          setFormData({});
        }
        markSaved();
        updatePreview();
      } catch(e) {
        console.error(e);
      }
    }

    async function saveJournal() {
      const date = document.getElementById('journalDate').value;
      if (!date) { showAlert('error', '날짜를 선택해주세요.'); return; }
      const data = getFormData();
      try {
        const s = document.getElementById('saveStatus');
        s.className = 'save-status saving'; s.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 저장중...';
        const res = await fetch('/api/journals', {
          method:'POST', headers: authH(),
          body: JSON.stringify({ client:'mettler', journal_date: date, data })
        });
        if (res.ok) {
          markSaved();
          showAlert('success', '업무일지가 저장되었습니다.');
        } else {
          const err = await res.json();
          showAlert('error', err.error || '저장 실패');
        }
      } catch(e) {
        showAlert('error', '저장 중 오류가 발생했습니다.');
      }
    }

    async function downloadExcel() {
      const date = document.getElementById('journalDate').value;
      if (!date) { showAlert('error', '날짜를 선택해주세요.'); return; }
      if (isUnsaved) {
        if (!confirm('저장되지 않은 내용이 있습니다. 먼저 저장 후 다운로드 하시겠습니까?')) return;
        await saveJournal();
      }
      try {
        const res = await fetch(`/api/journals/excel?client=mettler&date=${date}`, { headers: authH() });
        if (!res.ok) {
          const err = await res.json();
          showAlert('error', err.error || '엑셀 생성 실패'); return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `메틀러토레도_업무일지_${date}.xlsx`;
        a.click(); URL.revokeObjectURL(url);
      } catch(e) {
        showAlert('error', '엑셀 다운로드 실패: ' + e.message);
      }
    }

    function updatePreview() {
      const d = getFormData();
      const date = document.getElementById('journalDate').value;
      let dateStr = date;
      if (date) {
        const dt = new Date(date);
        const days = ['일','월','화','수','목','금','토'];
        dateStr = `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일 ${days[dt.getDay()]}요일`;
      }
      const html = `
        <table class="preview-table">
          <tr><td class="preview-header" colspan="5" style="text-align:center;font-size:15px;padding:12px;">메틀러토레도 일일 업무일지</td>
              <td class="preview-header">결재</td><td class="preview-header">차장</td><td class="preview-header">이사</td><td class="preview-header">대표이사</td></tr>
          <tr><th>작성일자</th><td colspan="3">${dateStr}</td><th>업무시작</th><td colspan="4">${d.work_start}</td></tr>
          <tr><th>작성자</th><td colspan="3">${d.writer}</td><th>업무종료</th><td colspan="4">${d.work_end}</td></tr>
          <tr><th>인원</th><td colspan="3">${d.staff_count}명</td><th>비고</th><td colspan="4">${d.header_notes}</td></tr>
          <tr><th>구분</th><th>신한입고</th><th>내국입고</th><th>특수입고</th><th colspan="5">비고</th></tr>
          <tr><th>입고예정</th><td>${d.import_plan.sinhan}</td><td>${d.import_plan.domestic}</td><td>${d.import_plan.special}</td><td colspan="5">${d.import_plan.notes}</td></tr>
          <tr><th>입고완료</th><td>${d.import_done.sinhan}</td><td>${d.import_done.domestic}</td><td>${d.import_done.special}</td><td colspan="5">${d.import_done.notes}</td></tr>
          <tr><th>구분</th><th>택배출고 건수</th><th>차량출고 건수</th><th colspan="2">픽업출고 건수</th><th colspan="4">비고</th></tr>
          <tr><th>출고</th><td>${d.export.courier}</td><td>${d.export.vehicle}</td><td colspan="2">${d.export.pickup}</td><td colspan="4">${d.export.notes}</td></tr>
          <tr><th colspan="9">특이사항</th></tr>
          <tr><td colspan="9" style="text-align:left;padding:10px;min-height:60px;white-space:pre-wrap;">${d.special_notes}</td></tr>
        </table>
        <div style="margin-top:12px;padding:8px 12px;background:#f7fafc;border-radius:8px;display:flex;align-items:center;gap:10px;">
          <span style="font-weight:700;color:#003366;font-size:12px;">[ KOREA AEO ]</span>
          <span style="font-weight:700;color:#003366;font-size:13px;">ACT LOGISTICS Co., Ltd.</span>
        </div>`;
      document.getElementById('previewContent').innerHTML = html;
    }

    function showAlert(type, msg) {
      const el = document.getElementById(type==='success' ? 'alertSuccess' : 'alertError');
      const msgEl = document.getElementById(type==='success' ? 'alertSuccessMsg' : 'alertErrorMsg');
      msgEl.textContent = msg;
      el.style.display = 'flex';
      setTimeout(() => el.style.display='none', 3000);
    }

    // 자동 저장 (30초)
    let autoSaveTimer = setInterval(() => {
      if (isUnsaved) saveJournal();
    }, 30000);

    // 초기화
    setToday();
  </script>
</body>
</html>
