<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차량 배차 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      display: flex;
      min-height: 100vh;
    }
    .hub-main {
      margin-left: 220px;
      padding: 24px;
      flex: 1;
      min-width: 0;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .hub-page-title {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    /* 탭 */
    .client-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      background: white;
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      width: fit-content;
    }
    .client-tab {
      padding: 10px 28px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all .2s;
    }
    .client-tab.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 2px 8px rgba(102,126,234,.4);
    }
    /* 요약 카드 */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-cards.chanel {
      grid-template-columns: repeat(5, 1fr);
    }
    .summary-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .summary-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      flex-shrink: 0;
    }
    /* Mettler icons */
    .icon-carrier { background: linear-gradient(135deg, #667eea, #764ba2); }
    .icon-shipper { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .icon-margin  { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    /* Chanel icons */
    .icon-act     { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .icon-k1      { background: linear-gradient(135deg, #f7971e, #ffd200); }
    .icon-pass    { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
    .icon-diff    { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .icon-rate    { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .summary-info { min-width: 0; }
    .summary-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .summary-value { font-size: 18px; font-weight: 700; color: #222; }
    /* 툴바 */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 2px 8px rgba(102,126,234,.4);
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-success {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: white;
      box-shadow: 0 2px 8px rgba(67,233,123,.3);
    }
    .btn-success:hover { opacity: .9; transform: translateY(-1px); }
    .btn-danger {
      background: linear-gradient(135deg, #f5576c, #f093fb);
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }
    .btn-danger:hover { opacity: .9; }
    .btn-edit {
      background: #f0f4f8;
      color: #667eea;
      font-size: 12px;
      padding: 6px 12px;
      border: 1px solid #e0e7ff;
    }
    .btn-edit:hover { background: #e0e7ff; }
    /* 테이블 */
    .table-wrap {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: #f8f9ff;
      color: #555;
      font-weight: 600;
      padding: 12px 14px;
      text-align: center;
      border-bottom: 2px solid #eef0f8;
      white-space: nowrap;
    }
    tbody td {
      padding: 11px 14px;
      text-align: center;
      border-bottom: 1px solid #f0f2f8;
      color: #333;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafbff; }
    .td-actions { display: flex; gap: 6px; justify-content: center; }
    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }
    .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }
    /* 모달 오버레이 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      width: 680px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-header {
      padding: 24px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: #aaa;
      cursor: pointer;
      padding: 4px;
    }
    .modal-close:hover { color: #555; }
    .modal-body { padding: 20px 28px 28px; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    input, select, textarea {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      border: 1.5px solid #e8ecf4;
      border-radius: 10px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
      color: #333;
    }
    input:focus, select:focus, textarea:focus { border-color: #667eea; }
    textarea { resize: vertical; min-height: 70px; }
    .modal-footer {
      padding: 0 28px 28px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-cancel {
      background: #f0f4f8;
      color: #666;
      border: none;
    }
    .btn-cancel:hover { background: #e0e7f0; }
    /* 자동계산 필드 */
    .calc-field {
      background: #f8f9fa;
      color: #667eea;
      font-weight: 600;
    }
    /* 반응형 */
    /* NO 컬럼 */
    .col-no {
      width: 44px;
      min-width: 44px;
      text-align: center !important;
      font-size: 12px;
      color: #999;
      font-weight: 600;
    }
    td.col-no {
      color: #bbb;
      font-size: 12px;
      font-weight: 500;
      background: #fafbff;
    }
    /* 기간 필터 바 */
    .date-filter-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: white;
      border-radius: 12px;
      padding: 14px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .date-filter-bar.visible { display: flex; }
    .date-filter-bar label { font-size: 13px; font-weight: 600; color: #555; }
    .date-filter-bar input[type="date"] {
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 7px 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      color: #333;
      cursor: pointer;
    }
    .date-filter-bar input[type="date"]:focus { outline: none; border-color: #667eea; }
    .date-filter-sep { color: #aaa; font-size: 14px; }
    .btn-filter {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-filter:hover { opacity: .85; }
    .btn-filter-reset {
      background: #f1f5f9;
      color: #667eea;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-filter-reset:hover { background: #e8edff; }
    /* 하단 청구합계 */
    .chanel-total-row {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 16px 24px;
      margin-top: 16px;
      display: flex;
      gap: 40px;
      align-items: center;
      flex-wrap: wrap;
    }
    .chanel-total-item { display: flex; flex-direction: column; gap: 4px; }
    .chanel-total-label { font-size: 12px; color: #888; font-weight: 500; }
    .chanel-total-value { font-size: 18px; font-weight: 700; color: #333; }
    @media (max-width: 1200px) {
      .summary-cards.chanel { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .summary-cards { grid-template-columns: 1fr; }
      .summary-cards.chanel { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .hub-main { margin-left: 0; padding: 16px; }
    }
  </style>
</head>
<body>

<!-- 사이드바 -->
<div id="sidebar"></div>
<script src="hub-nav.js"></script>

<main class="hub-main">
  <div class="page-header">
    <h1 class="hub-page-title"><i class="fa fa-truck" style="margin-right:8px;"></i>차량 배차 관리</h1>
  </div>

  <!-- 클라이언트 탭 -->
  <div class="client-tabs">
    <button class="client-tab active" id="tab-mettler" onclick="switchClient('mettler')">메틀러토레도</button>
    <button class="client-tab" id="tab-chanel" onclick="switchClient('chanel')">샤넬코리아</button>
  </div>

  <!-- 기간 필터 (샤넬 전용) -->
  <div class="date-filter-bar" id="date-filter-bar">
    <label>기간설정</label>
    <input type="date" id="filter-from" />
    <span class="date-filter-sep">~</span>
    <input type="date" id="filter-to" />
    <button class="btn-filter" onclick="applyDateFilter()"><i class="fa fa-search"></i> 조회</button>
    <button class="btn-filter-reset" onclick="resetDateFilter()">전체보기</button>
    <span id="filter-info" style="font-size:12px;color:#888;margin-left:4px;"></span>
  </div>

  <!-- 요약 카드 영역 (JS로 교체) -->
  <div class="summary-cards" id="summary-cards-area">
    <!-- Mettler 카드 (기본) -->
    <div class="summary-card">
      <div class="summary-icon icon-carrier"><i class="fa fa-truck"></i></div>
      <div class="summary-info">
        <div class="summary-label">운송사 합계</div>
        <div class="summary-value" id="sum-carrier">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-shipper"><i class="fa fa-building"></i></div>
      <div class="summary-info">
        <div class="summary-label">화주 합계</div>
        <div class="summary-value" id="sum-shipper">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-margin"><i class="fa fa-chart-line"></i></div>
      <div class="summary-info">
        <div class="summary-label">마진</div>
        <div class="summary-value" id="sum-margin">0 원</div>
      </div>
    </div>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <span id="record-count" style="font-size:13px;color:#888;"></span>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-success" onclick="exportExcel()"><i class="fa fa-file-excel"></i> 엑셀 다운로드</button>
      <button class="btn btn-primary" onclick="openAddModal()"><i class="fa fa-plus"></i> 배차 등록</button>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <table id="dispatch-table">
      <thead id="dispatch-table-head">
        <tr>
          <th class="col-no">NO</th>
          <th>날짜</th>
          <th>출발지</th>
          <th>도착지</th>
          <th>화물내용</th>
          <th>차량종류</th>
          <th>운송사운임</th>
          <th>운송사작업비</th>
          <th>화주운임</th>
          <th>화주작업비</th>
          <th>담당</th>
          <th>운송사명</th>
          <th>비고</th>
          <th>수정/삭제</th>
        </tr>
      </thead>
      <tbody id="dispatch-body">
        <tr><td colspan="13"><div class="empty-state"><i class="fa fa-inbox"></i>데이터를 불러오는 중...</div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- 샤넬 하단 합계 (테이블 아래) -->
  <div id="chanel-total-row" class="chanel-total-row" style="display:none;">
    <div class="chanel-total-item">
      <span class="chanel-total-label">🚛 운송사 청구합계</span>
      <span class="chanel-total-value" id="bs-cost">0 원</span>
    </div>
    <div class="chanel-total-item">
      <span class="chanel-total-label">🏢 화주 청구합계</span>
      <span class="chanel-total-value" id="bs-charge">0 원</span>
    </div>
  </div>
</main>

<!-- 배차 등록/수정 모달 -->
<div class="modal-overlay" id="dispatch-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">배차 등록</span>
      <button class="modal-close" onclick="closeModal()"><i class="fa fa-times"></i></button>
    </div>
    <div class="modal-body">

      <!-- ===== 메틀러토레도 폼 ===== -->
      <div id="form-mettler">
        <div class="form-grid">
          <div class="form-group">
            <label>날짜</label>
            <input type="date" id="f-date" />
          </div>
          <div class="form-group">
            <label>차량종류</label>
            <select id="f-vehicle">
              <option value="">선택</option>
              <option>1톤</option>
              <option>2.5톤</option>
              <option>5톤</option>
              <option>11톤</option>
              <option>윙바디</option>
              <option>탑차</option>
              <option>오토바이</option>
              <option>기타</option>
            </select>
          </div>
          <div class="form-group">
            <label>출발지</label>
            <input type="text" id="f-origin" placeholder="출발지 입력" />
          </div>
          <div class="form-group">
            <label>도착지</label>
            <input type="text" id="f-destination" placeholder="도착지 입력" />
          </div>
          <div class="form-group full">
            <label>화물내용</label>
            <input type="text" id="f-cargo" placeholder="화물 내용 입력" />
          </div>
          <div class="form-group">
            <label>운송사운임 (원)</label>
            <input type="text" id="f-carrier-fee" placeholder="0" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label>운송사작업비 (원)</label>
            <input type="text" id="f-carrier-work" placeholder="0" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label>화주운임 (원)</label>
            <input type="text" id="f-shipper-fee" placeholder="0" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label>화주작업비 (원)</label>
            <input type="text" id="f-shipper-work" placeholder="0" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label>담당자</label>
            <input type="text" id="f-assigned" placeholder="담당자명" />
          </div>
          <div class="form-group">
            <label>연락처</label>
            <input type="text" id="f-contact" placeholder="010-0000-0000" />
          </div>
          <div class="form-group">
            <label>운송사명</label>
            <input type="text" id="f-carrier-name" placeholder="운송사명" />
          </div>
          <div class="form-group full">
            <label>비고</label>
            <textarea id="f-notes" placeholder="기타 메모"></textarea>
          </div>
        </div>
      </div>

      <!-- ===== 샤넬코리아 폼 ===== -->
      <div id="form-chanel" style="display:none;">
        <div class="form-grid">
          <!-- Row 1 -->
          <div class="form-group">
            <label>차량사용일</label>
            <input type="date" id="c-date" />
          </div>
          <div class="form-group">
            <label>차종</label>
            <select id="c-vehicle">
              <option value="">선택</option>
              <option>다마스</option>
              <option>1톤</option>
              <option>2.5톤</option>
              <option>3.5톤</option>
              <option>5톤</option>
              <option>11톤</option>
            </select>
          </div>
          <!-- Row 2 -->
          <div class="form-group">
            <label>출발지</label>
            <input type="text" id="c-origin" value="김포" placeholder="출발지" />
          </div>
          <div class="form-group">
            <label>도착지</label>
            <input type="text" id="c-destination" value="부천" placeholder="도착지" />
          </div>
          <!-- Row 3 -->
          <div class="form-group">
            <label>내용</label>
            <select id="c-cargo">
              <option value="">선택</option>
              <option>출고</option>
              <option>입고</option>
              <option>재고이동</option>
              <option>기타</option>
            </select>
          </div>
          <div class="form-group">
            <label>운송사</label>
            <select id="c-carrier-name">
              <option value="">선택</option>
              <option>ACT</option>
              <option>패스</option>
              <option>K1</option>
            </select>
          </div>
          <!-- Row 4 -->
          <div class="form-group">
            <label>배차요청</label>
            <select id="c-notes">
              <option value="">선택</option>
              <option>화장품</option>
              <option>패션</option>
            </select>
          </div>
          <div class="form-group">
            <label>운송요청</label>
            <input type="text" id="c-assigned" placeholder="운송요청자명" />
          </div>
          <!-- Row 5 -->
          <div class="form-group">
            <label>비용 단가 (원)</label>
            <input type="text" id="c-carrier-fee" placeholder="0" inputmode="numeric" />
          </div>
          <div class="form-group">
            <label>수량</label>
            <input type="number" id="c-carrier-work" placeholder="0" min="0" step="1" />
          </div>
          <!-- Row 6 -->
          <div class="form-group">
            <label>합계 (자동계산)</label>
            <input type="text" id="c-subtotal" class="calc-field" readonly placeholder="0" />
          </div>
          <div class="form-group">
            <label>청구금액 단가 (원)</label>
            <input type="text" id="c-shipper-fee" placeholder="0" inputmode="numeric" />
          </div>
          <!-- Row 7 -->
          <div class="form-group full">
            <label>청구합계 (자동계산)</label>
            <input type="text" id="c-charge-total" class="calc-field" readonly placeholder="0" />
          </div>
          <!-- Row 8 -->
          <div class="form-group full">
            <label>비고</label>
            <input type="text" id="c-contact" placeholder="비고 내용 입력" />
          </div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveDispatch()"><i class="fa fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<script>
  // ── 인증 ──────────────────────────────────────────────
  const token = sessionStorage.getItem('adminToken');
  if (!token) { location.href = 'index.html'; }
  const authH = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` });

  // ── 상태 ──────────────────────────────────────────────
  let currentClient  = 'mettler';
  let allDispatchData = [];   // 서버에서 받은 원본 전체 데이터
  let dispatchData   = [];    // 필터 적용 후 표시 데이터
  let editingId      = null;

  // ── 테이블 헤더 정의 ─────────────────────────────────
  const THEAD_METTLER = `<tr>
    <th class="col-no">NO</th><th>날짜</th><th>출발지</th><th>도착지</th><th>화물내용</th>
    <th>차량종류</th><th>운송사운임</th><th>운송사작업비</th>
    <th>화주운임</th><th>화주작업비</th><th>담당</th>
    <th>운송사명</th><th>비고</th><th>수정/삭제</th>
  </tr>`;

  const THEAD_CHANEL = `<tr>
    <th class="col-no">NO</th><th>차량사용일</th><th>출발지</th><th>도착지</th><th>내용</th>
    <th>비용</th><th>수량</th><th>합계</th>
    <th>청구금액</th><th>청구합계</th>
    <th>차종</th><th>배차요청</th><th>운송요청</th>
    <th>운송사</th><th>비고</th><th>수정/삭제</th>
  </tr>`;

  // ── 요약 카드 HTML 정의 ───────────────────────────────
  const SUMMARY_METTLER = `
    <div class="summary-card">
      <div class="summary-icon icon-carrier"><i class="fa fa-truck"></i></div>
      <div class="summary-info">
        <div class="summary-label">운송사 합계</div>
        <div class="summary-value" id="sum-carrier">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-shipper"><i class="fa fa-building"></i></div>
      <div class="summary-info">
        <div class="summary-label">화주 합계</div>
        <div class="summary-value" id="sum-shipper">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-margin"><i class="fa fa-chart-line"></i></div>
      <div class="summary-info">
        <div class="summary-label">마진</div>
        <div class="summary-value" id="sum-margin">0 원</div>
      </div>
    </div>`;

  const SUMMARY_CHANEL = `
    <div class="summary-card">
      <div class="summary-icon icon-act"><i class="fa fa-truck"></i></div>
      <div class="summary-info">
        <div class="summary-label">ACT 합계</div>
        <div class="summary-value" id="sum-act">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-k1"><i class="fa fa-truck"></i></div>
      <div class="summary-info">
        <div class="summary-label">K1 합계</div>
        <div class="summary-value" id="sum-k1">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-pass"><i class="fa fa-truck"></i></div>
      <div class="summary-info">
        <div class="summary-label">패스 합계</div>
        <div class="summary-value" id="sum-pass">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-diff"><i class="fa fa-arrows-alt-v"></i></div>
      <div class="summary-info">
        <div class="summary-label">차이금액</div>
        <div class="summary-value" id="sum-diff">0 원</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon icon-rate"><i class="fa fa-percentage"></i></div>
      <div class="summary-info">
        <div class="summary-label">수익율</div>
        <div class="summary-value" id="sum-rate">0%</div>
      </div>
    </div>`;

  // ── 클라이언트 전환 ──────────────────────────────────
  function switchClient(client) {
    currentClient = client;
    document.getElementById('tab-mettler').classList.toggle('active', client === 'mettler');
    document.getElementById('tab-chanel').classList.toggle('active', client === 'chanel');

    // 기간 필터 바 표시/숨김
    const filterBar = document.getElementById('date-filter-bar');
    if (filterBar) filterBar.classList.toggle('visible', client === 'chanel');

    // 하단 합계 행 숨김 (데이터 로드 후 다시 표시)
    const totalRow = document.getElementById('chanel-total-row');
    if (totalRow) totalRow.style.display = client === 'mettler' ? 'none' : '';

    // 필터 날짜 초기화 (탭 전환 시)
    const fFrom = document.getElementById('filter-from');
    const fTo   = document.getElementById('filter-to');
    if (fFrom) fFrom.value = '';
    if (fTo)   fTo.value   = '';
    const fInfo = document.getElementById('filter-info');
    if (fInfo) fInfo.textContent = '';

    // 요약 카드 교체
    const area = document.getElementById('summary-cards-area');
    if (client === 'mettler') {
      area.className = 'summary-cards';
      area.innerHTML = SUMMARY_METTLER;
    } else {
      area.className = 'summary-cards chanel';
      area.innerHTML = SUMMARY_CHANEL;
    }

    // 테이블 헤더 교체
    document.getElementById('dispatch-table-head').innerHTML =
      client === 'mettler' ? THEAD_METTLER : THEAD_CHANEL;

    loadData();
  }

  // ── 데이터 로드 ──────────────────────────────────────
  async function loadData() {
    try {
      const res        = await fetch(`/api/dispatch?client=${currentClient}`, { headers: authH() });
      allDispatchData  = (await res.json()).data || [];
      applyDateFilter(false); // false = 재조회 없이 필터만 적용
    } catch (e) {
      console.error(e);
      renderEmpty('데이터를 불러오지 못했습니다.');
    }
  }

  // ── 날짜 필터 ────────────────────────────────────────
  function applyDateFilter(resetScroll) {
    const from = document.getElementById('filter-from')?.value || '';
    const to   = document.getElementById('filter-to')?.value   || '';

    if (from || to) {
      dispatchData = allDispatchData.filter(r => {
        const d = r.item_date || '';
        if (from && d < from) return false;
        if (to   && d > to)   return false;
        return true;
      });
      const infoEl = document.getElementById('filter-info');
      if (infoEl) infoEl.textContent = `${dispatchData.length}건 조회됨`;
    } else {
      dispatchData = [...allDispatchData];
      const infoEl = document.getElementById('filter-info');
      if (infoEl) infoEl.textContent = '';
    }
    renderTable();
    renderSummary();
  }

  function resetDateFilter() {
    const fromEl = document.getElementById('filter-from');
    const toEl   = document.getElementById('filter-to');
    if (fromEl) fromEl.value = '';
    if (toEl)   toEl.value   = '';
    const infoEl = document.getElementById('filter-info');
    if (infoEl) infoEl.textContent = '';
    dispatchData = [...allDispatchData];
    renderTable();
    renderSummary();
  }

  // ── 요약 렌더 ────────────────────────────────────────
  function renderSummary() {
    if (currentClient === 'mettler') {
      const carrierTotal = dispatchData.reduce((s, r) => s + (Number(r.carrier_fee) || 0) + (Number(r.carrier_work) || 0), 0);
      const shipperTotal = dispatchData.reduce((s, r) => s + (Number(r.shipper_fee) || 0) + (Number(r.shipper_work) || 0), 0);
      const margin       = shipperTotal - carrierTotal;
      document.getElementById('sum-carrier').textContent = fmt(carrierTotal) + ' 원';
      document.getElementById('sum-shipper').textContent = fmt(shipperTotal) + ' 원';
      const el = document.getElementById('sum-margin');
      el.textContent = fmt(margin) + ' 원';
      el.style.color = margin >= 0 ? '#22c55e' : '#ef4444';
    } else {
      // Chanel: 청구합계 = shipper_fee × carrier_work, 비용합계 = carrier_fee × carrier_work
      const actTotal  = dispatchData.filter(r => r.carrier_name === 'ACT')
                          .reduce((s, r) => s + (Number(r.shipper_fee) || 0) * (Number(r.carrier_work) || 0), 0);
      const k1Total   = dispatchData.filter(r => r.carrier_name === 'K1')
                          .reduce((s, r) => s + (Number(r.shipper_fee) || 0) * (Number(r.carrier_work) || 0), 0);
      const passTotal = dispatchData.filter(r => r.carrier_name === '패스')
                          .reduce((s, r) => s + (Number(r.shipper_fee) || 0) * (Number(r.carrier_work) || 0), 0);

      const totalCharge = dispatchData.reduce((s, r) => s + (Number(r.shipper_fee) || 0) * (Number(r.carrier_work) || 0), 0);
      const totalCost   = dispatchData.reduce((s, r) => s + (Number(r.carrier_fee) || 0) * (Number(r.carrier_work) || 0), 0);
      const diff        = totalCharge - totalCost;
      const rate        = totalCost > 0 ? (diff / totalCost * 100)
                        : totalCharge > 0 ? (diff / totalCharge * 100) : null;

      document.getElementById('sum-act').textContent  = fmt(actTotal) + ' 원';
      document.getElementById('sum-k1').textContent   = fmt(k1Total) + ' 원';
      document.getElementById('sum-pass').textContent = fmt(passTotal) + ' 원';

      const diffEl = document.getElementById('sum-diff');
      diffEl.textContent = fmt(diff) + ' 원';
      diffEl.style.color = diff >= 0 ? '#22c55e' : '#ef4444';

      const rateEl = document.getElementById('sum-rate');
      rateEl.textContent = rate !== null ? rate.toFixed(1) + '%' : '-';
      if (rate !== null) rateEl.style.color = rate >= 0 ? '#22c55e' : '#ef4444';

      // 하단 합계
      const bsCost   = document.getElementById('bs-cost');
      const bsCharge = document.getElementById('bs-charge');
      if (bsCost)   bsCost.textContent   = fmt(totalCost) + ' 원';
      if (bsCharge) bsCharge.textContent = fmt(totalCharge) + ' 원';
      const bsRow = document.getElementById('chanel-total-row');
      if (bsRow) bsRow.style.display = '';
    }
  }

  // ── 테이블 렌더 ──────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('dispatch-body');
    document.getElementById('record-count').textContent = `총 ${dispatchData.length}건`;

    if (!dispatchData.length) {
      const cols = currentClient === 'mettler' ? 14 : 16;
      tbody.innerHTML = `<tr><td colspan="${cols}"><div class="empty-state"><i class="fa fa-inbox"></i>등록된 배차가 없습니다.</div></td></tr>`;
      return;
    }

    // ID 기준 오름차순 정렬 (먼저 입력된 것이 위, 나중 입력이 아래)
    const sorted = [...dispatchData].sort((a, b) => (a.id || 0) - (b.id || 0));

    if (currentClient === 'mettler') {
      tbody.innerHTML = sorted.map((r, i) => `
        <tr>
          <td class="col-no">${i + 1}</td>
          <td>${r.item_date || '-'}</td>
          <td>${esc(r.origin)}</td>
          <td>${esc(r.destination)}</td>
          <td>${esc(r.cargo)}</td>
          <td>${esc(r.vehicle_type)}</td>
          <td style="text-align:right;">${fmt(r.carrier_fee)}</td>
          <td style="text-align:right;">${fmt(r.carrier_work)}</td>
          <td style="text-align:right;">${fmt(r.shipper_fee)}</td>
          <td style="text-align:right;">${fmt(r.shipper_work)}</td>
          <td>${esc(r.assigned_to)}</td>
          <td>${esc(r.carrier_name)}</td>
          <td>${esc(r.notes)}</td>
          <td>
            <div class="td-actions">
              <button class="btn btn-edit" onclick="openEditModal(${r.id})"><i class="fa fa-pen"></i> 수정</button>
              <button class="btn btn-danger" onclick="deleteDispatch(${r.id})"><i class="fa fa-trash"></i> 삭제</button>
            </div>
          </td>
        </tr>`).join('');
    } else {
      tbody.innerHTML = sorted.map((r, i) => {
        const subtotal     = (Number(r.carrier_fee) || 0) * (Number(r.carrier_work) || 0);
        const chargeTotal  = (Number(r.shipper_fee) || 0) * (Number(r.carrier_work) || 0);
        return `
        <tr>
          <td class="col-no">${i + 1}</td>
          <td>${r.item_date || '-'}</td>
          <td>${esc(r.origin)}</td>
          <td>${esc(r.destination)}</td>
          <td>${esc(r.cargo)}</td>
          <td style="text-align:right;">${fmt(r.carrier_fee)}</td>
          <td style="text-align:right;">${fmt(r.carrier_work)}</td>
          <td style="text-align:right;color:#667eea;font-weight:600;">${fmt(subtotal)}</td>
          <td style="text-align:right;">${fmt(r.shipper_fee)}</td>
          <td style="text-align:right;color:#667eea;font-weight:600;">${fmt(chargeTotal)}</td>
          <td>${esc(r.vehicle_type)}</td>
          <td>${esc(r.notes)}</td>
          <td>${esc(r.assigned_to)}</td>
          <td>${esc(r.carrier_name)}</td>
          <td>${esc(r.contact)}</td>
          <td>
            <div class="td-actions">
              <button class="btn btn-edit" onclick="openEditModal(${r.id})"><i class="fa fa-pen"></i> 수정</button>
              <button class="btn btn-danger" onclick="deleteDispatch(${r.id})"><i class="fa fa-trash"></i> 삭제</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }
  }

  function renderEmpty(msg) {
    const cols = currentClient === 'mettler' ? 14 : 16;
    document.getElementById('dispatch-body').innerHTML =
      `<tr><td colspan="${cols}"><div class="empty-state"><i class="fa fa-exclamation-circle"></i>${msg}</div></td></tr>`;
  }

  // ── 모달 열기/닫기 ───────────────────────────────────
  function openAddModal() {
    editingId = null;
    if (currentClient === 'mettler') {
      document.getElementById('modal-title').textContent = '메틀러 배차 등록';
    } else {
      document.getElementById('modal-title').textContent = '샤넬 배차 등록';
    }
    showCorrectForm();
    clearForm();
    document.getElementById('dispatch-modal').classList.add('open');
  }

  function openEditModal(id) {
    editingId = id;
    const r = dispatchData.find(x => x.id === id);
    if (!r) return;

    if (currentClient === 'mettler') {
      document.getElementById('modal-title').textContent = '메틀러 배차 수정';
      showCorrectForm();
      document.getElementById('f-date').value         = r.item_date || '';
      document.getElementById('f-origin').value       = r.origin || '';
      document.getElementById('f-destination').value  = r.destination || '';
      document.getElementById('f-cargo').value        = r.cargo || '';
      document.getElementById('f-vehicle').value      = r.vehicle_type || '';
      document.getElementById('f-carrier-fee').value  = fmtInput(r.carrier_fee);
      document.getElementById('f-carrier-work').value = fmtInput(r.carrier_work);
      document.getElementById('f-shipper-fee').value  = fmtInput(r.shipper_fee);
      document.getElementById('f-shipper-work').value = fmtInput(r.shipper_work);
      document.getElementById('f-assigned').value     = r.assigned_to || '';
      document.getElementById('f-contact').value      = r.contact || '';
      document.getElementById('f-carrier-name').value = r.carrier_name || '';
      document.getElementById('f-notes').value        = r.notes || '';
    } else {
      document.getElementById('modal-title').textContent = '샤넬 배차 수정';
      showCorrectForm();
      document.getElementById('c-date').value         = r.item_date || '';
      document.getElementById('c-vehicle').value      = r.vehicle_type || '';
      document.getElementById('c-origin').value       = r.origin || '';
      document.getElementById('c-destination').value  = r.destination || '';
      document.getElementById('c-cargo').value        = r.cargo || '';
      document.getElementById('c-carrier-name').value = r.carrier_name || '';
      document.getElementById('c-notes').value        = r.notes || '';
      document.getElementById('c-assigned').value     = r.assigned_to || '';
      document.getElementById('c-carrier-fee').value  = fmtInput(r.carrier_fee);
      document.getElementById('c-carrier-work').value = r.carrier_work || '';
      document.getElementById('c-shipper-fee').value  = fmtInput(r.shipper_fee);
      document.getElementById('c-contact').value      = r.contact || '';
      recalcChanel();
    }
    document.getElementById('dispatch-modal').classList.add('open');
  }

  function showCorrectForm() {
    document.getElementById('form-mettler').style.display = currentClient === 'mettler' ? '' : 'none';
    document.getElementById('form-chanel').style.display  = currentClient === 'chanel'  ? '' : 'none';
  }

  function closeModal() {
    document.getElementById('dispatch-modal').classList.remove('open');
    editingId = null;
  }

  function clearForm() {
    if (currentClient === 'mettler') {
      ['f-date','f-origin','f-destination','f-cargo','f-carrier-fee',
       'f-carrier-work','f-shipper-fee','f-shipper-work',
       'f-assigned','f-contact','f-carrier-name','f-notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('f-vehicle').value = '';
    } else {
      document.getElementById('c-date').value         = '';
      document.getElementById('c-vehicle').value      = '';
      document.getElementById('c-origin').value       = '김포';
      document.getElementById('c-destination').value  = '부천';
      document.getElementById('c-cargo').value        = '';
      document.getElementById('c-carrier-name').value = '';
      document.getElementById('c-notes').value        = '';
      document.getElementById('c-assigned').value     = '';
      document.getElementById('c-carrier-fee').value  = '';
      document.getElementById('c-carrier-work').value = '';
      document.getElementById('c-shipper-fee').value  = '';
      document.getElementById('c-subtotal').value     = '';
      document.getElementById('c-charge-total').value = '';
      document.getElementById('c-contact').value      = '';
    }
  }

  // ── 샤넬 자동계산 ────────────────────────────────────
  function recalcChanel() {
    const fee  = unFmt(document.getElementById('c-carrier-fee').value);
    const qty  = Number(document.getElementById('c-carrier-work').value) || 0;
    const sfee = unFmt(document.getElementById('c-shipper-fee').value);
    document.getElementById('c-subtotal').value     = qty > 0 && fee > 0 ? (fee * qty).toLocaleString('ko-KR') : '';
    document.getElementById('c-charge-total').value = qty > 0 && sfee > 0 ? (sfee * qty).toLocaleString('ko-KR') : '';
  }

  // ── 저장 ─────────────────────────────────────────────
  async function saveDispatch() {
    let body;
    if (currentClient === 'mettler') {
      body = {
        client:       currentClient,
        item_date:    document.getElementById('f-date').value,
        origin:       document.getElementById('f-origin').value.trim(),
        destination:  document.getElementById('f-destination').value.trim(),
        cargo:        document.getElementById('f-cargo').value.trim(),
        vehicle_type: document.getElementById('f-vehicle').value,
        carrier_fee:  unFmt(document.getElementById('f-carrier-fee').value),
        carrier_work: unFmt(document.getElementById('f-carrier-work').value),
        shipper_fee:  unFmt(document.getElementById('f-shipper-fee').value),
        shipper_work: unFmt(document.getElementById('f-shipper-work').value),
        assigned_to:  document.getElementById('f-assigned').value.trim(),
        contact:      document.getElementById('f-contact').value.trim(),
        carrier_name: document.getElementById('f-carrier-name').value.trim(),
        notes:        document.getElementById('f-notes').value.trim(),
      };
    } else {
      body = {
        client:       currentClient,
        item_date:    document.getElementById('c-date').value,
        origin:       document.getElementById('c-origin').value.trim(),
        destination:  document.getElementById('c-destination').value.trim(),
        cargo:        document.getElementById('c-cargo').value,
        vehicle_type: document.getElementById('c-vehicle').value,
        carrier_fee:  unFmt(document.getElementById('c-carrier-fee').value),
        carrier_work: Number(document.getElementById('c-carrier-work').value) || 0,
        shipper_fee:  unFmt(document.getElementById('c-shipper-fee').value),
        shipper_work: 0,
        assigned_to:  document.getElementById('c-assigned').value.trim(),
        contact:      document.getElementById('c-contact').value.trim(),
        carrier_name: document.getElementById('c-carrier-name').value,
        notes:        document.getElementById('c-notes').value,
      };
    }
    try {
      const url    = editingId ? `/api/dispatch/${editingId}` : '/api/dispatch';
      const method = editingId ? 'PATCH' : 'POST';
      const res    = await fetch(url, { method, headers: authH(), body: JSON.stringify(body) });
      if (!res.ok) throw new Error(await res.text());
      closeModal();
      loadData();
    } catch (e) {
      alert('저장 실패: ' + e.message);
    }
  }

  // ── 삭제 ─────────────────────────────────────────────
  async function deleteDispatch(id) {
    if (!confirm('이 배차 항목을 삭제하시겠습니까?')) return;
    try {
      const res = await fetch(`/api/dispatch/${id}`, { method: 'DELETE', headers: authH() });
      if (!res.ok) throw new Error(await res.text());
      loadData();
    } catch (e) {
      alert('삭제 실패: ' + e.message);
    }
  }

  // ── 엑셀 내보내기 ────────────────────────────────────
  function exportExcel() {
    if (!dispatchData.length) { alert('내보낼 데이터가 없습니다.'); return; }
    const clientLabel = currentClient === 'mettler' ? '메틀러토레도' : '샤넬코리아';
    const now = new Date();
    const exportDate = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

    /* ── 스타일 헬퍼 ─────────────────────── */
    const BM = { top:{style:'medium',color:{rgb:'1E293B'}}, bottom:{style:'medium',color:{rgb:'1E293B'}}, left:{style:'medium',color:{rgb:'1E293B'}}, right:{style:'medium',color:{rgb:'1E293B'}} };
    const BT = { top:{style:'thin',color:{rgb:'CBD5E0'}},   bottom:{style:'thin',color:{rgb:'CBD5E0'}},   left:{style:'thin',color:{rgb:'CBD5E0'}},   right:{style:'thin',color:{rgb:'CBD5E0'}} };
    const sA = (ws,ref,s)=>{ if(ws[ref]) ws[ref].s=s; };
    const sR = (ws,r1,c1,r2,c2,s)=>{
      for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++){
        const ref=XLSX.utils.encode_cell({r,c});
        if(!ws[ref]) ws[ref]={t:'z',v:''};
        ws[ref].s=s;
      }
    };
    const mkS=(bold,sz,fgRgb,bgRgb,align='center',border=BT)=>({
      font:{bold,sz,color:{rgb:fgRgb},name:'맑은 고딕'},
      fill:{patternType:'solid',fgColor:{rgb:bgRgb}},
      alignment:{horizontal:align,vertical:'center'},
      border,
    });

    const wb = XLSX.utils.book_new();

    if (currentClient === 'mettler') {
      /* ── 메틀러토레도 시트 ── */
      const NC = 12;
      const headers = ['날짜','출발지','도착지','화물내용','차량종류','운송사운임','운송사작업비','화주운임','화주작업비','담당','운송사명','비고'];
      const rows    = dispatchData.map((r,i) => [
        r.item_date, r.origin, r.destination, r.cargo, r.vehicle_type,
        Number(r.carrier_fee)||0, Number(r.carrier_work)||0,
        Number(r.shipper_fee)||0, Number(r.shipper_work)||0,
        r.assigned_to, r.carrier_name, r.notes||''
      ]);
      let tCost=0, tCharge=0;
      rows.forEach(r=>{ tCost+=r[5]+r[6]; tCharge+=r[7]+r[8]; });
      const diff=tCharge-tCost;
      const rate=tCost>0?(diff/tCost*100).toFixed(1)+'%':'-';

      const aoa=[
        [`METTLER TOLEDO  차량 배차 관리`, ...Array(NC-1).fill('')],
        [`출력일 : ${exportDate}`, ...Array(NC-1).fill('')],
        Array(NC).fill(''),
        headers,
        ...rows,
        Array(NC).fill(''),
        ['운송사 비용 합계','','','','',tCost,'','','','','',''],
        ['화주 청구 합계','','','','','','',tCharge,'','','',''],
        ['차이 금액(수익)','','','','','','',diff,'','','',''],
        ['수익율','','','','','','',rate,'','','',''],
      ];

      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols']=[{wch:12},{wch:14},{wch:14},{wch:16},{wch:10},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10},{wch:12},{wch:16}];
      ws['!rows']=[{hpt:32},{hpt:18},{hpt:6},{hpt:22}];
      ws['!merges']=[
        {s:{r:0,c:0},e:{r:0,c:NC-1}},
        {s:{r:1,c:0},e:{r:1,c:NC-1}},
      ];
      // 타이틀
      sR(ws,0,0,0,NC-1,mkS(true,16,'FFFFFF','1E293B','center',BM));
      // 부제
      sR(ws,1,0,1,NC-1,mkS(false,10,'475569','F1F5F9','right',BT));
      // 헤더
      sR(ws,3,0,3,NC-1,mkS(true,11,'FFFFFF','334155','center',BM));
      // 데이터
      rows.forEach((_,i)=>{
        const bg=i%2===0?'FFFFFF':'F8FAFC';
        sR(ws,4+i,0,4+i,NC-1,mkS(false,10,'1E293B',bg,'center',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:0}),mkS(true,10,'374151',bg,'left',BT));
        [5,6,7,8].forEach(ci=>sA(ws,XLSX.utils.encode_cell({r:4+i,c:ci}),{...mkS(false,10,'1E293B',bg,'center',BT),numFmt:'#,##0'}));
      });
      // 요약행
      const sBase=4+rows.length+1;
      [['2563EB','DBEAFE'],['059669','DCFCE7'],['DC2626','FEE2E2'],['7C3AED','EDE9FE']].forEach(([fc,bg],si)=>{
        const ri=sBase+si;
        sR(ws,ri,0,ri,NC-1,mkS(false,10,'374151',bg,'center',BM));
        sA(ws,XLSX.utils.encode_cell({r:ri,c:0}),mkS(true,11,'1E293B',bg,'left',BM));
        sA(ws,XLSX.utils.encode_cell({r:ri,c:5}),{...mkS(true,12,fc,bg,'right',BM),numFmt:'#,##0'});
        sA(ws,XLSX.utils.encode_cell({r:ri,c:7}),{...mkS(true,12,fc,bg,'right',BM),numFmt:'#,##0'});
      });

      XLSX.utils.book_append_sheet(wb, ws, '메틀러토레도');

    } else {
      /* ── 샤넬코리아 시트 ── */
      const NC = 13;
      const headers = ['NO','차량사용일','출발지','도착지','내용','단가(운송사)','수량','합계(운송사)','단가(화주)','청구합계(화주)','차종','비고','운송사'];
      const rows = dispatchData.map((r,i) => {
        const subtotal    = (Number(r.carrier_fee)||0) * (Number(r.carrier_work)||0);
        const chargeTotal = (Number(r.shipper_fee)||0) * (Number(r.carrier_work)||0);
        return [
          i+1, r.item_date, r.origin, r.destination, r.cargo,
          Number(r.carrier_fee)||0, Number(r.carrier_work)||0, subtotal,
          Number(r.shipper_fee)||0, chargeTotal,
          r.vehicle_type, r.contact||r.notes||'', r.carrier_name
        ];
      });

      const actTotal  = dispatchData.filter(r=>r.carrier_name==='ACT') .reduce((s,r)=>s+(Number(r.shipper_fee)||0)*(Number(r.carrier_work)||0),0);
      const k1Total   = dispatchData.filter(r=>r.carrier_name==='K1')  .reduce((s,r)=>s+(Number(r.shipper_fee)||0)*(Number(r.carrier_work)||0),0);
      const passTotal = dispatchData.filter(r=>r.carrier_name==='패스').reduce((s,r)=>s+(Number(r.shipper_fee)||0)*(Number(r.carrier_work)||0),0);
      const totalCharge = rows.reduce((s,r)=>s+r[9],0);
      const totalCost   = rows.reduce((s,r)=>s+r[7],0);
      const diff        = totalCharge - totalCost;
      const rate        = totalCost > 0 ? (diff/totalCost*100).toFixed(1)+'%' : '-';

      const aoa=[
        [`CHANEL KOREA  차량 배차 관리`, ...Array(NC-1).fill('')],
        [`출력일 : ${exportDate}`, ...Array(NC-1).fill('')],
        Array(NC).fill(''),
        headers,
        ...rows,
        Array(NC).fill(''),
        ['ACT 청구합계', actTotal,   ...Array(NC-2).fill('')],
        ['K1 청구합계',  k1Total,    ...Array(NC-2).fill('')],
        ['패스 청구합계',passTotal,  ...Array(NC-2).fill('')],
        ['운송사 비용 합계',totalCost,...Array(NC-2).fill('')],
        ['화주 청구 합계',totalCharge,...Array(NC-2).fill('')],
        ['차이 금액(수익)',diff,      ...Array(NC-2).fill('')],
        ['수 익 율',       rate,      ...Array(NC-2).fill('')],
      ];

      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols']=[{wch:5},{wch:12},{wch:13},{wch:13},{wch:16},{wch:12},{wch:7},{wch:13},{wch:12},{wch:14},{wch:10},{wch:18},{wch:10}];
      ws['!rows']=[{hpt:32},{hpt:18},{hpt:6},{hpt:22}];
      ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:NC-1}},{s:{r:1,c:0},e:{r:1,c:NC-1}}];

      sR(ws,0,0,0,NC-1,mkS(true,16,'FFFFFF','3B1F3B','center',BM));
      sR(ws,1,0,1,NC-1,mkS(false,10,'475569','F5F0FF','right',BT));
      sR(ws,3,0,3,NC-1,mkS(true,11,'FFFFFF','4C1D95','center',BM));
      rows.forEach((_,i)=>{
        const bg=i%2===0?'FFFFFF':'FAF5FF';
        sR(ws,4+i,0,4+i,NC-1,mkS(false,10,'1E293B',bg,'center',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:0}),mkS(false,10,'9CA3AF',bg,'center',BT));
        sA(ws,XLSX.utils.encode_cell({r:4+i,c:1}),mkS(true,10,'374151',bg,'left',BT));
        [7,9].forEach(ci=>sA(ws,XLSX.utils.encode_cell({r:4+i,c:ci}),{...mkS(true,10,'7C3AED',bg,'right',BT),numFmt:'#,##0'}));
      });
      const sBase=4+rows.length+1;
      [['2563EB','DBEAFE'],['059669','DCFCE7'],['7C3AED','EDE9FE'],['6B7280','F1F5F9'],['059669','DCFCE7'],['DC2626','FEE2E2'],['D97706','FEF3C7']].forEach(([fc,bg],si)=>{
        const ri=sBase+si;
        sR(ws,ri,0,ri,NC-1,mkS(false,10,'374151',bg,'center',BM));
        sA(ws,XLSX.utils.encode_cell({r:ri,c:0}),mkS(true,11,'1E293B',bg,'left',BM));
        sA(ws,XLSX.utils.encode_cell({r:ri,c:1}),{...mkS(true,13,fc,bg,'right',BM),numFmt:'#,##0'});
      });

      XLSX.utils.book_append_sheet(wb, ws, '샤넬코리아');
    }

    XLSX.writeFile(wb, `배차관리_${clientLabel}_${today()}.xlsx`);
  }

  // ── 유틸 ─────────────────────────────────────────────
  function fmt(v) {
    const n = Number(v);
    if (v === null || v === undefined || v === '') return '-';
    return isNaN(n) ? '-' : n.toLocaleString('ko-KR');
  }
  function fmtInput(v) {
    const n = Number(v);
    if (!v && v !== 0) return '';
    return isNaN(n) ? '' : n.toLocaleString('ko-KR');
  }
  function unFmt(v) { return Number((v || '0').replace(/,/g, '')) || 0; }
  function esc(v)   { return v ? String(v).replace(/</g,'&lt;').replace(/>/g,'&gt;') : '-'; }
  function today()  { return new Date().toISOString().slice(0,10).replace(/-/g,''); }

  // ── 숫자 필드 자동 콤마 (메틀러) ─────────────────────
  ['f-carrier-fee','f-carrier-work','f-shipper-fee','f-shipper-work'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      const raw = this.value.replace(/[^0-9]/g,'');
      this.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
    });
  });

  // ── 샤넬 폼 이벤트 ───────────────────────────────────
  ['c-carrier-fee','c-shipper-fee'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      const raw = this.value.replace(/[^0-9]/g,'');
      this.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
      recalcChanel();
    });
  });
  document.getElementById('c-carrier-work').addEventListener('input', recalcChanel);

  // ── 모달 외부 클릭 닫기 ──────────────────────────────
  document.getElementById('dispatch-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── 초기화 ───────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof initNav === 'function') initNav('dispatch');
    loadData();
  });
</script>
</body>
</html>
