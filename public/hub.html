<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 - 토탈 물류</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { display: flex; min-height: 100vh; background: #f0f4f8; margin: 0; font-family: 'Noto Sans KR', sans-serif; }

    /* ── 통계 카드 ── */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    @media(max-width:900px){ .stat-row { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width:500px){ .stat-row { grid-template-columns: 1fr 1fr; } }

    .stat-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07); padding: 18px 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .stat-icon-wrap {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .stat-text {}
    .stat-label { font-size: 11px; color: #718096; font-weight: 600; margin-bottom: 2px; }
    .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }

    .bg-blue   { background: #dbeafe; } .color-blue   { color: #2563eb; }
    .bg-green  { background: #d1fae5; } .color-green  { color: #059669; }
    .bg-orange { background: #ffedd5; } .color-orange { color: #ea580c; }
    .bg-red    { background: #fee2e2; } .color-red    { color: #dc2626; }
    .bg-purple { background: #ede9fe; } .color-purple { color: #7c3aed; }
    .bg-cyan   { background: #cffafe; } .color-cyan   { color: #0891b2; }
    .bg-teal   { background: #ccfbf1; } .color-teal   { color: #0f766e; }
    .bg-pink   { background: #fce7f3; } .color-pink   { color: #be185d; }

    /* ── 섹션 레이아웃 ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media(max-width:800px){ .two-col { grid-template-columns: 1fr; } }

    .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.07); padding: 20px; }
    .card-title { font-size: 14px; font-weight: 700; color: #1a202c; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

    /* ── 빠른 메뉴 그리드 ── */
    .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    @media(max-width:700px){ .quick-grid { grid-template-columns: repeat(3, 1fr); } }
    @media(max-width:400px){ .quick-grid { grid-template-columns: repeat(2, 1fr); } }

    .quick-card {
      background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
      padding: 14px 10px; text-align: center; cursor: pointer; text-decoration: none;
      transition: all .18s; display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .quick-card:hover { transform: translateY(-3px); box-shadow: 0 5px 18px rgba(0,0,0,.12); }
    .quick-card .q-icon { font-size: 22px; }
    .quick-card .q-label { font-size: 12px; font-weight: 600; color: #2d3748; line-height: 1.3; }

    /* ── 테이블 ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f7fafc; color: #718096; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
    td { padding: 9px 10px; border-bottom: 1px solid #f0f4f8; color: #2d3748; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fafc; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-blue   { background: #dbeafe; color: #1e40af; }
    .badge-orange { background: #ffedd5; color: #9a3412; }

    .date-banner {
      font-size: 13px; color: #718096; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
      background: #fff; border-radius: 10px; padding: 10px 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="hub-main">
    <div class="hub-page-title">🏠 대시보드</div>

    <!-- 날짜 배너 -->
    <div class="date-banner">
      <i class="fa fa-calendar-alt" style="color:#667eea;"></i>
      <span id="todayStr"></span>
      <span style="margin-left:auto;font-size:12px;color:#a0aec0;">자동 갱신 · 1분마다</span>
    </div>

    <!-- 통계 카드 2줄 4열 -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-icon-wrap bg-blue"><i class="fas fa-box color-blue"></i></div>
        <div class="stat-text">
          <div class="stat-label">오늘 오더</div>
          <div class="stat-value color-blue" id="s-total">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap bg-green"><i class="fas fa-check-circle color-green"></i></div>
        <div class="stat-text">
          <div class="stat-label">서명 완료</div>
          <div class="stat-value color-green" id="s-signed">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap bg-orange"><i class="fas fa-hourglass-half color-orange"></i></div>
        <div class="stat-text">
          <div class="stat-label">미서명</div>
          <div class="stat-value color-orange" id="s-pending">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap bg-red"><i class="fas fa-exclamation-triangle color-red"></i></div>
        <div class="stat-text">
          <div class="stat-label">진행중 클레임</div>
          <div class="stat-value color-red" id="s-claims">-</div>
        </div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-icon-wrap bg-purple"><i class="fas fa-tasks color-purple"></i></div>
        <div class="stat-text">
          <div class="stat-label">미완료 Todo</div>
          <div class="stat-value color-purple" id="s-todos">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap bg-cyan"><i class="fas fa-ship color-cyan"></i></div>
        <div class="stat-text">
          <div class="stat-label">보세 반입</div>
          <div class="stat-value color-cyan" id="s-bonded-in">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap bg-teal"><i class="fas fa-exchange-alt color-teal"></i></div>
        <div class="stat-text">
          <div class="stat-label">보세 반출</div>
          <div class="stat-value color-teal" id="s-bonded-out">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap bg-pink"><i class="fas fa-truck color-pink"></i></div>
        <div class="stat-text">
          <div class="stat-label">서명률</div>
          <div class="stat-value color-pink" id="s-rate">-</div>
        </div>
      </div>
    </div>

    <!-- 빠른 메뉴 -->
    <div class="quick-grid">
      <a href="journal_mettler.html" class="quick-card">
        <div class="q-icon">⚖️</div><div class="q-label">메틀러<br>업무일지</div>
      </a>
      <a href="journal_chanel.html" class="quick-card">
        <div class="q-icon">💄</div><div class="q-label">샤넬<br>업무일지</div>
      </a>
      <a href="bonded.html" class="quick-card">
        <div class="q-icon">🚢</div><div class="q-label">보세<br>반입/출</div>
      </a>
      <a href="dispatch.html" class="quick-card">
        <div class="q-icon">🚚</div><div class="q-label">차량<br>배차</div>
      </a>
      <a href="todo.html" class="quick-card">
        <div class="q-icon">✅</div><div class="q-label">업무<br>Todo</div>
      </a>
      <a href="claims.html" class="quick-card">
        <div class="q-icon">⚠️</div><div class="q-label">클레임<br>트래커</div>
      </a>
      <a href="calendar.html" class="quick-card">
        <div class="q-icon">📅</div><div class="q-label">캘린더</div>
      </a>
      <a href="admin.html" class="quick-card">
        <div class="q-icon">🗂️</div><div class="q-label">오더<br>관리</div>
      </a>
      <a href="notes.html" class="quick-card">
        <div class="q-icon">📝</div><div class="q-label">메모장</div>
      </a>
      <a href="vendors.html" class="quick-card">
        <div class="q-icon">🏢</div><div class="q-label">업체<br>관리</div>
      </a>
      <a href="list.html" class="quick-card">
        <div class="q-icon">🔍</div><div class="q-label">조회/<br>출력</div>
      </a>
      <a href="billing.html" class="quick-card">
        <div class="q-icon">💰</div><div class="q-label">운송<br>청구서</div>
      </a>
    </div>

    <!-- 최근 서명 + 통계 2열 -->
    <div class="two-col">
      <div class="card">
        <div class="card-title"><i class="fas fa-check-circle" style="color:#10b981;"></i> 최근 서명 완료</div>
        <table>
          <thead>
            <tr><th>DN 번호</th><th>고객사</th><th>완료 시각</th><th>상태</th></tr>
          </thead>
          <tbody id="recentTable">
            <tr><td colspan="4" style="text-align:center;color:#a0aec0;padding:20px;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-title"><i class="fas fa-chart-bar" style="color:#667eea;"></i> 오늘 현황 요약</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f4f8;">
            <span style="font-size:13px;color:#4a5568;"><i class="fas fa-box" style="color:#3b82f6;margin-right:6px;"></i>전체 오더</span>
            <span class="badge badge-blue" id="sum-total">0</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f4f8;">
            <span style="font-size:13px;color:#4a5568;"><i class="fas fa-check" style="color:#10b981;margin-right:6px;"></i>서명 완료</span>
            <span class="badge badge-green" id="sum-signed">0</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f4f8;">
            <span style="font-size:13px;color:#4a5568;"><i class="fas fa-clock" style="color:#f59e0b;margin-right:6px;"></i>미서명 대기</span>
            <span class="badge badge-orange" id="sum-pending">0</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f4f8;">
            <span style="font-size:13px;color:#4a5568;"><i class="fas fa-ship" style="color:#0891b2;margin-right:6px;"></i>보세 반입 / 반출</span>
            <span style="font-size:13px;font-weight:700;color:#0f766e;"><span id="sum-bin">0</span> / <span id="sum-bout">0</span></span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;">
            <span style="font-size:13px;color:#4a5568;"><i class="fas fa-percentage" style="color:#7c3aed;margin-right:6px;"></i>서명 완료율</span>
            <span style="font-size:16px;font-weight:700;color:#7c3aed;" id="sum-rate">0%</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="hub-nav.js"></script>
  <script>
    initNav('hub.html');

    const token = sessionStorage.getItem('adminToken');
    const authH = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` });

    // 날짜
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('todayStr').textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;

    // 통계 로드
    async function loadStats() {
      try {
        const res = await fetch('/api/stats', { headers: authH() });
        if (!res.ok) throw new Error();
        const d = await res.json();

        const total  = d.total_today   ?? 0;
        const signed = d.signed_today  ?? 0;
        const pend   = d.pending_today ?? 0;
        const rate   = total > 0 ? Math.round(signed / total * 100) : 0;

        document.getElementById('s-total').textContent      = total;
        document.getElementById('s-signed').textContent     = signed;
        document.getElementById('s-pending').textContent    = pend;
        document.getElementById('s-claims').textContent     = d.open_claims    ?? 0;
        document.getElementById('s-todos').textContent      = d.pending_todos  ?? 0;
        document.getElementById('s-bonded-in').textContent  = d.bonded_in      ?? 0;
        document.getElementById('s-bonded-out').textContent = d.bonded_out     ?? 0;
        document.getElementById('s-rate').textContent       = rate + '%';

        document.getElementById('sum-total').textContent   = total;
        document.getElementById('sum-signed').textContent  = signed;
        document.getElementById('sum-pending').textContent = pend;
        document.getElementById('sum-bin').textContent     = d.bonded_in  ?? 0;
        document.getElementById('sum-bout').textContent    = d.bonded_out ?? 0;
        document.getElementById('sum-rate').textContent    = rate + '%';

        const tbody = document.getElementById('recentTable');
        const list  = d.recent_signed || [];
        if (list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#a0aec0;padding:20px;">최근 서명 완료 내역이 없습니다.</td></tr>';
        } else {
          tbody.innerHTML = list.map(r => `
            <tr>
              <td><strong>${r.dn_number || '-'}</strong></td>
              <td>${r.customer || '-'}</td>
              <td style="font-size:12px;">${r.completed_at ? new Date(r.completed_at).toLocaleString('ko-KR') : '-'}</td>
              <td><span class="badge badge-green">완료</span></td>
            </tr>
          `).join('');
        }
      } catch {
        document.getElementById('s-total').textContent = '오류';
      }
    }

    loadStats();
    setInterval(loadStats, 60000); // 1분마다 자동 갱신
  </script>
</body>
</html>
